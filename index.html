/", "date": "", "rating": 0}, {"id": 120, "name": "Churros", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/24700/churros/", "date": "", "rating": 0}, {"id": 121, "name": "Turkish Coffee Brownies", "cuisine": "Mediterranean", "source": "foodnetwork.com", "location": "", "ingredients": "Nonstick cooking spray, for the pan\n1 cup granulated sugar\n1/2 cup all-purpose flour\n1/3 cup unsweetened cocoa powder\n2 teaspoons instant espresso powder\n1/2 teaspoon ground cardamom\n1/4 teaspoon baking powder\n1/4 teaspoon cinnamon\n1/4 teaspoon kosher salt\n1 stick (8 tablespoons) unsalted butter, melted but not hot\n1 teaspoon vanilla extract\n2 large eggs\n3/4 cup chopped toasted walnuts, plus more for topping\n1 cup powdered sugar\n3 tablespoons cocoa powder\n3 tablespoons unsalted butter, melted\n1 tablespoon brewed coffee or 1/4 teaspoon espresso powder plus 1 tablespoon water\n1 tablespoon honey\n1 teaspoon vanilla extract\n1/4 teaspoon ground cardamom\nPinch kosher salt\nSprinkles, for topping", "instructions": "For the brownies: Preheat the oven to 350 degrees F. Grease an 8-inch square pan with cooking spray and line with parchment paper, allowing 1-inch wings to hang over the edges.\nWhisk together the granulated sugar, flour, cocoa powder, espresso powder, cardamom, baking powder, cinnamon and salt in a large bowl. Whisk together the butter, vanilla and eggs in a medium bowl. Pour the wet mixture into the dry mixture and stir to combine. Fold in the walnuts.\nPour the batter into the prepared pan and spread it out evenly (it will be quite a thin layer). Bake until a toothpick inserted in the center comes out clean, about 25 minutes. Cool in the pan on a rack for 10 minutes, then lift out of the pan and place on the rack to cool completely.\nFor the glaze: Whisk together the powdered sugar, cocoa powder, butter, coffee, honey, vanilla, cardamom and salt in a medium bowl until smooth.\nPour the glaze on the cooled brownie, spread it around and top with walnuts and sprinkles. Let dry, then cut into squares.", "preptime": "", "cooktime": "", "servings": "16 brownies", "tags": "Dessert, Coffee Recipes, Brownie, Baking, Low Sodium", "notes": "", "url": "https://www.foodnetwork.com/recipes/turkish-coffee-brownies-7550003", "date": "", "rating": 0}, {"id": 122, "name": "The Zahav Lamb Shoulder", "cuisine": "Mediterranean", "source": "foodnetwork.com", "location": "", "ingredients": "1/4 cup kosher salt\n2 tablespoons sugar\n1 teaspoon allspice berries\n1 teaspoon black peppercorns\n1 teaspoon fennel seeds\n1 head garlic, unpeeled, but pulled apart into cloves\n5 pounds lamb shoulder, bone-in and square-cut, \"square-cut\" means without the shank end\n1 cup dried chickpeas, soaked overnight in water, with 1 tsp baking soda\n1 teaspoon baking soda\n1/2 cup pomegranate molasses, available at Middle Eastern specialty stores or online\nFresh parsley\nFresh mint", "instructions": "In a large pot, combine the salt, sugar, allspice, black peppercorns, fennel seeds, and garlic in 2 quarts water. Bring to a rapid boil, stirring to dissolve the salt. Remove from the heat and allow the brine to cool completely.\nPlace the lamb into the cooled brine. (If it’s floating or not submerged enough, cover the lamb with a clean cloth that's saturated in the brine.) Cover with lid and refrigerate the lamb shoulder in the brine overnight or up to 48 hours.\nTurn your oven's broiler on. Place a rack on a baking sheet. Drain the lamb and pat dry, wiping off solids from the brine. Put the lamb on the rack and broil until well browned, about 30 minutes.\nPrepare the roasting pan: Drain soaked chickpeas and place in the roasting pan, along with 2 quarts of water and the pomegranate molasses. Remove lamb shoulder from the oven; turn off the broiler and set the oven to 325 degrees F. Lay the lamb shoulder in the roasting pan, skin side up. (The liquid should come about halfway up the shoulder; add water if needed.) Place a sheet of parchment paper over the lamb and cover the pan tightly with several layers of foil. Braise in the oven about 5 hours, basting every hour.\nAfter 5 hours, remove the foil and parchment from the lamb and baste again. Raise heat to 475 degrees F, and place lamb back in the oven, uncovered, for 30 minutes, basting every 10 minutes.\nRemove from the oven when the lamb is deeply glazed and the liquid has reduced. Baste again with the juices and garnish with torn parsley and mint. Place in a serving dish, cover with juices and chickpeas, and serve family-style.", "preptime": "", "cooktime": "", "servings": "6 servings", "tags": "Main, Middle Eastern Recipes, Gluten Free, Main Dish, Lamb Recipes", "notes": "Brining and low, slow heat: the secrets to getting tender, melt-in-your mouth lamb. This one's a showstopper from Chef Solomonov's own restaurant, Zahav. (Plan ahead: The lamb requires 48 hours of brining, and the chickpeas need an overnight soak.)", "url": "https://www.foodnetwork.com/fnk/recipes/the-zahav-lamb-shoulder-7151743", "date": "", "rating": 0}, {"id": 123, "name": "French Sable Cookies", "cuisine": "Italian", "source": "anitalianinmykitchen.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "Dessert", "notes": "", "url": "https://anitalianinmykitchen.com/wprm_print/french-sable-cookies", "date": "", "rating": 0}, {"id": 124, "name": "Cherry Almond Linzer Cookies", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "2/3 cup (100g) salted roasted almonds (see Note if you use unsalted)\n2 and 1/2 cups (313g) all-purpose flour (spooned & leveled), plus more for rolling\n1/2 teaspoon baking powder\n1/2 teaspoon ground cinnamon\n1/2 teaspoon salt\n1 cup (16 Tbsp; 226g) unsalted butter, softened to room temperature\n2/3 cup (135g) granulated sugar\n1 large egg, at room temperature\n1 teaspoon pure vanilla extract\n3/4 teaspoon almond extract\n1/2 cup (160g) cherry preserves (or other flavor; see Note)\n1 cup (120g) confectioners’ sugar\n1–2 Tablespoons whole milk\n1/2 teaspoon almond extract or pure vanilla extract (or 1/4 teaspoon each)", "instructions": "Place the almonds in a food processor. Pulse until the almonds are finely chopped, but not so finely that it’s turning into almond flour. See photo above for a visual.\nIn a medium bowl, whisk together the chopped almonds, flour, baking powder, cinnamon, and salt until combined. Set aside.\nIn a large bowl using a handheld or stand mixer fitted with a paddle attachment, beat the butter and sugar together on high speed until completely smooth and creamy, about 3 minutes. (Here’s a helpful tutorial if you need guidance on how to cream butter and sugar.) Add the egg, vanilla extract, and almond extract, and beat on high speed until combined, about 1 minute. Scrape down the sides and up the bottom of the bowl and beat again as needed to combine.\nAdd the dry ingredients to the wet ingredients and mix on low speed until combined. The dough will be thick and crumbly, and weigh about 850g.\nDivide the dough into 2 equal portions (about 425g each, or just eyeball it), gently flatten into discs, and wrap each in plastic wrap. Chill the discs in the refrigerator for at least 3 hours (and up to 4 days).\nPreheat oven to 350°F (180°C). Line baking sheets with parchment paper or silicone baking mats. (Always recommended for cookies.) Set aside.\nRemove 1 disc of chilled cookie dough from the refrigerator. After chilling, the dough will be very hard. Let it sit at room temperature for 10 minutes (or 30 minutes, if the dough chilled for longer than 3 hours) before you try to roll it. Generously flour a work surface, as well as your hands and the rolling pin. Roll out the disc to about 1/4-inch thickness. If the dough is cracking a lot when rolling out, wait a few more minutes for it to soften up a bit more. The more you work with it, the softer and easier to work with it will become. Using a 2-inch or 3-inch cookie cutter, cut dough into shapes. Re-roll the remaining dough and continue cutting until all is used. Repeat with the second disc of dough. You should have about 44–60 cookies, depending on the size of cookie cutter you use.\nUsing a small (1-inch) cookie cutter (see Note if you don’t have one), cut a hole into the center of half of the cookies. Let’s call these the “top cookies,” and the ones without a hole the “bottom cookies.”\nArrange the cookies 2 inches apart on lined baking sheets. Bake the cookies for about 11–12 minutes, or until lightly browned around the edges. Allow cookies to cool on the baking sheets for 5 minutes, then transfer to a wire rack to cool completely before assembling.\nIn a small bowl, whisk together (I usually use a fork) confectioners’ sugar, 1 Tablespoon milk, and extract(s) until smooth. If the icing is too thick to whisk, add a little more milk, a teaspoon at a time, until it reaches desired consistency. You want to keep it on the thicker side.\nLightly dip the surface of each top cookie into the icing, and let any excess icing drip off. Place the iced top cookies on a wire rack or parchment paper. It’s ok if the icing is not completely set before sandwiching the cookies.\nSpread about 1/2 teaspoon of cherry preserves on the bottom side of each bottom cookie. Carefully top each bottom cookie with a top iced cookie and press together very gently to create a cookie sandwich. Icing will set in a few hours, so you can stack, store, transport, and gift the cookies.\nCookies will stay fresh covered at room temperature for 2 days or in the refrigerator for up to 1 week.", "preptime": "4 h", "cooktime": "12 min", "servings": "22", "tags": "Dessert, Cherry Almond Linzer Cookies", "notes": "These iced cherry almond linzer cookies are as lovely to look at as they are to eat, and there's no special cookie decorating skill required. You can use any small cookie cutters you have to cut the almond cookie dough into your choice of shapes, and the filling is simply store-bought cherry preserves. Take your time with these cookies, especially when handling the dough and sandwiching the cookies together.", "url": "https://sallysbakingaddiction.com/cherry-almond-linzer-cookies/print/125433/", "date": "", "rating": 0}, {"id": 125, "name": "Tapas Recipes | Food & Wine", "cuisine": "Other", "source": "foodandwine.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "http://www.foodandwine.com/slideshows/tapas#potato-and-mozzarella-croquettes", "date": "", "rating": 0}, {"id": 126, "name": "Biscuit Vegetable Pot Pie Casserole", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "2 cups (250g) all-purpose flour (spooned & leveled), plus extra for hands\n1 Tablespoon baking powder (yes, Tablespoon!)\n1/2 teaspoon salt\n6 Tablespoons (85g) unsalted butter, cold and cubed\n1 cup + 2 Tablespoons (270ml) whole milk, divided\n1/4 cup (4 Tbsp; 56g) unsalted butter\n1 cup (130g) diced yellow onion (1/2 of a large onion)\n1 cup (130g) sliced or diced carrots (1–2 large carrots or a handful of baby carrots)\n1 cup (120g) sliced or diced celery (2–3 stalks)\n1 cup (120g) roughly chopped mushrooms\n3–4 garlic cloves, minced\n1/3 cup (42g) all-purpose flour (spooned & leveled)\n1 teaspoon salt\n1/2 teaspoon fresh ground pepper\n2 teaspoons fresh thyme leaves (or 1 teaspoon dried)\n2 cups (480ml) vegetable broth\n1/2 cup (120ml) whole milk\n2 cups (about 300g or 10 ounces) mixed vegetables (such as frozen peas, frozen or fresh broccoli and/or cauliflower florets; see Note)\n2 Tablespoons chopped fresh parsley (or 2 teaspoons dried)", "instructions": "Whisk the flour, baking powder, and salt together in a large bowl or use a food processor. Add the cold butter and cut into the dry ingredients with a pastry cutter or pulse several times in the processor. Cut/pulse until coarse crumbs form. Add 1 cup (240ml) milk (reserve the rest for brushing on dough in step 4), and then stir/pulse until the dough comes together. Dough will be very shaggy and a little wet. If it’s too dry, fold in another Tablespoon of milk. If it’s too wet, fold in another Tablespoon of flour. With generously floured hands, shape biscuit dough into 8 or 9 1-inch-thick discs. The amount of biscuits you need (and their diameter) depends on the size and shape of the baking dish you’re using for the pot pie. Dough is sticky, so keep your hands floured. Biscuits don’t have to be perfect or neat. Place shaped biscuits on a lined plate or baking pan, cover tightly, and refrigerate until ready to use in step 4, or for up to 2 days.\nMelt the butter in a large skillet, pot, or 11- or 12-inch oven-safe skillet over medium heat. Add the onion, carrots, celery, mushrooms, and garlic. Cook, stirring occasionally, for 5 minutes or until vegetables have softened and released some liquid. Stir in flour, salt, pepper, and thyme until flour has absorbed all the liquid. Stir in the broth and 1/2 cup (120ml) milk. Cook and simmer for 7–9 minutes or until thickened into a thick soup-like consistency. Stir in the mixed vegetables and parsley, and then remove from heat. Taste and add more salt, pepper, thyme, or parsley if desired. Cool for 5 minutes.\nAs it’s cooling, preheat oven to 400°F (204°C).\nPour filling into greased 2.5- or 3-quart baking dish, or use a 9-inch pie dish that’s 2 inches deep. Arrange cold biscuits on top, squeezing them in as necessary to fit. Brush the tops of the biscuits with remaining 2 Tablespoons (30ml) milk.\nBake for 25 minutes, and then, keeping the pot pie in the oven, turn oven up to 425°F (218°C) and bake for 5–6 more minutes, or until biscuits are golden brown on top.\nRemove from the oven and allow to cool for 5 minutes before serving. Leftovers keep well in the refrigerator in an airtight container for up to 5 days. Reheat as desired.", "preptime": "40 min", "cooktime": "30 min", "servings": "8", "tags": "Dessert, Biscuit Vegetable Pot Pie", "notes": "This hearty vegetable pot pie is served casserole style with a 5-ingredient homemade biscuit topping. Some of my favorite vegetables to use are mushrooms, carrots, broccoli, peas, and cauliflower. See the recipe notes for substitutions and other ingredient suggestions.", "url": "https://sallysbakingaddiction.com/biscuit-vegetable-pot-pie/#tasty-recipes-100897", "date": "", "rating": 0}, {"id": 127, "name": "Lemon Water Spaghetti (A unique pasta al limone recipe)", "cuisine": "Italian", "source": "the-pasta-project.com", "location": "", "ingredients": "8 ¾ oz spaghetti (or linguine)\n3 lemons (plus one small flat teaspoon lemon zest) (preferable organic and unwaxed)\n3 ½ oz provolone del Monaco (or other types of provolone dolce or Parmigiano Reggiano)\n1 handful fresh basil leaves\n2 ¼ cups water\n3-4 tbsp extra virgin olive oil\nsalt (to taste)\nblack pepper (to taste)\nlemon leaves (optional)", "instructions": "Wash 3 lemons, cut them into quarters, and remove the pulp. Place the lemon peels in a bowl with 500ml (about 1 pint) of hot water heated to about 75/80°C. Cover and leave to infuse overnight.\nStrain the lemon-infused water into a small pot and bring to a boil.\nIn a deep sauté pan over medium heat, add a large ladleful of lemon-infused water, 1-2 tablespoons of olive oil, and a pinch of salt. Bring to a boil.\nAdd the spaghetti to the pan, stirring continuously. Gradually add more lemon-infused water as needed to cook the pasta and prevent it from drying out. Keep the heat at medium and stir frequently to ensure even cooking until the pasta is al dente.\nOnce the pasta is cooked, remove from heat. Stir in a teaspoon of lemon zest from another lemon), grated cheese, and 1-2 tablespoons of olive oil.\nAdd the chopped basil and stir again.\nServe immediately with a little more basil, ground black pepper and grated provolone or Parmigiano Reggiano.", "preptime": "10 min", "cooktime": "13 min", "servings": "2", "tags": "Main, Lemon Water Pasta, Lemon Water Spaghetti", "notes": "This divine lemon water spaghetti is based on a recipe by Neapolitan Michelin star chef Peppe Guida. It uses a unique approach to cook the pasta, helping make a silky lemon pasta sauce using very simple ingredients. It's very refreshing and the perfect summer dish.", "url": "https://www.the-pasta-project.com/lemon-water-spaghetti-pasta-recipe/#recipe", "date": "", "rating": 0}, {"id": 128, "name": "Sparkling White Wine Winter Sangria", "cuisine": "Spanish", "source": "thissillygirlskitchen.com", "location": "", "ingredients": "750 ml Chardonnay\n1 cup light rum\n1 & 1/2 cups apple cider\n1 & 1/2 cups white cranberry juice\n1 granny smith apple (sliced)\n1 Honeycrisp apple (sliced)\n1 cup cranberries (fresh or frozen)\n3 cups vanilla soda (or lemon-lime soda, or sparkling water)\nrosemary sprigs (for garnish, optional)", "instructions": "Add the chardonnay, rum, apple cider, and cranberry juice to a large pitcher. Stir to combine\nAdd the sliced apples and cranberries and stir to combine.\nTop with the soda. Stir and refrigerate for at least one hour.\nServe over ice with rosemary sprigs for garnish.", "preptime": "10 min", "cooktime": "", "servings": "10", "tags": "Drink, Holiday Sangria, Sangria, White Wine Sangria", "notes": "Winter is the perfect time to gather with friends and family, and what better way to celebrate than with a refreshing and festive drink? Introducing White Wine Winter Sangria!", "url": "https://thissillygirlskitchen.com/winter-white-wine-sangria/", "date": "", "rating": 0}, {"id": 129, "name": "Balsamic Glazed Salmon", "cuisine": "American", "source": "wellplated.com", "location": "", "ingredients": "2 salmon fillets ((5 ounces each))\n2 teaspoons extra-virgin olive oil\n2 cloves garlic (minced)\n3 tablespoons balsamic vinegar\n2 teaspoons honey\n2 teaspoons Dijon mustard\n1/2 teaspoon kosher salt\n1/4 teaspoon ground black pepper\nChopped fresh parsley (for garnish)", "instructions": "Preheat oven to 400 degrees F. Line a baking sheet with aluminum foil (avoid parchment paper), then coat with non-stick cooking spray.\nIn a small skillet, heat the olive oil over medium heat. Add the garlic and cook until fragrant and beginning to brown, about 2 minutes, watching carefully so that it does not burn.\nAdd the balsamic vinegar, honey, mustard, salt, and pepper. Whisk and simmer until the mixture thickens; about 4 minutes.\nPlace salmon skin-side down on the prepared baking sheet. Brush liberally with the glaze.\nBake for 5 minutes and then remove from the oven.\nBaste with the glaze, then bake 5 to 10 additional minutes, until the fish flakes easily with a fork and is cooked through.\nSprinkle with chopped parsley and serve.", "preptime": "2 min", "cooktime": "18 min", "servings": "2", "tags": "Main, Balsamic Glazed Salmon, Balsamic Glazed Salmon Baked, Balsamic Glazed Salmon Fillets, Balsamic Glazed Salmon In Oven, Easy Balsamic Glazed Salmon", "notes": "Balsamic Glazed Salmon is easy and impressive! Spread a sweet, tangy honey balsamic glaze over salmon fillets, then bake.", "url": "https://www.wellplated.com/balsamic-glazed-salmon/", "date": "", "rating": 0}, {"id": 130, "name": "Strawberry Gin Smash", "cuisine": "Other", "source": "apaigeofpositivity.com", "location": "", "ingredients": "1/2 cup cane sugar\n1/2 cup water\n1 cup diced strawberries\n1 lime\n4 large strawberries\n4 oz gin\n1/2 cup ice\n12 oz club soda", "instructions": "— For the syrup: —\nIn a small sauce pot, whisk together water, cane sugar, and diced strawberries. Bring the mixture to a boil on medium heat.\nMash the berries around a bit to encourage them to turn into a jam-like substance.\nReduce to a simmer for 5-10 minutes until the sugar dissolves, then remove from the heat and let cool for 20 minutes.\n— For the cocktail: —\nIn a cocktail shaker (or tall glass), add 4 large strawberries and the juice from the lime. Give it a gentle muddle.\nAdd the gin and 2 oz of strawberry simple syrup. Stir.\nFill two glasses with ice. Strain the gin strawberry mixture into each glass.\nTop each glass with club soda and garnish with fresh mint sprigs and a strawberry slice. Enjoy!", "preptime": "25 min", "cooktime": "15 min", "servings": "2", "tags": "Drink, Cocktail, Drinks, Gin, Happy Hour, Strawberry", "notes": "Get ready for your new go-to summer cocktail! This Strawberry Gin Smash recipe is fruity and fresh, perfectly sweet and a whole lot of delicious.", "url": "https://apaigeofpositivity.com/strawberry-gin-smash-cocktail-recipe/", "date": "", "rating": 0}, {"id": 131, "name": "Cilantro-Lime Dressing", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/167260/cilantro-lime-dressing/", "date": "", "rating": 0}, {"id": 132, "name": "Lamb Meatballs with Mint", "cuisine": "Other", "source": "foodandwine.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.foodandwine.com/recipes/lamb-meatballs-mint", "date": "", "rating": 0}, {"id": 133, "name": "Sesame Ginger Dressing", "cuisine": "Other", "source": "ambitiouskitchen.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.ambitiouskitchen.com/sesame-ginger-dressing/", "date": "", "rating": 0}, {"id": 134, "name": "Soft Dinner Rolls", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "1 cup (240ml) whole milk, warmed to about 110°F (43°C)\n2 and 1/4 teaspoons Platinum Yeast from Red Star instant yeast (1 standard packet)\n2 Tablespoons granulated sugar, divided\n1 large egg\n1/4 cup (4 Tbsp; 56g) unsalted butter, softened to room temperature and cut into 4 pieces\n1 teaspoon salt\n3 cups (390g) all-purpose flour or bread flour* (spooned & leveled)\noptional topping: 2 Tablespoons (28g) melted unsalted butter mixed with 1 Tablespoon honey", "instructions": "Whisk the warm milk, yeast, and 1 Tablespoon of sugar together in the bowl of your stand mixer. Cover and allow to sit for 5 minutes. *If you do not own a stand mixer, you can do this in a large mixing bowl and in the next step, mix the dough together with a large wooden spoon/silicone spatula. It will take a bit of arm muscle. A hand mixer works, but the sticky dough repeatedly gets stuck in the beaters. Mixing by hand with a wooden spoon or silicone spatula is a better choice.*\nAdd the remaining sugar, egg, butter, salt, and 1 cup flour. With a dough hook or paddle attachment, mix/beat on low speed for 30 seconds, scrape down the sides of the bowl with a silicone spatula, then add the remaining flour. Beat on medium speed until the dough comes together and pulls away from the sides of the bowl, about 2 minutes. If the dough seems too wet to a point where kneading (next step) would be impossible, beat in more flour 1 Tablespoon at a time until you have a workable dough, similar to the photos above. Dough should be soft and a little sticky, but still manageable to knead with lightly floured hands.\nKeep the dough in the mixer and beat for an additional 5 full minutes, or knead by hand on a lightly floured surface for 5 full minutes. (If you’re new to bread-baking, my How to Knead Dough video tutorial can help here.) If the dough becomes too sticky during the kneading process, sprinkle 1 teaspoon of flour at a time on the dough or on the work surface/in the bowl to make a soft, slightly tacky dough. Do not add more flour than you need because you do not want a dry dough. After kneading, the dough should still feel a little soft. Poke it with your finger—if it slowly bounces back, your dough is ready to rise. You can also do a “windowpane test” to see if your dough has been kneaded long enough: tear off a small (roughly golfball-size) piece of dough and gently stretch it out until it’s thin enough for light to pass through it. Hold it up to a window or light. Does light pass through the stretched dough without the dough tearing first? If so, your dough has been kneaded long enough and is ready to rise. If not, keep kneading until it passes the windowpane test.\nLightly grease a large bowl with oil or nonstick spray. Place the dough in the bowl, turning it to coat all sides in the oil. Cover the bowl with aluminum foil, plastic wrap, or a clean kitchen towel. Allow the dough to rise in a relatively warm environment for 1-2 hours or until double in size. (I always let it rise on the counter. Takes about 2 hours. For a tiny reduction in rise time, see my answer to Where Should Dough Rise? in my Baking with Yeast Guide.)\nGrease a 9×13 inch baking pan or two 9-inch square or round baking pans. You can also bake the rolls in a cast iron skillet or on a lined baking sheet.*\nWhen the dough is ready, punch it down to release the air. Divide the dough into 14-16 equal pieces. (Just eyeball it– doesn’t need to be perfect!) A bench scraper is always helpful for cutting dough. Shape each piece into a smooth ball. Arrange in prepared baking pan.\nCover shaped rolls with aluminum foil, plastic wrap, or a clean kitchen towel. Allow to rise until puffy, about 1 hour.\nAdjust oven rack to a lower position and preheat oven to 350°F (177°C). (It’s best to bake the rolls towards the bottom of the oven so the tops don’t burn.)\nBake for 20-25 minutes or until golden brown on top, rotating the pan halfway through. If you notice the tops browning too quickly, loosely tent the pan with aluminum foil. Remove from the oven, brush with optional honey butter topping, and allow rolls to cool for a few minutes before serving.\nCover leftover rolls tightly and store at room temperature for 2-3 days or in the refrigerator for up to 1 week.", "preptime": "3 h 25 min", "cooktime": "22 min", "servings": "14", "tags": "Baking, Bread, Rolls, Yeast Rolls", "notes": "You only need 7 ingredients to make these dinner rolls. Flaky, soft, and buttery, these fresh dinner rolls outshine any main dish. See recipe notes for freezing and overnight instructions. You can also reference my Baking with Yeast Guide for answers to common yeast FAQs. This recipe is also in my cookbook, Sally's Baking 101.", "url": "https://sallysbakingaddiction.com/soft-dinner-rolls/", "date": "", "rating": 0}, {"id": 135, "name": "Chocolate Raspberry Cake", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "1.5 Tablespoons (22ml) water\n1.5 Tablespoons (4.5 teaspoons or 12g) cornstarch\n3 cups (12 ounces/about 340–375g) fresh or frozen raspberries (do not thaw)*\n1/3 cup (67g) granulated sugar\n1 teaspoon lemon juice\n1/2 teaspoon pure vanilla extract\n1 and 3/4 cups (219g) all-purpose flour (spooned & leveled)\n3/4 cup (62g) unsweetened natural cocoa powder* (see Note)\n1 and 3/4 cups (350g) granulated sugar\n2 teaspoons baking soda\n1 teaspoon baking powder\n1 teaspoon salt\n2 teaspoons espresso powder (optional)*\n1/2 cup (120ml) vegetable oil or melted coconut oil\n2 large eggs, at room temperature\n3/4 cup (180g) full-fat sour cream, at room temperature\n1/2 cup (120ml) buttermilk, at room temperature*\n2 teaspoons pure vanilla extract\n1/2 cup (120ml) hot water or black coffee*\n1 cup (170g) mini semi-sweet chocolate chips (tossed in 1 Tablespoon flour)\n1 cup (16 Tbsp; 226g) unsalted butter, softened to room temperature\n3 and 1/2 cups (420g) confectioners’ sugar\n1/2 cup (41g) unsweetened natural or dutch-process cocoa powder\n3 Tablespoons (45ml) heavy cream or milk\n1/8 teaspoon salt\n2 teaspoons pure vanilla extract\n8 ounces (226g) quality semi-sweet or bittersweet chocolate, finely chopped\n3/4 cup (180ml) heavy cream or heavy whipping cream\n1/4 cup (60ml) raspberry liqueur, such as Chambord (or replace with more heavy cream)\noptional garnish: fresh raspberries & fresh mint", "instructions": "Whisk the cornstarch and water together until all the cornstarch has dissolved. (I just use a fork to mix—very easy.) Combine cornstarch mixture, raspberries (no need to thaw if using frozen), granulated sugar, and lemon juice in a medium saucepan set over medium heat. Using a silicone spatula, stir the mixture, mashing the raspberries as they begin to thaw and soften. Bring to a boil and let it boil for 5 full minutes, stirring occasionally. Remove pan from heat and stir in vanilla extract.\nAllow the raspberry filling to cool at room temperature for 10–15 minutes, then transfer it to a bowl or container and place it in the refrigerator for at least 4 hours and up to 1 week (the longer, the better). No need to cover it, but if refrigerating for longer than 4 hours, cover tightly. It will continue to thicken up as it chills. Raspberry filling must be completely chilled before using in your cake. If freezing, see Note below for instructions.\nPreheat oven to 350°F (177°C). Grease three 9-inch cake pans, line with parchment paper rounds, then grease the parchment paper. Parchment paper helps the cakes seamlessly release from the pans. (If it’s helpful, see this parchment paper rounds for cakes video & post.)\nWhisk the flour, cocoa powder, sugar, baking soda, baking powder, salt, and espresso powder (if using) together in a large bowl. Set aside. Using a handheld or stand mixer fitted with a whisk attachment (or you can use a whisk), mix the oil, eggs, and sour cream together on medium-high speed until combined. Add the buttermilk and vanilla and beat until combined. Pour the wet ingredients into the dry ingredients, add the hot water/coffee, and whisk or beat on low speed until the batter is completely combined. Fold in the flour-coated chocolate chips. Batter is thin and you may see some air bubbles on the surface—that’s normal. You should have about 6–6.5 cups of batter, or around 1400g.\nDivide batter evenly between 3 pans. Bake for approximately 24–26 minutes. Baking times vary, so keep an eye on yours. The cakes are done when a toothpick inserted in the center comes out clean.\nRemove the cakes from the oven and set on a wire rack. Allow to cool completely in the pan. The cakes may slightly sink in the middle as they cool—that’s expected.\nWith a handheld or stand mixer fitted with a paddle or whisk attachment, beat the butter on medium speed until creamy, about 2 minutes. Add confectioners’ sugar, cocoa powder, heavy cream, salt, and vanilla extract. Beat on low speed for 30 seconds, then increase to high speed and beat for 1 full minute. Taste. Beat in another pinch of salt if desired. (Do you want your buttercream darker in color? I have a trick detailed on the full chocolate buttercream page.) You’re going to use this buttercream for a thin layer under the raspberry filling, a piped “dam” around 2 of the cake layers, and for the crumb coat. Makes about 2.5 cups total.\nPlace 1 cooled cake layer on your cake stand or serving plate. Using a large icing spatula or small offset spatula, evenly cover the top with about 1/4 cup of chocolate buttercream frosting (a thin layer). Spoon about 1/2 cup of the chocolate buttercream into a piping bag fitted with a large round piping tip. I use Wilton 2A. (Or just use a disposable piping bag and cut about 3/4 inch off the tip and use that without a piping tip.) Pipe a thick border of buttercream around the edge of the frosted cake layer, using about half of the buttercream in the piping bag. Then, using a small offset spatula, spread half of the thickened and chilled raspberry filling (about 1/2 cup) inside the buttercream border. Place second cake layer on top and then repeat the filling process: spread frosting, pipe border with remaining frosting in piping bag (if you ran out, just use more from the big bowl of buttercream), then spread on remaining raspberry filling. Top with third cake layer.\nUsing the remaining chocolate buttercream, spread a thin layer of buttercream on the top and around the sides as a crumb coat. Run a bench scraper around the cake to smooth out crumb coat. Chill uncovered in the refrigerator for at least 30 minutes and up to 3 hours to set the crumb coat.\nPlace finely chopped chocolate in a medium heat-proof bowl. Heat the cream and raspberry liqueur, if using, in a small saucepan over medium heat until it begins to gently simmer. (Do not let it come to a rapid boil—that’s too hot!) Pour over chocolate, then let it sit for 2–3 minutes to gently soften the chocolate. With a metal spoon or small rubber spatula, very slowly stir until chocolate has melted and mixture is smooth. Ganache is thin. The finer you chopped the chocolate, the quicker it will melt with the cream. If it’s not melting, do not microwave it. If needed, see Troubleshooting Chocolate Ganache. Once ganache mixture is smooth, let it chill for 30 minutes in the refrigerator to thicken before spreading on chilled crumb-coated cake.\nPour/spoon thickened ganache on chilled cake, and spread all over cake with an icing spatula. Garnish with fresh raspberries, if desired. Serve cake immediately or chill, uncovered, for up to 4–6 hours before serving. Cake can be served at room temperature or chilled.\nCover leftover cake tightly and store in the refrigerator for 5 days. I like using a cake carrier for storing and transporting.", "preptime": "1 h 30 min", "cooktime": "25 min", "servings": "12", "tags": "Dessert, Chocolate Raspberry Cake", "notes": "Enjoy layers of moist dark chocolate cake, sweet creamy chocolate buttercream, and homemade raspberry filling, all covered with a luxurious chocolate raspberry ganache.", "url": "https://sallysbakingaddiction.com/chocolate-raspberry-cake/", "date": "", "rating": 0}, {"id": 136, "name": "Tuscan Chicken Skillet", "cuisine": "Italian", "source": "foodnetwork.com", "location": "", "ingredients": "Kosher salt and freshly ground black pepper\n12 ounces fettuccine\n4 slices bacon, chopped\n1 pound chicken tenders, cut into 1-inch pieces\n2 cloves garlic, minced\n4 plum tomatoes, chopped\n1 cup heavy cream\n5 ounces baby spinach\n3/4 cup grated Parmesan\n3 tablespoons chopped fresh basil", "instructions": "Bring a large pot of salted water to a boil. Cook the fettuccine according to package directions; drain.\nMeanwhile, put the bacon in a large, cold skillet, then cook over medium-high heat, stirring occasionally, until crispy, about 8 minutes; transfer to a plate with a slotted spoon.\nSprinkle the chicken lightly with salt and pepper and add to the skillet in a single layer. Let cook, undisturbed, until golden brown on the underside, 2 to 3 minutes. Continue to cook, stirring occasionally, until cooked through, about 4 minutes more. Transfer to the plate with the bacon.\nReduce the heat to medium and add the garlic, stirring, until fragrant, about 30 seconds. Add the tomatoes and cream and bring to a simmer, then add the spinach and stir until just wilted. Add the bacon, chicken, fettuccine and Parmesan and toss with tongs until well coated; season to taste with salt and pepper. Sprinkle with basil and serve.", "preptime": "", "cooktime": "", "servings": "4 servings", "tags": "Main, Pasta Recipes, High Fiber, Main Dish", "notes": "Bacon, cream, Parmesan -- is your mouth watering yet? There's no need to go out to dinner when you can make this restaurant-style creamy, cheesy chicken and fettuccine at home.", "url": "https://www.foodnetwork.com/recipes/food-network-kitchen/tuscan-chicken-skillet-5421728", "date": "", "rating": 0}, {"id": 137, "name": "Lemon and Chive Risotto", "cuisine": "Italian", "source": "foodnetwork.com", "location": "", "ingredients": "8 sprigs fresh thyme\nZest of 3 lemons, removed with a vegetable peeler\n3 large rinds Parmesan cheese\n1 bay leaf\n4 tablespoons olive oil\n1 shallot, chopped\n1 1/2 cups Arborio rice\n1 1/2 teaspoons kosher salt\n1 cup dry white wine\n1/4 cup chopped chives\n1 cup freshly grated Parmesan cheese, optional", "instructions": "For the lemon Parmesan broth: Add the thyme, lemon zest, Parmesan rinds and bay leaf to a medium sauce pan. Cover the mixture with 5 cups water. Place over medium heat and bring to a simmer. Simmer for 20 minutes, skimming the surface as needed. Strain, discarding the solids and reserving the liquid.\nFor the risotto: Heat a Dutch oven over medium-high heat. Add 2 tablespoons of the olive oil and the shallot and cook until the shallot is soft and fragrant, about 2 minutes. Add the rice and toast, stirring often to coat the rice in the flavored oil, for 2 more minutes. Season with the salt, deglaze with the white wine and cook, stirring often, until the wine is almost entirely absorbed. Add 1 cup of the lemon Parmesan broth and cook, stirring constantly, until the liquid is nearly absorbed. Continue to cook, adding more broth by the cup and stirring often, until the rice is just tender and the mixture is creamy, about 25 minutes total. Finish with the remaining 2 tablespoons olive oil, the chives and grated Parmesan, if using.", "preptime": "", "cooktime": "", "servings": "4 servings", "tags": "Risotto Recipes, Gluten Free, Lemon", "notes": "", "url": "https://www.foodnetwork.com/recipes/giada-de-laurentiis/lemon-and-chive-risotto-5592292", "date": "", "rating": 0}, {"id": 138, "name": "Corn Salsa", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/187625/easy-corn-salsa/", "date": "", "rating": 0}, {"id": 139, "name": "Moroccan Lemon Cake (Meskouta)", "cuisine": "Mediterranean", "source": "thespruceeats.com", "location": "", "ingredients": "For the Cake:\n4 large eggs (room temperature)\n1 1/2 cups white sugar\n1/2 cup vegetable oil\n2 cups all-purpose flour\n4 teaspoons baking powder\n1/2 teaspoon salt\n1/2 cup milk\n2 tablespoons fresh lemon juice\n2 tablespoons lemon zest\n1 teaspoon vanilla extract\nFor the Glaze:\n1 cup confectioners' sugar\n1 to 2 tablespoons fresh lemon juice", "instructions": "— Make the Cake —\nGather the ingredients.\nPosition a rack in the middle of the oven and heat to 350 F/180 C. Grease and flour a small (about 9 cups) bundt or tube pan.\nIn a stand mixer fitted with the whisk attachment, or in a large bowl with an electric mixer (or by hand), beat together the eggs and sugar until thick. Gradually beat in the oil until smooth.\nStir in the flour, baking powder, and salt, and then the milk. Beat just until smooth.\nMix in the lemon juice and zest, and the vanilla extract.\nPour the batter into the prepared pan.\nBake until the cake tests done (a toothpick inserted in the middle should come out clean), about 40 minutes. Remove from the oven and allow the cake to cool in the pan on a rack for 7 to 10 minutes.\nLoosen the cake from the sides of the pan with a butter knife or spatula, then turn out the cake onto the rack to finish cooling. Glaze, if desired.\n— Make the Glaze —\nGather the ingredients.\nIn a small bowl, mix together the confectioners' sugar and lemon juice until smooth.\nDrizzle over the top of the cake, allowing the glaze to run down the sides.", "preptime": "15 min", "cooktime": "40 min", "servings": "12", "tags": "Dessert, Cake, Lemon Cake", "notes": "Prepared from scratch, this light, fine-textured Moroccan cake gets delicious flavor from lemon zest and fresh lemon juice.", "url": "https://www.thespruceeats.com/easy-lemon-cake-2394481", "date": "", "rating": 0}, {"id": 140, "name": "Sole with Lemon-Caper Sauce", "cuisine": "Other", "source": "foodnetwork.com", "location": "", "ingredients": "4 fillets of lemon sole\n1 1/4 teaspoons kosher salt\n2 tablespoons extra-virgin olive oil\n4 tablespoons unsalted butter, at room temperature\n1/3 cup all-purpose flour, for dredging\n1/4 cup capers, drained and rinsed\n1 clove garlic, minced\n1/2 cup chicken stock\n1/4 cup freshly squeezed lemon juice (from about 1 1/2 lemons)\n1/2 teaspoon Calabrian chili paste\n1/2 teaspoon chopped fresh oregano\n2 tablespoons chopped fresh Italian parsley", "instructions": "Using a paper towel, dry the sole fillets very well. Season the fish evenly with 1 teaspoon salt. Heat a medium skillet over high heat. Add 1 tablespoon olive oil and 1 tablespoon butter to the pan. When the butter is fully melted and the bubbles have subsided, dredge both sides of 2 fillets in the flour. Shake off the excess flour and add the fish to the skillet. Reduce the heat to medium high. Cook the fillets until beginning to brown around the edges on the first side, 2 to 3 minutes. Using a fish spatula, flip the fish gently and cook for another 30 seconds. Remove the fillets to a plate and continue with the remaining 1 tablespoon olive oil, 1 tablespoon butter and fish.\nWhen all 4 fillets are cooked and out of the skillet, add the capers and garlic and cook over medium heat, stirring, until fragrant, about 15 seconds. Add the chicken stock and lemon juice and stir, scraping up the bits from the bottom. Season with the remaining 1/4 teaspoon salt. Simmer for about 2 minutes to reduce the liquid slightly. Finish the sauce by stirring in the remaining 2 tablespoons butter, chili paste and oregano. Spoon the sauce over the fish, sprinkle with the parsley and serve.", "preptime": "", "cooktime": "", "servings": "2 to 4 servings", "tags": "Sauce, Main Dish, Lemon", "notes": "", "url": "https://www.foodnetwork.com/recipes/giada-de-laurentiis/sole-with-lemon-caper-sauce-5592211", "date": "", "rating": 0}, {"id": 141, "name": "Alain Ducasse's Gougères", "cuisine": "Other", "source": "foodandwine.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.foodandwine.com/recipes/alain-ducasses-gougeres", "date": "", "rating": 0}, {"id": 142, "name": "Cornbread", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/17891/golden-sweet-cornbread/", "date": "", "rating": 0}, {"id": 143, "name": "Patatas Bravas With Quick Romesco Sauce", "cuisine": "Other", "source": "thespruceeats.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.thespruceeats.com/air-fryer-patatas-bravas-with-quick-romesco-sauce-recipe-8362703", "date": "", "rating": 0}, {"id": 144, "name": "Chicken Croquetas", "cuisine": "Other", "source": "seriouseats.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.seriouseats.com/chicken-croquettes-croquetas-de-pollo-from-sp", "date": "", "rating": 0}, {"id": 145, "name": "Salmorejo (Spanish Chilled Tomato Soup)", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "1 1/2 pounds ripe tomatoes, (cored and coarsely chopped)\n5 ounces stale (or lightly toasted) bread, (crust discarded, inside torn or chopped into bite-size pieces)\n1/3 cup extra virgin olive oil, (plus more for drizzling)\n1 garlic clove, (crushed and peeled)\n1 tablespoon sherry vinegar\n3/4 teaspoon fine sea salt\n1/4 teaspoon freshly ground black pepper, (plus more for serving)\n1/3 cup 80ml cold water\n2 hard-boiled eggs, (chopped (optional))\n1/4 pound diced jamón serrano or prosciutto, (finely chopped (optional))", "instructions": "Puree the soup: In a blender, add the tomatoes, bread, olive oil, garlic, vinegar, salt, and pepper. Blend on high speed until very smooth, 1 to 2 minutes. The soup should be thick and creamy, similar to the consistency of yogurt. Depending on how juicy the tomatoes are, add up to 1/3 cup of cold water to thin the soup.\nChill: Cover and refrigerate until chilled, at least 1 hour.\nServe: Divide the soup among 4 serving bowls. Garnish with the hard-boiled eggs and ham if using. Drizzle with olive oil and sprinkle with a grind of black pepper. Serve cold.", "preptime": "10 min", "cooktime": "", "servings": "4", "tags": "Soup, Dairy Free Tomato Soup, Spanish Chilled Soup", "notes": "This traditional Spanish chilled tomato soup is a refreshing and flavorful dish, perfect for a hot summer day. Topped with sliced boiled egg and ham, it makes for a delicious and satisfying meal. Skip the toppings for an equally delicious vegan meal. With only a handful of ingredients and a few simple steps, you can get this classic Andalusian recipe chilling in your refrigerator in just 10 minutes.", "url": "https://www.themediterraneandish.com/salmorejo-spanish-chilled-tomato-soup/", "date": "", "rating": 0}, {"id": 146, "name": "Smoky Orange Vinaigrette Recipe - Bobby Flay", "cuisine": "Other", "source": "foodandwine.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.foodandwine.com/recipes/smoky-orange-vinaigrette", "date": "", "rating": 0}, {"id": 147, "name": "Fabada asturiana: Authentic spanish recipe dinner", "cuisine": "Spanish", "source": "thespanishchef.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "Main", "notes": "Discover the ultimate spanish recipe dinner: Fabada Asturiana from Chef Omar Allibhoy. Learn authentic techniques, ingredients, and family secrets for this hearty Spanish bean stew. Perfect winter comfort food!", "url": "https://www.thespanishchef.com/recipes/spanish-recipe-dinner-fabada-asturiana", "date": "", "rating": 0}, {"id": 148, "name": "Project, Product, & Portfolio Management Solutions | Tempo", "cuisine": "Other", "source": "tempo.io", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Comprehensive solutions for Jira. Streamline workflows, enhance collaboration, and gain real-time insights to drive productivity and decision-making.", "url": "https://www.tempo.io/platform-allegro", "date": "", "rating": 0}, {"id": 149, "name": "Classic Lemon Meringue Pie", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "Homemade Pie Crust*\n5 large egg yolks (use the whites in the meringue below)\n1 and 1/3 cups (320ml) water\n1 cup (200g) granulated sugar\n1/3 cup (38g) cornstarch\n1/4 teaspoon salt\n1/2 cup (120ml) fresh lemon juice\n1 Tablespoon lemon zest\n2 Tablespoons (28g) unsalted butter, softened to room temperature\n5 large egg whites, at room temperature\n1/2 teaspoon cream of tartar\n1/2 cup (100g) granulated sugar\n1/8 teaspoon salt", "instructions": "I like to make sure my pie dough is prepared before I begin making lemon meringue pie. I always make pie dough the night before because it needs to chill in the refrigerator for at least 2 hours before rolling out and blind baking (next step).\nPreheat oven to 375°F (190°C) and adjust your oven rack to the lowest position. Partially blind bake pie crust in a 9-inch pie dish. (Follow blind baking instructions through step 9. Be sure to crimp or flute the pie crust edges, too.) Tip: You can get started on the lemon meringue pie filling steps while your crust is blind baking. But making the filling is time sensitive because you will temper the egg yolks, so if multi-tasking isn’t your thing, just wait until your crust is done blind baking before beginning the filling.\nReduce oven temperature to 350°F (177°C).\nWatch the video below to see how I work through each of the following steps.\nWhisk the egg yolks together in a medium bowl or liquid measuring cup. Set aside. Whisk the water, granulated sugar, cornstarch, salt, lemon juice, and lemon zest together in a medium saucepan over medium heat. The mixture will be thin and cloudy, then eventually begin thickening and bubbling after about 6 minutes. Once thickened, give it a whisk and reduce heat to low.\nVery slowly stream a few large spoonfuls of warm lemon mixture into the beaten egg yolks. Then, also in a very slow stream, whisk the egg yolk mixture into the saucepan. Turn heat back up to medium. Cook until the mixture is thick and big bubbles begin bursting at the surface. Remove the pan from heat and whisk in the butter. Spread filling into the warm partially baked crust. Set aside as you prepare the meringue. (Don’t let the filling cool down too much as you want a warm filling when you top with the meringue in step 7. The warm filling helps seal the two layers together, preventing separation.)\nWith a handheld mixer or a stand mixer fitted with a whisk attachment, beat the egg whites and cream of tartar together on medium speed for 1 minute, then increase to high speed until soft peaks form, about 4 more minutes. Add the sugar and salt, then continue beating on high speed until glossy stiff peaks form, about 2 more minutes. Spread meringue on top of filling. (I like to make decorative peaks with the back of a large spoon.) Make sure you spread the meringue all the way to the edges so that it touches the crust. This helps prevent the meringue from weeping.\nBake pie on the lowest oven rack for 20-25 minutes. (If the meringue is browning too quickly, tent a piece of foil over it as best you can without the foil touching the meringue.) When pie is done, remove from the oven, place on a wire rack, and allow to cool at room temperature for 1 hour before placing in the refrigerator to chill. Chill for 4 hours before slicing and serving.\nCover any leftovers and store in the refrigerator. Lemon meringue pie tastes best on day 1 because it doesn’t keep very well. No matter how hard you try to prevent it, the meringue will wilt and separate over time. Best to enjoy right away.", "preptime": "6 h", "cooktime": "1 h 10 min", "servings": "9", "tags": "Dessert, Classic Lemon Meringue Pie", "notes": "This is the perfect lemon meringue pie! With a delicious homemade pie crust, tart and smooth lemon filling, and a fluffy toasted meringue topping, it's impossible to resist.", "url": "https://sallysbakingaddiction.com/lemon-meringue-pie/#tasty-recipes-66954", "date": "", "rating": 0}, {"id": 150, "name": "World's Easiest Yeast Bread recipe - Artisan, NO KNEAD", "cuisine": "Other", "source": "recipetineats.com", "location": "", "ingredients": "3 cups (450g) flour (, bread or plain/all purpose (Note 1))\n2 tsp instant or rapid rise yeast ((Note 2 for normal / active dry yeast))\n1 1/2 tsp cooking salt / kosher salt (, HALVE if using table salt (Note 3))\n1 1/2 cups (375 ml) very warm tap water (, NOT boiling or super hot (ie up to 55°C/130°F) (Note 4))\n1 1/2 tbsp flour (, for dusting)", "instructions": "Mix Dough: Mix flour, yeast and salt in a large bowl. Add water, then use the handle of a wooden spoon to mix until all the flour is incorporated. Dough will be wet and sloppy – not kneadable, but not runny like cake batter. Adjust with more water or flour if needed for right consistency (see video at 17 sec, Note 5).\nRise: Cover with cling wrap or plate, leave on counter for 2 - 3 hours until it doubles in volume, it’s wobbly like jelly and the top is bubbly (see video at 24 seconds). If after 1 hour it doesn’t seem to be rising, move it somewhere warmer (Note 6).\nOptional – refrigerate for flavour development (Note 9): At this stage, you can either bake immediately (move onto Step 5) or refrigerate for up to 3 days.\nTake chill out of refrigerated dough – if you refrigerated dough per above, leave the bowl on the counter for 45 - 60 minutes while the oven is preheating. Cold dough does not rise as well.\nPreheat oven (Note 7) - Put dutch oven in oven with lid on (26cm/10\" or larger). Preheat to 230°C/450°F (220° fan) 30 minutes prior to baking. (Note 8 for no dutch oven)\nShape dough: Sprinkle work surface with 1 tbsp flour, scrape dough out of bowl. Sprinkle top with 1/2 tbsp flour.\nUsing a dough scraper or anything of similar shape (cake server, large knife, spatula), fold the sides inwards (about 6 folds) to roughly form a roundish shape. Don’t be too meticulous here – you’re about to deform it, it’s more about deflating the bubbles in the dough and forming a shape you can move.\nTransfer to paper: Slide a large piece of parchment/baking paper (not wax paper) next to the dough, then flip the dough upside down onto the paper (ie seam side down, smooth side up). Slide/push it towards the middle, then reshape it into a round(ish) shape. Don't get too hung up about shape. In fact, lopsided = more ridges = more crunchy bits!\nDough in pot: Remove piping hot dutch oven from oven. Use paper to place dough into pot, place lid on.\nBake 30 minutes covered, then 12 minutes uncovered or until deep golden and crispy.\nCool on rack for 10 minutes before slicing.", "preptime": "5 min", "cooktime": "40 min", "servings": "10", "tags": "Baking, Artisan Bread, Crusty Bread, Easy Homemade Bread, No Knead Bread, No Yeast Bread", "notes": "Recipe video above. This super crusty homemade bread recipe is going to blow your mind! The world’s easiest yeast bread that’s just like the very best artisan bread you pay top dollar for, with an incredible crispy, chewy crust, and big fat holes like sourdough. Recipe is forgiving so don’t fret if things don’t go perfectly, it will be salvageable. SEE NOTES for options like no dutch oven, different yeast, MAKE AHEAD up to 3 days! And tomorrow, make the Cheese Bread version!", "url": "https://www.recipetineats.com/easy-yeast-bread-recipe-no-knead/", "date": "", "rating": 0}, {"id": 151, "name": "Google", "cuisine": "Other", "source": "google.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "", "url": "https://www.google.com/webhp?client=firefox-b-1-m&channel=ts", "date": "", "rating": 0}, {"id": 152, "name": "Pastilla Recipe (Skillet Chicken Pie)", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "2 pounds boneless skinless chicken thighs\nKosher salt and black pepper\nExtra virgin olive oil\n1 large yellow onion, (halved, and thinly sliced)\n2 garlic cloves, (minced)\n6 medjool dates, (pitted, and chopped)\n1/3 cup sliced almonds, (toasted)\n½ cup chopped parsley\n3 eggs, (beaten)\n10 sheets phyllo dough\n2 teaspoons Ras El Hanout\n1 teaspoon cinnamon\n½ teaspoon ground ginger\n½ teaspoon red pepper flakes\n¼ teaspoon turmeric", "instructions": "Pat the chicken dry and season with kosher salt and black pepper on both sides.\nIn a large pan, heat 2 tablespoons extra virgin olive oil over medium-high heat. Add the chicken and sear until brown on both sides (about 5 minutes or so). Remove the chicken from the pan and set aside for now.\nIn the same pan, add the onion slices and garlic, if needed, add a little more olive oil. Season with a good pinch of kosher salt. Cook over medium heat, tossing regularly until softened.\nAdd ¾ cup of water and the spices. Bring to a boil, then return the chicken pack to the pan. Cook over medium-high heat for about 10 to 15 minutes or until the chicken is fully cooked through and the liquid has reduced by 1/2.\nCarefully remove the chicken from the pan onto a cutting board. Using two forks (or a fork and knife), shred or break the chicken up into small pieces.\nTo the pan of liquid, stir in the beaten eggs. Return the chicken to the pan and stir to combine. Stir in the chopped dates, almonds, and parsley. Remove from the heat\nTurn the oven on to 375 degrees F and adjust a rack in the middle.\nPrepare a 10-inch pie dish or heat-safe skillet and brush the bottoms and sides with extra virgin olive oil.\nTake one sheet of phyllo dough and fold it in half vertically (the long way). Brush the top of the folded phyllo with extra virgin olive oil. Now lay the folded phyllo sheet in the middle with the sides hanging on either side of the pan. Repeat with 7 more sheets of the phyllo, making sure each sheet is folded and brushed with oil. Layer the phyllo sheets in the pan so that they overlap, rotating the pan so that the phyllo will cover it on all sides (there should be phyllo slack hanging over on all sides of the pan).\nSpread the chicken mixture over the phyllo. Cover with the remaining 2 sheets of phyllo, making sure to brush each layer with olive oil. Fold the phyllo sides (or slack) over to cove. Brush the top with extra virgin olive oil.\nBake on the center rack of your heated oven for 15 to 20 minutes or until the phyllo is fully cooked and golden brown (rotate the pan occasionally to make sure you get even color on all sides).", "preptime": "30 min", "cooktime": "20 min", "servings": "8", "tags": "Dessert, Bastilla, Chicken Pastilla, Moroccan Pastilla", "notes": "This savory chicken pie is made with flaky phyllo dough and a tender, richly seasoned chicken filling with warm North African flavors including Ras El Hanout. If you want to work ahead, make the succulent chicken filling a day ahead and keep it in the fridge. Pastilla is delicious served by itself, or with roasted vegetables, Moroccan-style carrot salad, or another big salad like my Mediterranean bean salad.", "url": "https://www.themediterraneandish.com/pastilla-recipe/#wprm-recipe-container-44970", "date": "", "rating": 0}, {"id": 153, "name": "Apple Cider Muffins", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "3/4 cup (180g/ml) fresh apple cider (NOT apple cider vinegar)\n1 and 3/4 cups (219g) all-purpose flour\n1 teaspoon baking powder\n1/2 teaspoon baking soda\n3/4 teaspoon salt\n2 teaspoons ground cinnamon\n1/4 teaspoon ground allspice\n1/4 teaspoon ground cloves\n1/4 teaspoon ground nutmeg\n1/2 cup (113g/120ml) vegetable oil or melted coconut oil\n1/2 cup (100g) light or dark brown sugar\n1/2 cup (100g) granulated sugar\n2 large eggs, at room temperature\n1/4 cup (60g) unsweetened applesauce\n1 and 1/2 cups (210g) peeled and shredded apple (about 1.5–2 apples)\n3/4 cup (90g) chopped walnuts (optional)\n1/2 cup (100g) granulated sugar\n1 and 1/2 teaspoons ground cinnamon\n2 Tablespoons (28g) unsalted butter, melted", "instructions": "Reduce the apple cider: In a small saucepan, bring the apple cider to a simmer over medium heat. Simmer, stirring occasionally, until it has reduced to 1/4 cup (60g/ml), about 20 minutes. It won’t necessarily be any thicker, but it should be a bit darker. Pour the reduced apple cider into a heat-safe bowl or glass liquid measuring cup, and set aside (or refrigerate to speed things up) to cool to room temperature before using in step 4.\nMeanwhile, preheat the oven to 425°F (218°C). Spray a 12-count muffin pan with nonstick spray or use muffin liners. Set aside.\nIn a large bowl, whisk together the flour, baking powder, baking soda, salt, cinnamon, allspice, cloves, and nutmeg.\nIn a medium bowl, whisk the oil, brown sugar, granulated sugar, eggs, applesauce, and reduced apple cider until combined. Pour the oil mixture into the flour mixture and whisk until combined. Fold in the shredded apple and chopped walnuts (if using).\nDivide the batter evenly among the muffin liners, filling all the way up to the top.\nBake for 5 minutes at 425°F. Reduce the oven temperature to 350°F (177°C). Continue to bake until a toothpick inserted in the center comes out clean, about 15–16 minutes more. Cool the muffins in the pan set on a cooling rack for 10 minutes, then transfer the muffins from the pan to the rack.\nWhisk the sugar and cinnamon together in a medium bowl. Lightly brush the top of a warm muffin with melted butter then dip the top into the cinnamon-sugar. Peel off the liner and roll the entire muffin in the cinnamon-sugar to fully coat. (Or coat just the tops.)\nCover lightly and store at room temperature for up to 3 days or in the refrigerator for up to 1 week. The sugared coating draws out moisture, so the muffins become a bit sticky by day 2.", "preptime": "40 min", "cooktime": "30 min", "servings": "12", "tags": "Breakfast, Apple Cider Muffins", "notes": "These apple cider spice muffins have deep apple flavor and a moist texture thanks to a triple-dose of pure apple: apple cider, applesauce, and shredded apple. Like fall-favorite apple cider donuts, in muffin form! Be sure to use fresh apple cider, not hard cider and not apple cider vinegar.", "url": "https://sallysbakingaddiction.com/apple-cider-spice-muffins/?utm_source=convertkit&utm_medium=email&utm_campaign=%F0%9F%8D%8E+NEW+RECIPE%21+Apple+Cider+Spice+Muffins+-+18822794", "date": "", "rating": 0}, {"id": 154, "name": "Thai Pineapple Fried Rice", "cuisine": "Thai", "source": "cookieandkate.com", "location": "", "ingredients": "2 tablespoons coconut oil or quality vegetable oil, divided\n2 eggs, beaten with a dash of salt\n1 &frac12; cups chopped fresh pineapple\n1 large red bell pepper, diced\n&frac34; cup chopped green onions (about &frac12; bunch)\n2 cloves garlic, pressed or minced\n&frac12; cup chopped raw, unsalted cashews\n2 cups cooked and chilled brown rice*, preferably long-grain brown jasmine rice\n1 tablespoon reduced-sodium tamari or soy sauce\n1 to 2 teaspoons chili garlic sauce or sriracha\n1 small lime, halved\nSalt, to taste\nHandful of fresh cilantro leaves, torn into little pieces, for garnishing", "instructions": "Heat a large wok, cast iron skillet or non-stick frying pan over medium-high heat and place an empty serving bowl nearby. Once the pan is hot enough that a drop of water sizzles on contact, add 1 teaspoon oil. Pour in the eggs and cook, stirring frequently, until the eggs are scrambled and lightly set, about 30 seconds to 1 minute. Transfer the eggs to the empty bowl. Wipe out the pan if necessary with a paper towel (be careful, it’s hot!).\nAdd 1 tablespoon oil to the pan and add the pineapple and red pepper. Cook, stirring constantly, until the liquid has evaporated and the pineapple is caramelized on the edges, about 3 to 5 minutes. Then add the green onion and garlic. Cook until fragrant while stirring constantly, about 30 seconds. Transfer the contents of the pan to your bowl of eggs.\nReduce the heat to medium and add the remaining 2 teaspoons oil to the pan. Pour in the cashews and cook until fragrant, stirring constantly, about 30 seconds. Add the rice to the pan and stir to combine. Cook until the rice is hot, stirring occasionally, about 3 minutes.\nPour the contents of the bowl back into the pan and stir to combine, breaking up the scrambled eggs with your spoon. Cook until the contents are warmed through, then remove the pan from heat. Add the tamari and chili garlic sauce, to taste. Squeeze the juice of &frac12; lime over the dish and stir to combine. Season to taste with salt and set aside.\nSlice the remaining &frac12; lime into 4 wedges. Transfer the stir-fry to individual serving bowls and garnish each bowl with a lime wedge and a light sprinkle of cilantro. Serve with bottles of tamari and chili garlic sauce or sriracha on the side, for those who might want to add more to their bowls.", "preptime": "15 min", "cooktime": "10 min", "servings": "2", "tags": "Main", "notes": "Thai-style sweet and spicy pineapple fried rice with red bell pepper, cashews and cilantro. This is a healthy and quick, vegetarian weeknight dinner! This dish comes together very quickly, so be sure to have your ingredients (including chilled leftover rice) prepped in advance. Recipe yields 2 large, restaurant-sized portions or 4 more modest portions.", "url": "https://cookieandkate.com/thai-pineapple-fried-rice-recipe/#tasty-recipes-23757-jump-target", "date": "", "rating": 0}, {"id": 155, "name": "Sweet Potato Cheesecake", "cuisine": "American", "source": "mybakingaddiction.com", "location": "", "ingredients": "8 ounces gingersnap cookies (crushed (about 25 cookies))\n4 tablespoons unsalted butter (melted)\n2 pounds sweet potatoes\n24 ounces cream cheese (room temperature (three 8-ounce packages))\n1 cup granulated sugar\n3 large eggs (room temperature)\n2 teaspoons pumpkin pie spice\n2 teaspoons pure vanilla extract\n1/4 cup heavy whipping cream\nSalted caramel sauce\nHomemade whipped cream\nToasted pecans", "instructions": "Preheat oven to 350°F.\nTightly wrap a 9 inch springform pan in heavy duty foil. This step prevents leaks when using a water bath. I also take the extra step by placing the foil wrapped spring form pan inside an oven bag while baking, but this is optional (see recipe notes below for more info on this process). Lightly spray the springform pan with nonstick cooking spray. Set aside.\nLightly spray pan with nonstick cooking spray. Set aside.\nIn a medium bowl, stir together crushed gingersnap cookies and melted butter until thoroughly combined.\nPress the crumbs into the bottom and about 1 inch up the sides of the prepared springform pan.\nBake gingersnap crust in preheated oven for 8 minutes. Remove pan from oven and cool completely. Increase oven temperature to 400°F.\nPlace sweet potatoes on a baking sheet and pierce each sweet potato several times with the tines of a fork. Bake until tender, about 50 minutes. Cool sweet potatoes completely.\nOnce sweet potatoes are cool, peel and puree them. I used a food processor, but you can also use a blender.\nReturn oven to 350°F.\nIn the bowl of a stand mixer fitted with your paddle attachment, beat the cream cheese until smooth. Add sugar and mix until combined. Add eggs, one at a time, fully incorporating each before adding the next. Make sure to scrape down the bowl in between each egg. Add in pumpkin pie spice, vanilla, heavy cream and sweet potato puree and mix until smooth.\nPour batter into prepared crust. Place pan into a larger pan and pour boiling water into the larger pan until it is halfway up the side of the cheesecake pan.\nBake 55-60 minutes, the edges will appear to be set, but the center will still have some jiggle to it. At this point, turn off the oven, but leave the door cracked and allow the cheesecake to rest in the cooling oven for one hour.\nAfter one hour has passed, carefully remove the cheesecake from the water bath and place on a cooling rack to cool completely. Once the cheesecake is completely cooled, place it into the refrigerator for at least 8 hours.\nBefore serving, top with whipped cream, chopped pecans and salted caramel sauce.", "preptime": "30 min", "cooktime": "110 min", "servings": "12", "tags": "Dessert, Cheesecake, Cream Cheese, Holiday Recipes, Sweet Potato, Thanksgiving", "notes": "Sweet potato cheesecake is smooth, creamy cross between sweet potato pie and your favorite cheesecake. The buttery gingersnap crust makes it irresistible.", "url": "https://www.mybakingaddiction.com/sweet-potato-cheesecake/", "date": "", "rating": 0}, {"id": 156, "name": "Sweet Potato Cheesecake", "cuisine": "American", "source": "mybakingaddiction.com", "location": "", "ingredients": "8 ounces gingersnap cookies (crushed (about 25 cookies))\n4 tablespoons unsalted butter (melted)\n2 pounds sweet potatoes\n24 ounces cream cheese (room temperature (three 8-ounce packages))\n1 cup granulated sugar\n3 large eggs (room temperature)\n2 teaspoons pumpkin pie spice\n2 teaspoons pure vanilla extract\n1/4 cup heavy whipping cream\nSalted caramel sauce\nHomemade whipped cream\nToasted pecans", "instructions": "Preheat oven to 350°F.\nTightly wrap a 9 inch springform pan in heavy duty foil. This step prevents leaks when using a water bath. I also take the extra step by placing the foil wrapped spring form pan inside an oven bag while baking, but this is optional (see recipe notes below for more info on this process). Lightly spray the springform pan with nonstick cooking spray. Set aside.\nLightly spray pan with nonstick cooking spray. Set aside.\nIn a medium bowl, stir together crushed gingersnap cookies and melted butter until thoroughly combined.\nPress the crumbs into the bottom and about 1 inch up the sides of the prepared springform pan.\nBake gingersnap crust in preheated oven for 8 minutes. Remove pan from oven and cool completely. Increase oven temperature to 400°F.\nPlace sweet potatoes on a baking sheet and pierce each sweet potato several times with the tines of a fork. Bake until tender, about 50 minutes. Cool sweet potatoes completely.\nOnce sweet potatoes are cool, peel and puree them. I used a food processor, but you can also use a blender.\nReturn oven to 350°F.\nIn the bowl of a stand mixer fitted with your paddle attachment, beat the cream cheese until smooth. Add sugar and mix until combined. Add eggs, one at a time, fully incorporating each before adding the next. Make sure to scrape down the bowl in between each egg. Add in pumpkin pie spice, vanilla, heavy cream and sweet potato puree and mix until smooth.\nPour batter into prepared crust. Place pan into a larger pan and pour boiling water into the larger pan until it is halfway up the side of the cheesecake pan.\nBake 55-60 minutes, the edges will appear to be set, but the center will still have some jiggle to it. At this point, turn off the oven, but leave the door cracked and allow the cheesecake to rest in the cooling oven for one hour.\nAfter one hour has passed, carefully remove the cheesecake from the water bath and place on a cooling rack to cool completely. Once the cheesecake is completely cooled, place it into the refrigerator for at least 8 hours.\nBefore serving, top with whipped cream, chopped pecans and salted caramel sauce.", "preptime": "30 min", "cooktime": "110 min", "servings": "12", "tags": "Dessert, Cheesecake, Cream Cheese, Holiday Recipes, Sweet Potato, Thanksgiving", "notes": "Sweet potato cheesecake is smooth, creamy cross between sweet potato pie and your favorite cheesecake. The buttery gingersnap crust makes it irresistible.", "url": "https://www.mybakingaddiction.com/sweet-potato-cheesecake/#wprm-recipe-container-30867", "date": "", "rating": 0}, {"id": 157, "name": "Béarnaise Sauce (Easy & No-Fail)", "cuisine": "American", "source": "downshiftology.com", "location": "", "ingredients": "¼ cup dry white wine\n¼ cup white wine vinegar\n1 small shallot (peeled and thinly sliced)\n1 tablespoon tarragon leaves\n3 egg yolks\n1 teaspoon lemon juice\n¼ teaspoon kosher salt\n½ cup unsalted butter or ghee (melted and hot (add more for a thinner consistency))\n2 teaspoons finely chopped tarragon leaves", "instructions": "Make the infused vinegar. Add the wine, vinegar, shallot, and tarragon to a small saucepan over medium-high heat. Bring to a boil, then reduce the heat to a simmer, until the liquid has reduced to about 1½ tablespoons (about 5 to 7 minutes).\nStrain it through a fine-mesh sieve, using the back of a spoon to extract as much flavor as possible into the liquid. Let it cool for 5 minutes.\nMelt the butter in a microwave (make sure sure the cup or bowl is covered as it will splatter) for about 1 minute, until it's hot. Alternatively, you could heat it on the stove.\nIn a high-powered blender, add the egg yolks, infused vinegar, lemon juice, and salt. Blend for 5 seconds until combined.\nStream in the butter. With the blender running on medium-high, slowly stream the hot butter through the top lid cap opening and into the mixture until it's emulsified.\nAdd fresh herbs. Pour the bearnaise sauce into a small bowl, stir in the finely chopped tarragon, and serve while warm.", "preptime": "10 min", "cooktime": "5 min", "servings": "4", "tags": "Sauce, Bearnaise Sauce, Bearnaise Sauce Recipe", "notes": "A drizzle of this easy béarnaise sauce instantly elevates any dish — especially steak! Watch the video below to see how this sauce comes together.", "url": "https://downshiftology.com/recipes/bearnaise-sauce/", "date": "", "rating": 0}, {"id": 158, "name": "Roasted Brussels Sprouts: Delightful Butternut Squash with Maple Walnuts & Cranberries", "cuisine": "American", "source": "jenniferrecipes.com", "location": "", "ingredients": "1 pound Brussels sprouts\n2 cups butternut squash, diced\n1/2 cup walnuts, chopped\n1/3 cup dried cranberries\n3 tablespoons maple syrup\n2 tablespoons olive oil\nsalt to taste\npepper to taste", "instructions": "Preheat the oven to 400°F (200°C).\nToss the Brussels sprouts and butternut squash with olive oil, salt, and pepper.\nSpread the mixture on a baking sheet and roast for 20-25 minutes until tender.\nIn a small pan, toast the walnuts over medium heat until golden.\nIn the last 5 minutes of roasting, drizzle the maple syrup over the vegetables.\nRemove from the oven, add toasted walnuts and cranberries, and serve warm.", "preptime": "15 min", "cooktime": "25 min", "servings": "4", "tags": "Side, Roasted Brussels Sprouts, Butternut Squash, Maple Walnuts, Cranberries", "notes": "Enjoy a delicious mix of roasted Brussels sprouts and butternut squash topped with sweet maple walnuts and tart cranberries.", "url": "https://jenniferrecipes.com/roasted-brussels-sprouts-delightful-butternut-squash-with-maple-walnuts-cranberries/#tasty-recipes-16551-jump-target", "date": "", "rating": 0}, {"id": 159, "name": "Adult Classes – Taste & Technique", "cuisine": "Other", "source": "tasteandtechniquenj.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "", "url": "https://www.tasteandtechniquenj.com/category/adult-classes/", "date": "", "rating": 0}, {"id": 160, "name": "Shortbread", "cuisine": "Other", "source": "christinascucina.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.christinascucina.com/how-to-make-shortbread/", "date": "", "rating": 0}, {"id": 161, "name": "Creamy Chicken Noodle Soup", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "1 Tablespoon (14g) unsalted butter\n3/4 cup (100g) chopped yellow onion (1/2 of a large onion)\n1 cup (120g) sliced or diced carrots (1–2 large carrots or a handful of baby carrots)\n1 cup (120g) sliced or diced celery (2–3 stalks)\n2 garlic cloves, minced\n1/4 cup (31g) all-purpose flour (spooned & leveled)\n1/2 teaspoon salt\n1/2 teaspoon fresh ground pepper\n1 teaspoon dried thyme leaves (or 2 teaspoons fresh)\n1/2 teaspoon dried oregano (or 1 teaspoon fresh)\n8 cups (1.92 liters) chicken broth (I recommend reduced sodium)\n1 medium potato, peeled and diced (around 1 and 1/2 cups or 280g)\n2 cups (about 250g) shredded or chopped cooked chicken\n1 cup (240ml) half-and-half or whole milk\n3-4 cups (about 112-150g) uncooked wide egg noodles (or other dry pasta, see note first)\noptional for garnish: fresh thyme leaves", "instructions": "Melt the butter in a large pot or dutch oven (4-quart or larger) over medium heat. Add the onion, carrots, celery, and garlic. Cook, stirring occasionally, for 5 minutes or until vegetables have softened. Stir in flour, salt, pepper, thyme, and oregano and cook for 2 minutes.\nNext, add the chicken broth and potato. Give everything a quick stir, then increase the heat to medium-high. Bring the soup to a boil, without stirring, and boil for 3 minutes. Reduce the heat to medium-low, partially cover the pot, and allow to simmer for 25 minutes or until the potatoes have softened. Taste the soup, and add more seasonings to taste, if desired.\nAdd the chicken, half-and-half/milk, and noodles. Cook for 10 minutes until the noodles are tender and the soup has thickened. Once again, taste the soup and add more seasoning as desired. Serve warm.\nCover and store leftovers in the refrigerator for up to 1 week. To reheat, simply pour into a pot over medium heat and cook until warm. Feel free to add more chicken broth to the leftovers if it’s too thick. (Soup thickens in the refrigerator as the noodles and potatoes soak up the liquid.)", "preptime": "30 min", "cooktime": "40 min", "servings": "12", "tags": "Soup, Creamy Chicken Noodle Soup", "notes": "This creamy chicken noodle soup is creamy yet light, and benefits from the addition of potato, flavorful thyme and oregano, and convenient pre-cooked rotisserie chicken. You can make it on the stove or slow cooker (see Note for slow cooker instructions).", "url": "https://sallysbakingaddiction.com/lightened-creamy-chicken-noodle-soup/#tasty-recipes-73990", "date": "", "rating": 0}, {"id": 162, "name": "Strawberry Muffins", "cuisine": "American", "source": "onceuponachef.com", "location": "", "ingredients": "2 cups + 2 teaspoons all-purpose flour, divided\n2 teaspoons baking powder\n¾ teaspoon salt\n1 stick or ½ cup unsalted butter, softened\n1 cup granulated sugar\n2 large eggs\n1½ teaspoons vanilla extract\n¼ teaspoon almond extract\n½ cup milk\n2¼ cups diced strawberries, from 1 pint, divided\n2 tablespoons demerara (also called turbinado or raw) sugar, for topping", "instructions": "Preheat the oven to 375°F. Line a 12-cup muffin tin with paper liners; spray the liners and the pan with non-stick cooking spray.\nIn a medium bowl, whisk together 2 cups of the flour, the baking powder and salt.\nIn the bowl of an electric mixer, beat the butter and granulated sugar for about 2 minutes. Add the eggs one at a time, scraping down the sides of the bowl and beating well after each addition. Beat in the vanilla extract and almond extract. (The batter may look a little grainy -- that's okay).\nWith the mixer on low, add the flour mixture in three separate additions, alternating with the milk and ending with the flour.\nToss the strawberries with the remaining 2 teaspoons of flour (this will keep them from sinking to the bottom). Set ½ cup of the berries aside. Add the remaining berries to the batter and fold with a spatula until evenly distributed. Do not overmix.\nScoop the batter into the prepared muffin tin (an ice-cream scoop with a wire scraper works well here); they will be very full. Scatter the reserved berries evenly over the muffins, then sprinkle the turbinado sugar over the center of each muffin (keeping the sugar away from the edges will prevent sticking).\nBake for about 30 minutes, until lightly golden and a cake tester comes out clean. Run a sharp knife around the top edge of each muffin to free it from the pan if necessary (the edges can stick), then let the muffins cool in the pan for about 25 minutes. Transfer the muffins to a rack to cool completely.\nFreezer-Friendly Instructions: These muffins can be frozen for up to 3 months. After they are completely cooled, double-wrap it securely with aluminum foil or plastic freezer wrap, or place it in heavy-duty freezer bag. Thaw overnight on the countertop.", "preptime": "20 min", "cooktime": "30 min", "servings": "12", "tags": "After School Snack, Easter, Mother'S Day, Spring, Strawberries, Summer", "
