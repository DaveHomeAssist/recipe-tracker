6", "date": "", "rating": 0}, {"id": 78, "name": "One Pot Spanish Chickpea Chicken", "cuisine": "Spanish", "source": "kristineskitchenblog.com", "location": "", "ingredients": "1 tablespoon olive oil\n1.25 pounds boneless skinless chicken thighs (about 4 pieces*)\nsalt and pepper\n1 small onion (chopped)\n1 red bell pepper (chopped)\n4 cloves garlic (minced)\n1 teaspoon smoked paprika\n½ teaspoon cumin\n15 ounce can diced tomatoes\n1 ¾ cups low sodium chicken broth (1¾ cups equals one 14.5 ounce can)\n1 cup long grain brown rice (rinsed and drained)\n15 ounce can chickpeas (rinsed and drained)\nchopped fresh parsley (for garnish)", "instructions": "Heat olive oil in large skillet over medium-high heat. Season the chicken with salt and pepper and add it to the hot pan. Brown the chicken on both sides, about 3 minutes per side, and then transfer to a clean plate.\nReduce the heat under the skillet to medium. Add the onion and bell pepper to the skillet and cook, stirring occasionally, until softened, 2-3 minutes. Add the garlic and cook for 30 seconds, stirring.\nAdd 1 teaspoon salt, ¼ teaspoon black pepper, the smoked paprika, cumin, diced tomatoes, and broth. Stir to combine. Stir in the rice and chickpeas. Nestle the chicken back into the mixture in the skillet.\nBring to a low simmer, cover, and cook for 35-40 minutes, until rice is tender and most of the liquid is absorbed. Stir gently every 10 minutes to make sure the rice cooks evenly.\nGarnish with fresh parsley and serve.", "preptime": "15 min", "cooktime": "40 min", "servings": "4", "tags": "Main, Chicken And Chickpeas, One Pot Chicken, One Pot Meal, Spanish Chicken", "notes": "This One Pot Spanish Chickpea Chicken is an easy, family-friendly dinner! You’ll love how the flavors come together in this healthy one pan meal!", "url": "https://kristineskitchenblog.com/one-pot-spanish-chickpea-chicken/", "date": "", "rating": 0}, {"id": 79, "name": "These paprika potato chips with ranch dip are better (and better for you) than store-bought", "cuisine": "Other", "source": "washingtonpost.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "Sauce", "notes": "A potato chips recipe that's crunchy and smoky and healthful, too!", "url": "https://www.washingtonpost.com/food/2021/05/20/potato-chips-recipe/", "date": "", "rating": 0}, {"id": 80, "name": "Pasta e Fagioli Soup {Olive Garden Copycat Recipe}", "cuisine": "American", "source": "cookingclassy.com", "location": "", "ingredients": "2 Tbsp olive oil, (divided)\n1 lb lean ground beef\n1 1/2 cups chopped yellow onion\n1 cup diced carrots ((about 2 medium))\n1 cup diced celery ((about 3 stalks))\n3 cloves garlic, (minced (1 Tbsp))\n3 (8 oz) cans tomato sauce\n2 14.5 oz cans low-sodium chicken broth\n1/2 cup water, (then more as desired)\n1 (15 oz) can diced tomatoes\n2 tsp granulated sugar\n1 1/2 tsp dried basil\n1 tsp dried oregano\n3/4 tsp dried thyme\n1/2 tsp dried marjoram\nSalt and freshly ground black pepper\n1 cup dry ditalini pasta\n1 (15 oz) can dark red kidney beans, drained and rinsed\n1 (15 oz) can great northern beans, drained and rinsed\nFinely shredded Romano or Parmesan cheese (, for serving)\n3 Tbsp minced fresh parsley", "instructions": "Heat 1 Tbsp olive oil in a large pot over medium high heat, crumble in ground beef and cook, stirring occasionally until cooked through.\nDrain fat from beef then transfer beef to a plate, set aside. Heat remaining 1 Tbsp olive oil in same pot.\nAdd onions, carrots, and celery and saute over medium-high heat until tender about 6 minutes, add garlic and saute 1 minute longer.\nAdd chicken broth, tomato sauce, water, canned tomatoes, sugar, basil, oregano, thyme, marjoram and cooked beef then season with salt and pepper to taste.\nBring to a boil then reduce heat to medium-low, cover with lid and allow to simmer, stirring occasionally, until veggies are soft, about 15 - 20 minutes.\nMeanwhile prepare ditalani pasta according to directions on package, cooking to al dente.\nAdd cooked and drained pasta to soup* along with kidney beans and great northern beans. Thin with a little more broth or water if desired.\nAllow to cook 1 minute longer. Stir in parsley, serve warm with grated Romano or Parmesan cheese.", "preptime": "15 min", "cooktime": "35 min", "servings": "6", "tags": "Soup, Pasta Fagioli", "notes": "This Pasta e Fagioli is one of my all time favorite soups and one of my most popular recipes! It's loaded with vegetables and brimming with Italian flavor. It's perfectly comforting, hearty and absolutely delicious!", "url": "https://www.cookingclassy.com/olive-garden-pasta-e-fagioli-soup-copycat-recipe/#jump-to-recipe", "date": "", "rating": 0}, {"id": 81, "name": "Patatas bravas", "cuisine": "Spanish", "source": "bbcgoodfood.com", "location": "", "ingredients": "3 tbsp olive oil\n1 small onion chopped\n2 garlic cloves chopped\n227g can chopped tomatoes\n1 tbsp tomato purée\n2 tsp sweet paprika (pimenton)\ngood pinch chilli powder\npinch sugar\nchopped fresh parsley to garnish\n900g potatoes cut into small cubes\n2 tbsp olive oil", "instructions": "Heat the oil in a pan and fry the onion for about 5 mins until softened. Add the garlic, chopped tomatoes, tomato purée, sweet paprika, chilli powder, sugar and a pinch of salt, then bring to the boil, stirring occasionally. Lower to a simmer and cook for 10 mins until pulpy. Can be kept chilled for up to 24 hrs.\nHeat oven to 200C/180C fan/gas 6. Pat the potatoes dry with kitchen paper, then tip into a roasting tin and toss in the olive oil and some seasoning. Roast for 40-50 mins until crisp and golden. Tip the potatoes into serving dishes and spoon over the tomato sauce. Sprinkle with some fresh parsley to serve.", "preptime": "35 min", "cooktime": "50 min", "servings": "Serves 10-12 as a side", "tags": "Snack, Chilli, Garlic Clove, Garlic Cloves, Mary Cadogan, Paprika", "notes": "Make this classic tapas dish part of your cooking repertoire – it's simply potatoes in a spicy tomato sauce.", "url": "https://www.bbcgoodfood.com/recipes/1177/patatas-bravas", "date": "", "rating": 0}, {"id": 82, "name": "Homemade Pita Bread", "cuisine": "Mediterranean", "source": "cooking.nytimes.com", "location": "", "ingredients": "2 teaspoons active dry yeast\n1/2 teaspoon granulated sugar\n35 grams whole-wheat flour (1/4 cup), preferably freshly milled\n310 grams unbleached all-purposed flour (2 1/2 cups)\n1 teaspoon kosher salt\n2 tablespoons olive oil", "instructions": "Make sponge: Put 1 cup lukewarm water in a large mixing bowl. Add yeast and sugar. Stir to dissolve. Add the whole-wheat flour and 1/4 cup all-purpose flour and whisk together. Put bowl in a warm (not hot) place, uncovered, until mixture is frothy and bubbling, about 15 minutes.\nAdd salt, olive oil and nearly all remaining all-purpose flour (reserve 1/2 cup). With a wooden spoon or a pair of chopsticks, stir until mixture forms a shaggy mass. Dust with a little reserved flour, then knead in bowl for 1 minute, incorporating any stray bits of dry dough.\nTurn dough onto work surface. Knead lightly for 2 minutes, until smooth. Cover and let rest 10 minutes, then knead again for 2 minutes. Try not to add too much reserved flour; the dough should be soft and a bit moist. (At this point, dough may refrigerated in a large zippered plastic bag for several hours or overnight. Bring dough back to room temperature, knead into a ball and proceed with recipe.)\nClean the mixing bowl and put dough back in it. Cover bowl tightly with plastic wrap, then cover with a towel. Put bowl in a warm (not hot) place. Leave until dough has doubled in size, about 1 hour.\nHeat oven to 475 degrees. On bottom shelf of oven, place a heavy-duty baking sheet, large cast-iron pan or ceramic baking tile. Punch down dough and divide into 8 pieces of equal size. Form each piece into a little ball. Place dough balls on work surface, cover with a damp towel and leave for 10 minutes.\nRemove 1 ball (keeping others covered) and press into a flat disk with rolling pin. Roll to a 6-inch circle, then to an 8-inch diameter, about 1/8 inch thick, dusting with flour if necessary. (The dough will shrink a bit while baking.)\nCarefully lift the dough circle and place quickly on hot baking sheet. After 2 minutes the dough should be nicely puffed. Turn over with tongs or spatula and bake 1 minute more. The pita should be pale, with only a few brown speckles. Transfer warm pita to a napkin-lined basket and cover so bread stays soft. Repeat with the rest of the dough balls.", "preptime": "", "cooktime": "", "servings": "Eight (6-inch) breads", "tags": "Baking, Active Dry Yeast, Five Ingredient, Flatbread, Plan-Ahead", "notes": "Is it worth making pita at home? Absolutely. Store-bought pita (like store-bought sandwich bread) is often several days old. Warm, fragrant home-baked pita is obviously superior, and there’s a bit of a thrill when the breads puff up in the oven. And once you get the hang of it, it’s not difficult. For the best flavor, try to get freshly milled whole-wheat flour. Even though only a little is called for in the recipe, it makes a difference.", "url": "https://cooking.nytimes.com/recipes/1016071-homemade-pita-bread?action=click&module=RecipeBox&pgType=recipebox-page&region=all&rank=0", "date": "", "rating": 0}, {"id": 83, "name": "Pork Lo Mein", "cuisine": "Chinese", "source": "simplejoy.com", "location": "", "ingredients": "1 1/2 pounds pork tenderloin (cut thin )\n3 tablespoons sesame oil\n1/3 cup reduced sodium soy sauce\n1/4 cup brown sugar\n2 tablespoons oyster sauce\n1 - 2 tablespoons chile sauce ((depending on how spicy you want it))\n2 teaspoons corn starch\n8 ounces lo mein noodles\n1 red bell pepper (sliced into thin strips)\n8 ounces white mushrooms (sliced)\n2 carrots (cut into matchstick pieces)\n2 cups broccoli florets\n1 cup snow peas\n8 ounces water chestnuts (drained)\nscallions (diced for garnish)\nsesame seeds (for garnish)", "instructions": "Heat a large pot of water until it comes to a roaring boil. Season with salt. Cook the noodles according to package instructions. Drain the noodles, drizzle with 1 teaspoon sesame oil, and cover to keep warm.\nIn a small bowl, whisk together 1/3 cup reduced sodium soy sauce, 1/4 cup brown sugar, 2 tablespoons oyster sauce, 1-2 tablespoons chile sauce, and 2 teaspoons cornstarch. Set aside.\nHeat 3 tablespoons of sesame oil in a large skilet. Add the pork and cook for 1 to 2 minutes - no need for it to cook all the way through.\nAdd the vegetables and cook, stirring occasionally, until tender, about 5 to 7 minutes, covered. Add the sauce, water chestnuts, and noodles to the skillet and stir to combine. Cook for an additional minute or two to allow the flavors to combine.\nServe and enjoy.", "preptime": "15 min", "cooktime": "15 min", "servings": "6", "tags": "Main, Dinner Recipe", "notes": "This Pork Lo Mein recipe is one of our favorites! The perfect sauce coats delicious noodles, vegetables, and the most tender pork.", "url": "https://www.simplejoy.com/pork-lo-mein/", "date": "", "rating": 0}, {"id": 84, "name": "Potato Kielbasa Skillet", "cuisine": "Other", "source": "tasteofhome.com", "location": "", "ingredients": "1 pound red potatoes (3-4 medium), cut into 1-inch pieces\n3 tablespoons water\n2 tablespoons brown sugar\n2 tablespoons cider vinegar\n1 tablespoon Dijon mustard\n1-1/2 teaspoons minced fresh thyme or 1/2 teaspoon dried thyme\n1/4 teaspoon pepper\n1 tablespoon olive oil\n1/2 cup chopped onion\n3/4 pound smoked kielbasa or Polish sausage, cut into 1/4-inch slices\n4 cups fresh baby spinach\n5 bacon strips, cooked and crumbled", "instructions": "Place the potatoes and water in a microwave-safe dish. Cover the dish and microwave on high until the potatoes are tender, three to four minutes. Drain the potatoes and set them aside.\nIn a small bowl, mix the brown sugar, vinegar, mustard, thyme and pepper.\nIn a large skillet, heat the oil over medium-high heat. Add the chopped onion and sausage slices, then saute, stirring occasionally, until the onion is tender and translucent, five to seven minutes.\nAdd the cooked potatoes to the skillet. Cook and stir until the potatoes are lightly browned, three to five minutes. Stir in the brown sugar mixture, and bring the skillet to a boil. Reduce the heat and simmer, uncovered, for two minutes, stirring occasionally. Stir in the spinach until it's wilted, then stir in the crumbled bacon. Serve immediately.", "preptime": "15 min", "cooktime": "15 min", "servings": "4 servings", "tags": "Main", "notes": "This one-pan potato kielbasa skillet combines tender potatoes, smoky kielbasa and fresh spinach in a brown sugar sauce into a satisfying weeknight dinner. Serve it with a sauerkraut side to keep on theme.", "url": "https://www.tasteofhome.com/recipes/potato-kielbasa-skillet/", "date": "", "rating": 0}, {"id": 85, "name": "Traditional Italian Bread", "cuisine": "Italian", "source": "thespruceeats.com", "location": "", "ingredients": "1 tablespoon sugar\n2 teaspoon salt\n1 tablespoon active dry yeast\n1 3/4 cups warm water (95 F to 110 F)\n1 tablespoon butter (or margarine , softened)\n5 cups bread flour (or high-gluten flour)\n2 tablespoons olive oil\n1 egg white\n1 tablespoon cold water\nOptional: cornmeal (for sprinkling on the baking sheet)", "instructions": "— Making the Dough —\nGather the ingredients.\nIn a large bowl, stir together 1 tablespoon sugar , 2 teaspoons kosher salt , 1 tablespoon active dry yeast , and 1 3/4 cups warm water (95 F to 110 F) .\nStir in 1 tablespoons softened butter or margarine , whichever using.\nSift in 5 cups of bread flour or high-gluten flour (one cup of flour at a time) until you have a dough that can be easily kneaded by hand without sticking to your hands.\nTurn the dough out onto a lightly floured surface and knead for 8 minutes, adding more flour if necessary, until the dough is soft and not sticky.\nLightly grease a medium-sized bowl with 2 tablespoons olive oil and flip dough over so that the top is also greased. Cover with a clean kitchen towel or wrap paper and let rise for 30 minutes in a warm, draft-free place.\n— Proofing a Second Time —\nGrease a large baking sheet and sprinkle it with coarse cornmeal, if desired.\nRemove the dough from the bowl, place onto a lightly floured table, and divide into two equal parts.\nRoll each dough half into an approximately 15 x 9-inch rectangle.\nRoll the dough tightly along the 15-inch side, pinch the seams, and taper the ends of each loaf with your hands at a 45-degree angle.\nPlace the loaves on the prepared baking sheet and cover. Let rise in a warm, draft-free place for 20 minutes.\n— Baking the Bread —\nPreheat the oven to 425 F. Make 3 deep diagonal slashes on each loaf. Bake the bread for 20 minutes.\nLightly beat 1 large egg white and 1 tablespoon cold water in a small bowl to create an egg wash. This step is key for traditional Italian bread.\nRemove the loaves from the oven and brush with the egg wash.\nReturn the loaves to the oven for another 5 minutes. Serve bread warm or cold and enjoy.", "preptime": "60 min", "cooktime": "25 min", "servings": "24", "tags": "Baking, Bread, Italian Bread", "notes": "Italian bread is surprisingly easy to make at home. This traditional recipe will yield two nice-sized loaves, chewy inside and crunchy outside.", "url": "https://www.thespruceeats.com/italian-bread-428161", "date": "", "rating": 0}, {"id": 86, "name": "Muffin-Tin Quiches with Smoked Cheddar & Potato", "cuisine": "American", "source": "eatingwell.com", "location": "", "ingredients": "2 tablespoons extra-virgin olive oil\n1.5 cups finely diced red-skinned potatoes\n1 cup diced red onion\n0.75 teaspoon salt, divided\n8 large eggs\n1 cup shredded smoked Cheddar cheese\n0.5 cup low-fat milk\n0.5 teaspoon ground black pepper\n1.5 cups chopped fresh spinach", "instructions": "Preheat oven to 325 degrees F. Coat a 12-cup muffin tin with cooking spray.\nHeat oil in a large skillet over medium heat. Add potatoes, onion and 1/4 teaspoon salt and cook, stirring, until the potatoes are just cooked through, about 5 minutes. Remove from heat and let cool 5 minutes.\nWhisk eggs, cheese, milk, pepper and the remaining 1/2 teaspoon salt in a large bowl. Stir in spinach and the potato mixture. Divide the quiche mixture among the prepared muffin cups.\nBake until firm to the touch, about 25 minutes. Let stand 5 minutes before removing from the tin.", "preptime": "30 min", "cooktime": "", "servings": "6", "tags": "Breakfast", "notes": "Potatoes, cheese and greens make these muffin tin quiches delicious and satisfying. Meal prep them over the weekend for breakfast throughout the week.", "url": "https://www.eatingwell.com/recipe/256433/muffin-tin-quiches-with-smoked-cheddar-potato/", "date": "", "rating": 0}, {"id": 87, "name": "Potatoes Au Gratin", "cuisine": "French", "source": "onceuponachef.com", "location": "", "ingredients": "Butter to grease the baking dish\n2½ pounds Russet potatoes (3 to 4), peeled and sliced very thin\n1½ teaspoons salt\n¼ teaspoon freshly ground black pepper\n1 cup (4 oz) finely grated Parmigiano-Reggiano\n2¼ cups heavy cream\nFresh thyme, for serving (optional)", "instructions": "Preheat the oven to 350°F and set an oven rack in the middle position. Grease an 8-inch (or 2-quart) baking dish with butter.\nIn a large mixing bowl, toss the potatoes with the salt and pepper until evenly coated.\nArrange some of the potato slices, edges overlapping, in a single layer on the bottom of the prepared baking dish. Sprinkle a quarter of the cheese over the potatoes, and then pour a quarter of the cream over the cheese. Repeat with the remaining potatoes, cheese, and cream, forming 4 layers. Pour any leftover cream over top.\nPlace in the oven and bake, uncovered, for 60 to 75 minutes, or until the potatoes are tender when pierced with a knife and golden brown on top. Let the dish settle on the counter for about ten minutes. Sprinkle with fresh thyme, if using, and then serve.\nMake Ahead: If absolutely necessary, this dish can be assembled a day ahead and covered tightly with plastic wrap (pressing the wrap directly against the potatoes so they don’t discolor too much). Store in the refrigerator and bake before serving. Note that the potatoes on top will still discolor a bit in the fridge, but it shouldn't be noticeable after baking.", "preptime": "15 min", "cooktime": "60 min", "servings": "6 to 8", "tags": "All Seasons, Casserole, Cheese, Christmas, Comfort Food, Potatoes", "notes": "With layers of thinly sliced potatoes baked in cream and melted cheese, this potatoes au gratin is the ultimate comfort food.", "url": "https://www.onceuponachef.com/recipes/potatoes-au-gratin.html#tabrecipe", "date": "", "rating": 0}, {"id": 88, "name": "Pulled Pork Barbecue", "cuisine": "American", "source": "foodnetwork.com", "location": "", "ingredients": "3 tablespoons paprika\n1 tablespoon garlic powder\n1 tablespoon brown sugar\n1 tablespoon dry mustard\n3 tablespoons coarse sea salt\n1 (5 to 7 pound) pork roast, preferably shoulder or Boston butt\n1 1/2 cups cider vinegar\n1 cup yellow or brown mustard\n1/2 cup ketchup\n1/3 cup packed brown sugar\n2 garlic cloves, smashed\n1 teaspoon kosher salt\n1 teaspoon cayenne\n1/2 teaspoon freshly ground black pepper\nPan drippings from the pork\n12 hamburger buns\n1 recipe Cole Slaw, recipe follows\nPickle spears, for serving\n1 head green cabbage, shredded\n2 carrots, grated\n1 red onion, thinly sliced\n2 green onions (white and green parts), chopped\n1 fresh red chile, sliced\n1 1/2 cups mayonnaise\n1/4 cup Dijon mustard\n1 tablespoon cider vinegar\n1 lemon, juiced\nPinch sugar\n1/2 teaspoon celery seed\nSeveral dashes hot sauce\nKosher salt and freshly ground black pepper", "instructions": "Mix the paprika, garlic power, brown sugar, dry mustard, and salt together in a small bowl. Rub the spice blend all over the pork. Cover and refrigerate for at least 1 hour, or up to overnight.\nPreheat the oven to 300 degrees F. Put the pork in a roasting pan and roast it for about 6 hours. An instant-read thermometer stuck into the thickest part of the pork should register 170 degrees F, but basically, what you want to do is to roast it until it's falling apart.\nWhile the pork is roasting, make the barbecue sauce. Combine the vinegar, mustard, ketchup, brown sugar, garlic, salt, cayenne, and black pepper in a saucepan over medium heat. Simmer gently, stirring, for 10 minutes until the sugar dissolves. Take it off the heat and let it sit until you're ready for it.\nWhen the pork is done, take it out of the oven and put it on a large platter. Allow the meat to rest for about 10 minutes. While it's resting, deglaze the pan over medium heat with 3/4 cup water, scraping with a wooden spoon to pick up all of the browned bits. Reduce by about half. Pour that into the saucepan with the sauce and cook 5 minutes.\nWhile the pork is still warm, you want to \"pull\" the meat: Grab 2 forks. Using 1 to steady the meat, use the other to \"pull\" shreds of meat off the roast. Put the shredded pork in a bowl and pour half of the sauce over. Stir it all up well so that the pork is coated with the sauce.\nTo serve, spoon the pulled pork mixture onto the bottom half of each hamburger bun, and top with some slaw. Serve with pickle spears and the remaining sauce on the side.\nCombine the cabbage, carrots, red onion, green onions, and chile in a large bowl. In another bowl, stir together the mayonnaise, mustard, vinegar, lemon juice, and sugar. Pour the dressing over the cabbage mixture and toss gently to mix. Season the cole slaw with the celery seed, hot sauce, salt, and black pepper. Chill for 2 hours in the refrigerator before serving.", "preptime": "", "cooktime": "", "servings": "12 servings", "tags": "Pulled Pork, Pork, Recipes For A Crowd", "notes": "Tyler Florence's Pulled Pork Barbecue recipe from Food Network starts with a flavorful dry rub that includes paprika, brown sugar and mustard powder.", "url": "https://www.foodnetwork.com/recipes/tyler-florence/pulled-pork-barbecue-recipe-1953137", "date": "", "rating": 0}, {"id": 89, "name": "Cajun-Crusted Snapper Fillets", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/105065/cajun-crusted-snapper-fillets/?internalSource=recipe%20hub&referringId=423&referringContentType=Recipe%20Hub&clickId=cardslot%2024", "date": "", "rating": 0}, {"id": 90, "name": "Easy Raisin Sauce for Ham", "cuisine": "Other", "source": "food.com", "location": "", "ingredients": "1/2 cup packed brown sugar\n2 tablespoons cornstarch\n1 teaspoon ground mustard\n1 1/2 cups water\n1/2 cup raisins\n2 tablespoons white vinegar\n2 tablespoons lemon juice\n2 tablespoons butter", "instructions": "In a saucepan, combine first three ingredients.\nStir in water, raisins, vinegar, lemon juice until blended.\nBring to a boil; cook and stir for 2 mins or until thickened.\nStir in butter until melted.\nServe warm over sliced ham.", "preptime": "7 min", "cooktime": "2 min", "servings": "2 cups, 4-6 serving(s)", "tags": "Sauce, Low Protein, Healthy, < 15 Mins", "notes": "This is a family favorite! the raisins cook up plump and soft, and the lemon balances with the fruit's sweetness and best of all it's easy to make. This is a must served with ham!", "url": "https://www.food.com/recipe/easy-raisin-sauce-for-ham-72848", "date": "", "rating": 0}, {"id": 91, "name": "Red Beans and Rice", "cuisine": "Other", "source": "damndelicious.net", "location": "", "ingredients": "1 cup basmati rice\n1 tablespoon vegetable oil\n1 (12.8-ounce) package smoked andouille sausage (thinly sliced)\n1 medium sweet onion (diced)\n1 green bell pepper (diced)\n2 celery ribs (diced)\n2 tablespoons tomato paste\n3 cloves garlic (minced)\n1 1/2 teaspoons Cajun seasoning (salt-free)\n3 (15-ounce) cans small red beans or kidney beans (drained and rinsed)\n3 cups chicken stock\n1 teaspoon hot sauce\n1 bay leaf\nKosher salt and freshly ground black pepper (to taste)\n2 tablespoons chopped fresh parsley leaves", "instructions": "In a large saucepan of 2 cups water, cook rice according to package instructions; set aside.\nHeat vegetable oil in a large stockpot or Dutch oven over medium heat. Working in batches, add sausage, and cook, stirring frequently, until sausage is lightly browned, about 3-4 minutes; set aside.\nAdd onion, bell pepper and celery. Cook, stirring occasionally, until tender, about 3-4 minutes.\nStir in tomato paste, garlic and Cajun seasoning until fragrant, about 1 minute.\nStir in red beans, chicken stock, hot sauce, bay leaf and sausage; season with salt and pepper, to taste. Bring to a boil; cover, reduce heat and simmer for 15 minutes. Uncover; continue to simmer until reduced, an additional 15 minutes.\nUsing a wooden spoon, mash beans until slightly thickened, if desired; season with salt and pepper, to taste.\nServe immediately, topped with rice and garnished with parsley, if desired.", "preptime": "20 min", "cooktime": "40 min", "servings": "6", "tags": "", "notes": "So thick, creamy, flavorful! Beans are cooked just right. Perfectly tender served with rice and smoky andouille sausage!", "url": "https://damndelicious.net/2019/04/15/red-beans-and-rice/", "date": "", "rating": 0}, {"id": 92, "name": "Red Beans and Rice", "cuisine": "Other", "source": "getpocket.com", "location": "", "ingredients": "1 cup basmati rice\n1 tablespoon vegetable oil\n1 (12.8-ounce) package smoked andouille sausage (thinly sliced)\n1 medium sweet onion (diced)\n1 green bell pepper (diced)\n2 celery ribs (diced)\n2 tablespoons tomato paste\n3 cloves garlic (minced)\n1 1/2 teaspoons Cajun seasoning (salt-free)\n3 (15-ounce) cans small red beans or kidney beans (drained and rinsed)\n3 cups chicken stock\n1 teaspoon hot sauce\n1 bay leaf\nKosher salt and freshly ground black pepper (to taste)\n2 tablespoons chopped fresh parsley leaves", "instructions": "In a large saucepan of 2 cups water, cook rice according to package instructions; set aside.\nHeat vegetable oil in a large stockpot or Dutch oven over medium heat. Working in batches, add sausage, and cook, stirring frequently, until sausage is lightly browned, about 3-4 minutes; set aside.\nAdd onion, bell pepper and celery. Cook, stirring occasionally, until tender, about 3-4 minutes.\nStir in tomato paste, garlic and Cajun seasoning until fragrant, about 1 minute.\nStir in red beans, chicken stock, hot sauce, bay leaf and sausage; season with salt and pepper, to taste. Bring to a boil; cover, reduce heat and simmer for 15 minutes. Uncover; continue to simmer until reduced, an additional 15 minutes.\nUsing a wooden spoon, mash beans until slightly thickened, if desired; season with salt and pepper, to taste.\nServe immediately, topped with rice and garnished with parsley, if desired.", "preptime": "20 min", "cooktime": "40 min", "servings": "6", "tags": "", "notes": "So thick, creamy, flavorful! Beans are cooked just right. Perfectly tender served with rice and smoky andouille sausage!", "url": "https://getpocket.com/explore/item/red-beans-and-rice?utm_source=pocket-newtab", "date": "", "rating": 0}, {"id": 93, "name": "Pasta Alla Vodka", "cuisine": "Italian", "source": "bonappetit.com", "location": "", "ingredients": "Kosher salt\n1 medium onion\n4 garlic cloves\n4 oz. Parmesan cheese\n2 Tbsp. extra-virgin olive oil, plus more for drizzling\n1 (4.5-oz.) tube double-concentrated tomato paste, such as Amore\n½ tsp. crushed red pepper flakes\n2 oz. (¼ cup) vodka\n¾ cup heavy cream\n1 lb. rigatoni\nBasil leaves (for serving)", "instructions": "Fill a stock pot or other large pot three-quarters full with water and heat over high. Toss in a handful of kosher salt and bring to a boil while you do your other prep.\nPeel and finely chop 1 medium onion.\nFirmly smash 4 garlic cloves with the flat side of a chef’s knife and remove peel.\nGrate 4 oz. Parmesan on the smallest holes of the box grater.\nWarm 2 Tbsp. extra-virgin olive oil in a Dutch oven or other heavy large pot over medium heat (position it next to pot of water). Add onion and garlic and cook, stirring constantly, just until onion is starting to brown around the edges, 5–7 minutes.\nAdd 1 (4.5-oz.) tube double-concentrated tomato paste and ½ tsp. crushed red pepper flakes and stir until paste evenly coats onion. Continue to cook, stirring often, until paste is deep red and starting to brown on bottom of pot, 5–7 minutes.\nAdd 2 oz. (¼ cup) vodka to deglaze pan and stir to incorporate, scraping bottom of pot. Reduce heat to low.\nUsing a heatproof glass measuring cup, scoop about ¼ cup boiling water from pot, then add ¾ cup heavy cream to measuring cup (this brings up the temperature of the cream so it won’t break when you add it to the pot).\nSlowly add warmed cream to Dutch oven, stirring constantly, until a smooth sauce forms. Remove from heat.\nAdd 1 lb. rigatoni to pot of boiling salted water; cook pasta according to package instructions until al dente. About 1 minute before the timer goes off, use heatproof measuring cup to scoop up about 1 cup pasta cooking liquid. Heat Dutch oven over low.\nUsing a spider, transfer rigatoni to Dutch oven along with any water that’s piggybacking on the pasta.\nAdd ½ cup pasta cooking liquid to Dutch oven and stir to incorporate, then gradually add half of Parmesan, stirring constantly to melt cheese. You should have a smooth, glossy sauce that coats each piece of pasta. Season with salt and add a splash more pasta water to thin sauce, if needed.\nDivide pasta among bowls. Top with remaining Parmesan, dividing evenly. Drizzle with more oil, then tear basil leaves over. Editor’s note: This recipe was first printed online as “Rigatoni With Easy Vodka Sauce” in February 2018. Head this way for more of our very best pasta recipes →", "preptime": "", "cooktime": "", "servings": "4 servings", "tags": "Pasta, Italian American, Rigatoni, Vodka, Easy, Main", "notes": "This easy vodka pasta recipe combines tomato paste, cream, and a splash of booze for a dinner that comes together quickly, using just a few pantry ingredients.", "url": "https://www.bonappetit.com/recipe/rigatoni-with-easy-vodka-sauce", "date": "", "rating": 0}, {"id": 94, "name": "Beef Tenderloin with Red Wine Sauce", "cuisine": "American", "source": "onceuponachef.com", "location": "", "ingredients": "8 tablespoons unsalted butter, (divided)\n¾ cup finely chopped shallots, (from 2 to 3 large shallots)\n1¼ cups red wine\n3 cups beef broth\n6 fresh thyme sprigs\n¼ teaspoon kosher salt\n1/8 teaspoon freshly ground black pepper\n1 teaspoon sugar\n2 tablespoons all-purpose flour\n1 (2 to 3 lb) center-cut beef tenderloin roast\nKosher salt ((½ teaspoon per pound of beef))\nFreshly ground black pepper ((¼ teaspoon per pound of beef))\n2 tablespoons vegetable oil\n¼ cup beef broth", "instructions": "— For the Sauce —\nMelt 5 tablespoons of the butter in a medium saucepan. Add the shallots and cook over medium-low heat, stirring occasionally, until soft and translucent, 7 to 8 minutes. Add the wine, beef broth, thyme sprigs, salt, pepper and sugar, and bring to a boil. Cook over medium heat for about 30 minutes, or until the liquid is reduced by about half.\nWhile the liquid is reducing, place the remaining 3 tablespoons of butter in a small bowl and soften in the microwave, if necessary (it should be soft but not melted). Add the flour and, using a small spoon, mix into a smooth paste.\nOnce the wine mixture is reduced, reduce the heat to low and remove the thyme sprigs. Whisk the flour-butter paste, a tablespoon at a time, into the simmering liquid, and simmer for a few minutes, until the sauce is thickened. Set aside. (The sauce can be made up to this point and refrigerated up to 3 days ahead of time.)\n— For the Tenderloin —\nLet the beef stand at room temperature for 1 hour before roasting. Set an oven rack in the middle position and preheat the oven to 400°F (205°C).\nSeason the beef all over with kosher salt and pepper. Heat the oil in an oven-proof skillet over medium-high heat until almost smoking. Cook, turning with tongs, until well browned on all but one side, about 10 minutes total. Turn the tenderloin so that the un-seared side is down, and transfer the skillet directly to the preheated oven. (If your pan isn't oven-proof, transfer the beef to a lightly oiled roasting pan.) Roast until a thermometer inserted into the center of the meat registers 120°F to 125° (49°C to 52°C) for medium rare, about 15 minutes, or until done to your liking (115°F to 120°F/46°C to 49°C for rare, 130°F to 135°F/54°C to 57°C for medium). Keep in mind that these temperatures account for the fact that the temperature will continue to rise about 5 degrees while the meat rests.\nTransfer the meat to a carving board (preferably with a well for collecting juices) and let it rest, covered loosely with aluminum foil, for 10 to 15 minutes. Place a dishtowel or oven mitt over the handle of the roasting pan to remind yourself that it's hot.\nMeanwhile, carefully discard the fat from the roasting pan (remember that the handle is hot!). Set the pan on the stovetop and add the ¼ cup (60 ml) of broth. Bring the broth to a boil and, using a wooden spoon, scrape the fond, or brown bits, from the bottom of the pan. Add the flavorful broth to the red wine sauce, and then bring the sauce to a simmer.\nCarve the tenderloin into ½-inch (13-mm) thick slices. Serve the beef, passing the red wine sauce at the table.", "preptime": "20 min", "cooktime": "80 min", "servings": "4", "tags": "Sauce", "notes": "Wow your guests with ease! My roasted beef tenderloin paired with a rich red wine sauce is simple, sophisticated, and foolproof.", "url": "https://www.onceuponachef.com/recipes/roast-beef-tenderloin-wine-sauce.html#tabrecipe", "date": "", "rating": 0}, {"id": 95, "name": "French Apple Tart", "cuisine": "French", "source": "onceuponachef.com", "location": "", "ingredients": "1½ cups all-purpose flour, (spooned into measuring cup and leveled-off)\n½ teaspoon salt\n2 tablespoons granulated sugar\n12 tablespoons (1½ sticks) very cold unsalted butter, cut into ½-in (13-mm) pieces\n¼ cup very cold water\n1¾ lbs baking apples ((3 large) (see note))\n⅓ cup sugar\n1 teaspoon vanilla extract\n1 teaspoon cinnamon\n2 tablespoons unsalted butter, (melted)\n⅛ teaspoon salt\n1 tablespoon all-purpose flour\n1 egg, (beaten)\n2 tablespoons turbinado sugar\n1 tablespoon apricot jelly or jam ((optional), for glaze)", "instructions": "Make the crust: Line a baking sheet with parchment paper. In a food processor fitted with the steel blade, combine the flour, salt, and sugar. Pulse briefly to combine. Add the cold butter and process just until the butter is the size of peas, about 5 seconds. Sprinkle the ice water over the mixture and process just until moistened and very crumbly, about 5 seconds. Transfer the dough to a lightly floured work surface and knead a few times, just until it comes together into a cohesive ball. Pat the dough into a disk. Flour your work surface again and dust the dough with flour, as well. Using a rolling pin, roll into a circle 8 to 10 in (20 to 25 cm) in diameter, turning and adding more flour as necessary so the dough doesn’t stick. Transfer the dough to the parchment-lined baking sheet and refrigerate while you prepare the filling (you’ll roll the dough out further on the parchment paper, so go ahead and clean your work surface).\nMake the Filling: Peel, core, and cut the apples into ⅛-in (3-mm) thick slices (you should have about 4 cups) and place in a large bowl. Add the sugar, vanilla, cinnamon, melted butter, and salt; toss to combine.\nTake the dough from the fridge and slide the parchment paper onto the countertop. Roll the dough, directly on the parchment paper, into a 14-in (36-cm) circle about ⅛-in (3-mm) thick. It’s fine if the edges are a little ragged. Place the parchment and dough back on the baking sheet—the pastry should curve up the lip of the pan.\nAssemble the tart: Sprinkle the flour evenly over the pastry. Arrange the apple slices on top in overlapping concentric circles to within 3 in (7.5 cm) of the edge. Don’t worry about making it look perfect! It doesn’t make much difference in the end, and you don’t want the dough to get too warm. Fold the edges of the dough over the apples in a free-form fashion, working your way around and creating pleats as you go. Patch up any tears by pinching a bit of dough from the edge.\nUsing a pastry brush, brush the pleated dough evenly with the beaten egg. Sprinkle 1 tablespoon of the turbinado sugar over the top crust and 1 tablespoon over the fruit. Chill the assembled tart in the fridge for 15 to 20 minutes.\nMeanwhile, preheat the oven to 350°F (175°C) and set an oven rack in the center position.\nBake for 55 to 65 minutes, or until the apples are tender and the crust is golden and cooked through. (It’s okay if some of the juices leak from the tart onto the pan. The juices will burn on the pan but the tart should be fine—just scrape any burnt bits away from the tart once it’s baked.) Transfer the pan to a rack and let cool.\nWhile the tart cools, make the optional glaze. In a small bowl, mix the apricot jam with 1½ teaspoons water. Heat in the microwave until bubbling, about 20 seconds. Using a pastry brush, brush the apples with the apricot syrup.\nUse two large spatulas to transfer the tart to a serving plate or cutting board. Slice and serve warm or at room temperature. The tart is best served on the day it is made, but leftovers will keep, loosely covered on the countertop, for a few days.", "preptime": "30 min", "cooktime": "60 min", "servings": "8", "tags": "Dessert, Apple Tart", "notes": "Buttery pastry, tender apples, and a hint of cinnamon—everything you love about apple pie in a rustic apple tart.", "url": "https://www.onceuponachef.com/recipes/rustic-french-apple-tart.html#tabbox", "date": "", "rating": 0}, {"id": 96, "name": "Rustic Italian Crusty Bread", "cuisine": "Italian", "source": "ciaoflorentina.com", "location": "", "ingredients": "3.25 cups all purpose flour (+ more for dusting)\n1 tsp sea salt\n1.5 cups warm water\n2 tsp instant yeast ((or active dry yeast))", "instructions": "In a large mixing bowl or your kitchen aid mixer add the flour, salt and yeast. Use a spatula or the paddle attachment and mix to combine well.\nPour in the warm water and keep mixing until everything is incorporated and a soft dough has formed. It will still stick to the bottom of the bowl and that is OK.\nCover the bowl with some plastic wrap loosely and a tea towel. Allow the dough to rise at room temperature for 2 to 3 hours until doubled in size.\nSprinkle some flour on your kitchen counter and dump the bread dough on it. Flour your hands to help it out of the bowl as it will be sticky. Don't panic, this is normal.\nWith floured hands fold the dough onto itself forming it into a round ball. Do not knead it, do not handle it anymore than you need to. Use a sharp knife and lightly carve an X in the top of the loaf or just make a few cuts across.\nPlace the bread dough on top of a lightly floured pizza peel, cardboard or parchment paper and allow it to rest while your oven is heating up.\nPreheat your oven to 450”F with a pizza stone inside for about 45 minutes before baking the bread. Fill an oven proof bowl with 2 inches of water and place it on the bottom rack. This will create the steam that will cause the crust to become crispy as it bakes.\nOnce your oven is hot sprinkle the pizza stone with some semolina flour or corn meal and carefully slide the bread loaf on top. Bake the bread for about 30 to 45 minutes until golden brown all over and cooked through.\nTransfer the bread to a cooling rack and allow to cool off completely before slicing into it. You can also let it cool inside the oven with the door slightly open.\n— Dutch Oven Method —\nInstead of a pizza stone preheat your oven with a dutch oven inside. Once hot, carefully place the bread loaf inside the dutch oven ideally using parchment paper for easy transfer. Cover with the lid and bake for 30 minutes. Remove lid and bake another 5 minutes until golden brown on top. Remove the bread from the dutch oven and transfer to a cooling rack or it won't stay crispy.\n— Original Large Loaf Recipe: —\nIngredients: 1 package instant dry yeast (1/4 oz)6.25 cups all purpose flour + more for dusting2 tsp sea salt3 cups warm water.\nInstructions: Follow the above instructions and bake at 450\"F for 45 minutes.", "preptime": "5 min", "cooktime": "40 min", "servings": "8", "tags": "Baking, Bread", "notes": "Easy and quick artisan Italian crusty bread recipe you can make at home. No knead, no machine, with only 2 hour rise time. Made with instant or active dry instant yeast, flour and water and baked on a hot pizza stone.", "url": "https://ciaoflorentina.com/rustic-crusty-bread-recipe/", "date": "", "rating": 0}, {"id": 97, "name": "Potatoes au Gratin", "cuisine": "American", "source": "foodandwine.com", "location": "", "ingredients": "1 medium garlic clove, halved\n3 tablespoons unsalted butter, at room temperature\n3 pounds medium-size red potatoes, unpeeled and cut into 1/8-inch-thick slices\n1 medium-size (9 ounce) yellow onion, thinly sliced (about 2 cups)\n1 tablespoon all-purpose flour\n1.75 cups heavy whipping cream\n2.5 teaspoons kosher salt\n1 teaspoon dry mustard\n0.125 teaspoon freshly grated nutmeg\n6 ounces sharp white cheddar cheese, shredded (about 1 1/2 cups), divided\n4 ounces Gruyère cheese, shredded (about 1 cup), divided\n2 teaspoons thinly sliced fresh chives", "instructions": "Preheat oven to 325°F. Rub cut sides of garlic all over inside of a 2 1/2- to 3-quart oval broiler-safe baking dish; discard garlic. Rub inside of dish with 1 tablespoon butter; set aside.\nArrange potato and onion slices, standing slightly vertically on edges, in slightly overlapping concentric circles in the baking dish. Tuck smaller potato and onion slices into any gaps in dish to fill. Cover with a damp paper towel until ready to use.\nHeat remaining 2 tablespoons butter in a medium saucepan over medium until melted and foaming. Add flour; cook, whisking constantly, for 1 minute. Slowly whisk in cream until smooth. Whisk in salt, mustard, and nutmeg. Bring to a simmer over medium, whisking constantly. Remove from heat. Whisk in 3/4 cup of the Cheddar and 1/2 cup of the Gruyère, 1 handful at a time, until melted and smooth. Pour evenly over potato mixture. Sprinkle with remaining 3/4 cup Cheddar and 1/2 cup Gruyère.\nCover baking dish with aluminum foil. Bake in preheated oven until cream is bubbling, cheese has melted, and potatoes are tender when pierced with a fork, 1 hour to 1 hour, 15 minutes. Carefully remove foil from baking dish, while keeping dish in oven. Increase oven temperature to broil. Broil gratin until cheese is bubbly and browned in spots, checking occasionally to prevent over-browning, 5 to 8 minutes. Remove from oven. Let stand 20 minutes. Sprinkle with chives and serve.", "preptime": "", "cooktime": "", "servings": "8", "tags": "Side", "notes": "Au Gratin Potatoes, the rich and cheesy comforting classic, gets a decorative upgrade by layering potatoes and onion in concentric circles.", "url": "https://www.foodandwine.com/recipes/potatoes-au-gratin", "date": "", "rating": 0}, {"id": 98, "name": "Traditional Sangria", "cuisine": "Spanish", "source": "foodnetwork.com", "location": "", "ingredients": "2 bottles chilled dry red wine, like Rioja\n1 cup brandy\n1 cup orange juice\n1/4 cup superfine granulated sugar\n2 oranges, cut into thin rounds\n2 Meyer lemons, cut into thin rounds\n3 Key limes, cut into thin rounds\n2 apples, cored and cut into 1/2-inch chunks\n2 cups cold club soda", "instructions": "In a large pot or bowl, combine the wine, brandy, orange juice, and sugar and stir until the sugar dissolves. Add the orange, lemon, and lime slices, the apples and refrigerate until well chilled, about 1 hour. Remove from the refrigerator and add the soda. Serve in glasses over ice.", "preptime": "", "cooktime": "", "servings": "15 servings", "tags": "Drink, Sangria Recipes, Spanish, Recipes For Parties, Orange Recipes, Recipes For A Crowd", "notes": "", "url": "https://www.foodnetwork.com/recipes/traditional-sangria-3644829", "date": "", "rating": 0}, {"id": 99, "name": "Serrano Ham & Manchego Croquetas With Smoked Pimentón Aioli Recipe on Food52", "cuisine": "Other", "source": "food52.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://food52.com/recipes/15341-serrano-ham-manchego-croquetas-with-smoked-pimenton-aioli", "date": "", "rating": 0}, {"id": 100, "name": "Emeril's Texas-Style Smoked Brisket", "cuisine": "American", "source": "foodnetwork.com", "location": "", "ingredients": "1 (4-pound) beef brisket, trimmed\n2 tablespoons dark brown sugar\n2 tablespoons chili powder\n2 tablespoons paprika\n2 tablespoons salt\n1 tablespoon garlic powder\n1 tablespoon onion powder\n1 tablespoon black pepper\n1 tablespoon cayenne\n2 teaspoons dry mustard\n2 teaspoons ground cumin\nMesquite wood chips\nBarbecue Sauce, recipe follows\n1/4 cup Worcestershire sauce\n2 tablespoons vegetable oil\n3 tablespoons hot red pepper sauce\n2 teaspoons Essence, recipe follows\n3/4 cup chopped yellow onions\n1/2 teaspoon red pepper flakes, or more to taste\n2 tablespoons chopped garlic\n4 cups ketchup\n1/2 cup dark brown sugar\n2 tablespoons cane syrup\n1/2 cup apple cider vinegar\n1/2 cup yellow mustard\n2 tablespoons garlic powder\n1 tablespoon black pepper\n2 1/2 tablespoons paprika\n2 tablespoons salt\n1 tablespoon onion powder\n1 tablespoon cayenne pepper\n1 tablespoon dried leaf oregano\n1 tablespoon dried thyme", "instructions": "Set the brisket on a large sheet of plastic wrap. In a medium bowl combine the dark brown sugar, chili power, paprika, salt, garlic powder, onion powder, black pepper, cayenne, dry mustard, and cumin thoroughly. Rub the mixture onto the brisket and wrap tightly in the plastic wrap. Place on a baking sheet and let marinate refrigerated at least 6 hours or overnight. Remove the meat from the refrigerator and let come to room temperature.\nSoak mesquite wood chips in a large bowl of water for 1 to 2 hours. Remove, drain and set aside.\nRemove the meat from the refrigerator and let come to room temperature.\nPrepare a smoker with charcoal and the wood chips according to the manufacturer's instructions to 180 to 200 degrees F. Place the water pan in the smoker and add water to the fill line, about 2/3 full. Place the unwrapped brisket on the lower rack off the direct heat, close the lid, and cook, regularly stoking the fire and adding additional chips, until an instant-read thermometer registers an internal temperature of 185 to 195 degrees F., or until the meat is tender, about 4 to 5 hours. Remove the meat from the grill and let rest for 20 minutes before carving the meat against the grain.\n(Alternately, prepare a stove-top smoker according to the manufacturer's instructions. Place the unwrapped brisket on the rack over low heat. Close the lid and smoke for 1 hour. Preheat the oven to 275 degrees F. Remove the meat from the smoker and wrap in a large sheet of heavy aluminum foil. Place on a baking sheet and roast until tender and an instant-read thermometer registers an internal temperature of 185 to 195 degrees F., or until the meat is tender, about 2 to 3 hours. Remove the meat from the oven and let rest for 20 minutes before carving the meat against the grain.)\nServe with Barbecue Sauce on the side for dipping.\nIn a large pot, heat the oil over medium-high heat. Add the onions and cook, stirring, for 4 minutes. Add the garlic and cook, stirring, for 1 minute. Add the ketchup, brown sugar, cane syrup, vinegar, mustard, Worcestershire, hot sauce, Essence, and red pepper flakes and bring to a boil. Lower the heat and simmer, stirring occasionally, until thickened and the flavors marry, 15 to 20 minutes. Remove from the heat and let cool slightly before serving.\nCombine all ingredients thoroughly and store in an airtight jar or container.\nRecipe from \"New New Orleans Cooking\", by Emeril Lagasse and Jessie Tirsch. Published by William and Morrow, 1993.", "preptime": "", "cooktime": "", "servings": "", "tags": "Main, Southwestern, Recipes For A Crowd, Dinner Recipes, American, Beef", "notes": "", "url": "https://www.foodnetwork.com/recipes/emerils-texas-style-smoked-brisket-3645076", "date": "", "rating": 0}, {"id": 101, "name": "Spanish Chicken and Potato Roast", "cuisine": "Spanish", "source": "foodnetwork.com", "location": "", "ingredients": "1 1/2 pounds large Yukon gold potatoes, cut into 1 1/2-inch pieces\n4 cloves garlic, smashed and coarsely chopped\n2 tablespoons extra-virgin olive oil\nKosher salt\n1 1/2 pounds skinless, boneless chicken thighs (5 to 6 thighs)\n2 teaspoons smoked paprika\nFreshly ground pepper\n4 tablespoons roughly chopped fresh parsley\n2 lemons (1 juiced, 1 cut into wedges)\n2 large or 3 medium red onions, halved and thinly sliced", "instructions": "Position a rack in the upper third of the oven. Place a large cast-iron baking dish or a rimmed baking sheet on the rack and preheat to 500 degrees F. Put the potatoes, garlic, olive oil, 1 tablespoon water and 1/2 teaspoon salt in a large microwave-safe baking dish and toss to coat. Cover with plastic wrap, pierce the plastic in a few places with a knife and microwave 8 minutes to partially cook.\nMeanwhile, pat the chicken dry and transfer to a bowl. Sprinkle with the paprika, 1 teaspoon salt and 1/2 teaspoon pepper. Add 2 tablespoons parsley and the lemon juice; toss to coat. Set aside.\nRemove the hot baking dish from the oven; carefully add the potatoes and spread in an even layer. Scatter the onions on top. Roast until the potatoes start to brown, about 12 minutes.\nFlip the potatoes and lay the chicken pieces on top, adding any accumulated juices from the bowl; return to the oven and roast until the potatoes are tender and the chicken is cooked through, about 12 more minutes. Remove from the oven and top with the remaining 2 tablespoons parsley. Serve with the lemon wedges.", "preptime": "", "cooktime": "", "servings": "4 servings", "tags": "Roast Recipes, Spanish, Potato, High Fiber, Easy Chicken, Gluten Free", "notes": "", "url": "https://www.foodnetwork.com/recipes/food-network-kitchen/spanish-chicken-and-potato-roast-recipe-2119435", "date": "", "rating": 0}, {"id": 102, "name": "Spanish Garlic Chicken", "cuisine": "Spanish", "source": "visitsouthernspain.com", "location": "", "ingredients": "1kg chicken cut into cubes\n5 cloves garlic\nOil for frying\nSalt to taste\nPepper to taste\nFlour - for coating\n1 cup (250ml) Chicken broth", "instructions": "Peel the garlic and slice them. Add a little oil to the pan, heat it up, and when it is hot add the sliced garlic. Once golden, remove them and set them aside.\nCut your chicken in cubes, any size that you want. You can use chicken thighs or breasts.\nTake the cubed chicken, add salt and pepper to taste. Put the pan back to heat and add the chicken pieces, previously coating them in flour.\nFry over medium heat on both sides, totaling about 8 to 10 minutes. You take them out and put them on a plate with absorbent paper to remove the excess oil.\nRemove the remaining oil from the pan. Add the chicken, sliced ​​garlic, juice of half a lemon, and a cup of chicken broth. Cook, stirring occasionally and turning the chicken with garlic for about 10 minutes.\nThe cooking time may vary depending on how much you like your chicken, but make sure it is cooked.", "preptime": "10 min", "cooktime": "30 min", "servings": "4", "tags": "Garlic Chicken Recipe, Garlic Chicken, Easy Chicken Recipes For Dinner With Few Ingredients What To Season Chicken With, Cook Chicken On Stove, Spanish Chicken Recipe, Chicken Spanish Recipe", "notes": "Few recipes are easy to make and taste delicious, but I assure you that Spanish garlic chicken is one of them. If you are looking for a dish that has the essence of fast-food dishes, then this garlic chicken recipe is for you. It has the advantage of being fresh and homemade, and once you try it you won't get enough.", "url": "https://visitsouthernspain.com/spanish-garlic-chicken-recipe/#mv-creation-57-jtr", "date": "", "rating": 0}, {"id": 103, "name": "Spanish Pork Loin Roast", "cuisine": "French", "source": "leitesculinaria.com", "location": "", "ingredients": "1 cup kosher salt\n10 cloves garlic\n1/2 cup water\nOne (5-pound) boneless pork loin roast (with a generous fat cap intact if possible, tied if desired)\n1/4 cup hot Spanish paprika\n1/4 cup sweet Spanish paprika\n1/3 cup extra-virgin olive oil", "instructions": "— Make the garlic paste —\nToss the salt and garlic cloves in a food processor and pulse until you have a rough paste, about 15 times. Then add the water, a little at a time, and pulse to form a thick but smooth paste. (You'll need at least 1/4 cup water to make the paste. Start with that. If necessary, dribble in more water, a little at a time, to achieve the proper consistency. You may need as much as 1/2 cup water total.)\n— Prepare the pork loin —\nRub the paste onto the pork loin, covering it evenly. Cover and refrigerate the pork loin for 30 minutes.\nRinse off the paste and pat the pork loin dry. In a small bowl, stir together the hot and sweet paprikas, then stir in the oil to make a paste.\nSmear a thick layer of the paste over the pork loin and wrap everything in plastic wrap. Refrigerate overnight.\nThe next day, let the pork loin come to room temperature.\n— Roast the pork loin —\nPreheat the oven to 450°F (230°C).\nUnwrap the loin and scrape off any excess paprika paste to keep it from burning. Place the pork loin on a wire rack in a baking dish or roasting pan, shove it in the oven, and then immediately turn down the heat to 300°F (150°C). Roast the pork loin until an instant-read thermometer inserted into the center of the loin registers 145°F (63°C), which should be between 75 to 90 minutes. The exact timing will depend on the thickness of your pork roast.\nLoosely tent the pork loin with foil and let it rest for at least 10 minutes. After the wait, slice and serve immediately.", "preptime": "25 min", "cooktime": "170 min", "servings": "6", "tags": "Main, Cheap, Comfort Food, Easy, Gluten-Free, Paleo", "notes": "This easy pork loin roast with paprika is great for entertaining as it requires minimal effort but will garner you rave reviews.", "url": "https://leitesculinaria.com/104033/recipes-pork-loin-roast-paprika.html#wprm-recipe-container-382199", "date": "", "rating": 0}, {"id": 104, "name": "Spanish Tapas Style Beef Kebabs", "cuisine": "Spanish", "source": "geniuskitchen.com", "location": "", "ingredients": "12 wooden skewers\n2 lbs round steaks\n3 cloves garlic\n1 tablespoon chopped parsley\n1/3 cup lemon juice\n1/2 teaspoon black pepper\n2 teaspoons paprika\n1 pinch cayenne pepper\n1/2 teaspoon salt\n2 tablespoons red wine vinegar\n1/3 cup olive oil", "instructions": "Soak skewers in water.\nCut steak into slices.\nCombine steak, garlic, parsley lemon and pepper to marinade for at least 2 hours.\nPreheat grill.\nThread meat onto skewers.\nGrill kebabs 5 to 6 minutes, turning once.\nWhisk paprika dressing ingredients together and drizzle over finished plated beef skewers.", "preptime": "2 h", "cooktime": "5 min", "servings": "12 kebabs", "tags": "Snack, Spanish, European, Spicy, Weeknight, Broil/Grill", "notes": "This recipe comes from \"Tapas Spanish Appetizers\" one of the great Konemann recipe books. Have a fabulous Spanish wine tasting party with this and other Tapas recipes. Great Tapas party item and a big hit with the meat eaters.", "url": "http://www.geniuskitchen.com/recipe/spanish-tapas-style-beef-kebabs-72538", "date": "", "rating": 0}, {"id": 105, "name": "Stifado (Greek Beef Stew)", "cuisine": "Greek", "source": "themediterraneandish.com", "location": "", "ingredients": "2 pounds chuck roast, (trimmed and cut into 1 ½-inch pieces)\n3/4 teaspoon kosher salt\n1/2 teaspoon freshly ground pepper\n1/4 cup extra virgin olive oil\n1 1/2 pounds whole pearl onions, (peeled (frozen are fine—they do not need to be defrosted))\n5 garlic cloves, (coarsely chopped)\n1 tablespoons tomato paste\n2 bay leaves\n1 cinnamon stick\n¼ teaspoon ground clove\n4 allspice berries (or 1/4 teaspoon ground allspice)\n1 cup full-bodied red wine\n1/4 cup Cognac or Brandy\n1 (14 ounce) can of good quality whole or diced tomatoes", "instructions": "Brown the beef in batches. Pat the meat dry, spread it on a tray, and season it well with salt and pepper. In a Dutch oven or heavy-bottom non-reactive pot, heat the olive oil over high heat. When the oil begins to shimmer, add the meat in a single layer and sauté, turning until lightly browned on all sides, about 1 to 2 minutes per side. You will need to do this in batches so as not to overcrowd the pot (which would prevent it from getting a nice sear and seal in the juices). Use a slotted spoon to transfer the browned pieces to a large mixing bowl. Cover and set aside.\nSauté the pearl onions. Turn the heat to medium and add the peeled pearl onions (if you are using frozen, you do not need to defrost them first). Stir to coat with the oil, adding a dash more oil if needed. Cook until they are softened but not caramelized, about 10 minutes. Add the chopped garlic, stir, and cook for another minute.\nSeason the onions and garlic. With a wooden spoon, stir in the tomato paste, bay leaves, cinnamon, ground clove, and allspice berries. Allow this mixture to caramelize for one minute, then return the meat and its accumulated juices to the pot and stir to coat with the spices.\nDeglaze the pan. Pour the red wine and cognac, into the pot scraping the bottom with a wooden spoon to release any fond (browned bits). Let it simmer for 5 minutes to allow some of the alcohol to evaporate and to deglaze the pan.\nSimmer. Add the canned tomatoes and enough warm water to cover the meat. Reduce the heat to a medium or medium-low — you just want a slow simmer —and cover the pot. Cook until the meat is tender and the sauce is slightly thickened. This takes about 1 hour 40 minutes to 2 hours, depending on the size of the meat pieces. Halfway through cooking, open the lid, give it a stir, and check to make sure there is still enough water. If you need to add a little more hot water.\nFinish and serve. When the meat is nice and tender, taste it and adjust the seasoning. Remove the bay leaves, cinnamon stick, and allspice berries. Allow the dish to sit, uncovered, for 15 minutes. Serve the stifado warm, over orzo pasta, rice, mashed potatoes, or, Greek French fries.", "preptime": "20 min", "cooktime": "165 min", "servings": "6", "tags": "Soup, Beef, Beef Stew, Stifado", "notes": "A hearty red wine beef stew with warming spices that is typically served as a Sunday family dinner on colder fall and winter days. This is one of the many traditional Greek comfort foods that is flavorful, satisfying, and mouth-wateringly delicious! Serve with mashed potatoes, orzo or good, crusty bread.", "url": "https://www.themediterraneandish.com/stifado-greek-beef-stew/#wprm-recipe-container-74701", "date": "", "rating": 0}, {"id": 106, "name": "Strawberry Souffle", "cuisine": "Other", "source": "washingtonpost.com", "location": "", "ingredients": "unsalted butter, for the baking dish\n10 teaspoons granulated sugar, plus more for the baking dish\n1 cup whole milk\n3 large egg yolks, plus 4 large egg whites, at room temperature\n3 tablespoons flour\n0.125 teaspoons cream of tartar\n0.25 teaspoons vanilla extract\n2 tablespoons kirsch (may substitute strawberry jam)\n1 cup hulled, diced strawberries\nconfectioners' sugar, for dusting", "instructions": "", "preptime": "", "cooktime": "", "servings": "4", "tags": "Dessert, Make-Ahead Recipes", "notes": "Don't fear this barely sweet souffle: Even if it fails to reach the designated heights, you can bill it as a warm, strawberry pudding kissed with kirsch.", "url": "https://www.washingtonpost.com/recipes/strawberry-souffle/15908/?itid=lk_inline_manual_24", "date": "", "rating": 0}, {"id": 107, "name": "Lebanese Stuffed Grape Leaves (Warak Enab)", "cuisine": "Mediterranean", "source": "feelgoodfoodie.net", "location": "", "ingredients": "2 tablespoons olive oil (plus more for drizzling between layers)\n1 pound ground beef\n1/2 teaspoon salt (plus more for seasoning layers)\n2 teaspoons 7 Spice\n1 1/2 cups short grain white rice\n1/4 teaspoon cinnamon\n1 jar grape leaves (about 60-70 in brine)\n2 Yukon Gold potatoes (sliced)\n1/4 cup lemon juice", "instructions": "— Grape Leaves Preparation —\nDrain grape vine leaves and soak them in a large bowl of water.\nGently separate and wash the leaves individually. Stack them on a plate and set them aside. It is best to cover them with a damp cloth so they don't dry out, until you are ready to start rolling them.\n— Prepare Stuffing (Hashweh) —\nHeat a large pan with olive oil, and cook ground beef until browned. Season with salt and 7 Spice.\nAdd uncooked rice to the ground beef, then cinnamon and mix well until everything is incorporated.\n— Stuff, Wrap and Cook —\nTo stuff and roll the grape leaves, lay a grape leaf flat on a cutting board, scoop out a heaping teaspoon of the rice mixture into the center of the grape leaf, and carefully fold in the sides and roll it like you would when making a wrap. Repeat until all the stuffing has been used and place the wrapped grape leaves in a tray.\nLine the bottom of a large pot with tomatoes and/or potatoes and season with salt and pepper. Neatly arrange the stuffed and rolled grape leaves in rows, alternating directions, to completely cover the circumference of the pot. Drizzle each layer with olive oil and season with salt and pepper to taste.\nPlace small round plate on top of grape leaves in the pot to hold them down and prevent floating while they are cooking.\nAdd 5-6 cups of boiling water to completely cover the grape leaves and the plate, then cover the pot and cook on Medium heat for 30 minutes, until most of the water is absorbed and the rice is cooked.\nAdd the lemon juice on top of the grape leaves, cover and cook on low heat for an additional 45 minutes.\nRemove from heat and let cool uncovered for 30 minutes. Transfer to a dish and enjoy warm!", "preptime": "75 min", "cooktime": "75 min", "servings": "60", "tags": "Main, Arabic Food, Lebanese, Lebanese Grape Leaves, Stuffed Grape Leaves", "notes": "These Lebanese Stuffed Grape Leaves (Warak Enab) are made with a spiced ground beef and rice mixture - a delicious Mediterranean dish commonly served as an appetizer!", "url": "https://feelgoodfoodie.net/recipe/lebanese-stuffed-grape-leaves/", "date": "", "rating": 0}, {"id": 108, "name": "Risotto alla Milanese", "cuisine": "Italian", "source": "foodandwine.com", "location": "", "ingredients": "5 1/2 cups chicken stock, preferably homemade\n2 tablespoons extra-virgin olive oil\n1 small onion, finely chopped\nKosher salt\nFreshly ground black pepper\n1 1/2 cups arborio rice (10 ounces)\nPinch of saffron threads\n1/2 cup dry white wine\n1/2 cup freshly grated Parmigiano-Reggiano cheese\n1 tablespoon unsalted butter\n2 tablespoons chopped flat-leaf parsley", "instructions": "Gather the ingredients.\nIn a medium saucepan, bring the chicken stock to a simmer; keep warm.\nIn a large saucepan, heat the olive oil. Add the onion, season with salt and pepper, and cook over moderate heat, stirring, until softened, about 5 minutes.\nAdd the rice and cook for 1 minute, stirring to thoroughly coat.\nCrumble the saffron into the wine.\nAdd the saffron and wine mixture to the rice.\nCook, stirring, until the wine is absorbed.\nAdd 1 cup of the warm stock and cook over moderate heat, stirring constantly, until nearly absorbed.\nContinue adding the stock 1/2 cup at a time, stirring constantly, until it is nearly absorbed between additions.\nThe risotto is done when the rice is al dente and suspended in a thick, creamy sauce, about 20 minutes total. Season the risotto with salt and pepper. Stir in the cheese, butter, and parsley and serve immediately.", "preptime": "", "cooktime": "", "servings": "", "tags": "Main", "notes": "This Italian risotto owes its delicate flavor and golden hue to saffron. For risotto alla Milanese, cook the rice in chicken stock and dry white wine, then combine with Parmesan and butter.", "url": "https://www.foodandwine.com/recipes/milanese-risotto", "date": "", "rating": 0}, {"id": 109, "name": "Moroccan Chicken Tagine", "cuisine": "Other", "source": "thespruceeats.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.thespruceeats.com/chicken-tagine-with-preserved-lemons-olives-2394715", "date": "", "rating": 0}, {"id": 110, "name": "Ricotta Cheese", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/284000/chef-johns-homemade-ricotta-cheese/", "date": "", "rating": 0}, {"id": 111, "name": "Shrimp and Chorizo Flatbreads Recipe - Jose Garces", "cuisine": "Other", "source": "foodandwine.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.foodandwine.com/recipes/shrimp-and-chorizo-flatbreads", "date": "", "rating": 0}, {"id": 112, "name": "The Best Homemade Swedish Meatballs", "cuisine": "Other", "source": "simplyrecipes.com", "location": "", "ingredients": "Meatballs:\n1 tablespoon butter\n1/2 large yellow or white onion, peeled, grated (use the large holes of a box cheese grater)\n1/4 cup milk\n3 slices of bread, crusts removed, bread cut into cubes (2 cups of cubed bread)\n1 large egg\n3/4 pound ground beef\n1/2 pound ground pork\n1 teaspoon kosher salt\n1 teaspoon black pepper\n1/2 teaspoon freshly ground nutmeg\n1/2 teaspoon ground cardamom\nSauce:\n3 tablespoons butter\n3 tablespoons flour\n2 cups beef stock\n1/4 cup sour cream (use full-fat sour cream or the sauce may curdle)\nSalt and pepper to taste\n2 tablespoons Lingonberry, red currant, raspberry or cranberry jelly, less or more to taste (optional)", "instructions": "Soak the bread in milk, then shred: Place the cubed bread in a large bowl and mix with the milk. Let sit for 5 to 10 minutes. Once the bread has soaked up all the milk, shred with the tines of a fork or by hand.\nSauté the grated onion: Melt 1 tablespoon of butter in a sauté pan on medium-high heat. Stir in the grated onion and cook until translucent and softened, 3 to 4 minutes. Remove from the heat and let cool for a minute.\nMake the meatball mixture: Stir the cooled onions into the milk bread mixture. Add the egg, ground beef and pork, salt, pepper, nutmeg, and cardamom. Use your (clean) hands to mix everything together until well combined. (If you have extra time, chilling the mixture for 20 or so minutes will make it easier to roll out the meatballs.)\nForm the meatballs: Use your hands to form the mixture into meatballs about 1 1/4-inch to 1 1/2-inch wide and place them on a plate or sheet pan. This recipe should make about 40 meatballs. Note that the meatballs will be a bit on the wet side.\nBrown the meatballs on all sides: Heat 3 tablespoons of butter in a large sauté pan on medium heat. When the butter is melted and foamy, start adding some meatballs to the pan. Working in batches as to not crowd the pan, slowly brown the meatballs on all sides. Use a wooden spoon or tongs to turn them. Handle the meatballs gently so they do not break apart as you turn them. Once the meatballs have browned on all sides and are just cooked through, remove them from the pan to a bowl. You'll warm the meatballs in the sauce later. Once you have removed the meatballs from the pan, wipe out the butter and blackened bits with a paper towel. We'll want to start with fresh butter so we don't pick up any burnt bits from the pan. This way, we will be able to more accurately gauge the amount of fat in the pan for making the meatball sauce in the next step.\nMake a roux: Add 3 tablespoons of fresh butter to the pan. Heat the butter in the pan on medium heat until it melts and starts to bubble. Slowly whisk in 3 tablespoons of flour. Stir until smooth. Continue to stir, allowing the flour mixture to cook, several minutes, until the roux is the color of coffee with cream.\nAdd stock to make the sauce: When the roux has cooked to a lovely shade of light brown, slowly add the stock, stirring as you do. The stock will sputter at first and the roux may seize up, but keep adding the stock slowly and keep stirring. Eventually the sauce will loosen and become silky.\nStir in the sour cream and optional jelly: Remove the pan from heat and stir in the sour cream. If you are including jelly, either stir it in now or serve it on the side. Taste for seasonings and add more salt and pepper to taste. (I use about 1/2 teaspoon of kosher salt, and 1/4 teaspoon of pepper.)\nHeat the meatballs in the sauce: Return the meatballs to the pan with the sauce and cook on low heat to warm them through for a few minutes.\nServe fresh from the pan: Serve over mashed potatoes or egg noodles. Or serve individual Swedish meatballs dipped in gravy as an appetizer. Did you love the recipe? Give us some stars and leave a comment below!", "preptime": "20 min", "cooktime": "60 min", "servings": "6", "tags": "Snack, Comfort Food, Ground Beef, Ground Pork, Meatballs, Swedish", "notes": "The best Swedish meatballs recipe ever! Season ground beef and pork with nutmeg and cardamom, then serve with creamy Swedish meatballs sauce. Ikea meatballs will never top this recipe!", "url": "https://www.simplyrecipes.com/recipes/swedish_meatballs/", "date": "", "rating": 0}, {"id": 113, "name": "Chicken Scallopini", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/215619/chicken-scallopini/", "date": "", "rating": 0}, {"id": 114, "name": "Skillet Chicken and Chorizo Paella", "cuisine": "Other", "source": "foodandwine.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.foodandwine.com/recipes/skillet-chicken-and-chorizo-paella", "date": "", "rating": 0}, {"id": 115, "name": "Taktouka (Moroccan Tomato and Roasted Bell Pepper Salad)", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "2 large green bell peppers\n2 tablespoons extra-virgin olive oil\n3 garlic cloves, (minced)\n1 (15-ounce) can diced tomatoes or diced fire-roasted tomatoes\n1/2 teaspoon sweet paprika\n1/2 teaspoon red pepper flakes, (or more to taste)\n1/2 teaspoon ground coriander\nKosher Salt\nBlack pepper\n1/4 cup finely chopped parsley leaves\n1/4 cup finely chopped cilantro leaves\nSplash red wine vinegar, (no more than a teaspoon)\nCrusty bread or pita, (for serving (optional))", "instructions": "Roast the bell peppers. Turn two of your gas burners to medium. Put a bell pepper directly over the flame on each burner. Use a pair of tongs to turn until the pepper is charred all over and very soft, about 15 minutes in total. (If you don’t have a gas stove, see my oven method below.)\nSoften the peppers. Immediately transfer to a heat-safe bowl and cover tightly with plastic wrap to trap the steam. Set aside for 10 minutes or so until they are cool enough to handle.\nMake a garlicky oil. Meanwhile, heat the olive oil in a large nonstick skillet over medium. Add the garlic and swirl for about 30 seconds to 1 minute, tossing regularly just until it’s fragrant.\nSimmer the tomatoes. Stir in the tomatoes, paprika, red pepper flakes, coriander, and a big pinch of salt and pepper. Bring to a boil, then lower the heat and cover partway. Simmer for about 10 minutes.\nPeel and chop the roasted peppers. When the peppers are cool enough to handle, peel the outer charred skin (this will be messy). Discard the charred skin, stem, and seeds and roughly chop the remaining flesh.\nSimmer the peppers. Add the chopped roasted peppers to the skillet with the tomatoes. Simmer for another 5 minutes or so.\nFinish and serve. Stir in the fresh parsley, cilantro, and red wine vinegar. Let the taktouka rest for a bit until just warm or at room temperature. Serve with your favorite bread.", "preptime": "5 min", "cooktime": "45 min", "servings": "6", "tags": "Salad, Bell Peppers Recipe, Roasted Peppers", "notes": "Somewhere between a salad and a dip, taktuka is a garlicky, spicy and lightly smoky mezze that's a beloved staple of Moroccan cuisine. This healthy appetizer is easy to make and tastes even better the next day.", "url": "https://www.themediterraneandish.com/taktouka-moroccan-tomato-and-roasted-bell-pepper-salad/#wprm-recipe-container-74802", "date": "", "rating": 0}, {"id": 116, "name": "Sweet and Sour Chicken {Popular Recipe!} - Dinner, then Dessert", "cuisine": "Other", "source": "dinnerthendessert.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://dinnerthendessert.com/sweet-sour-chicken/", "date": "", "rating": 0}, {"id": 117, "name": "The Best Homemade Ranch Salad Dressing", "cuisine": "Other", "source": "barefeetinthekitchen.com", "location": "", "ingredients": "1/2 cup mayonnaise\n1/2 cup sour cream\n1/2 cup buttermilk or regular milk\n3/4 - 1 teaspoon dried dill weed\n1/2 teaspoon dried parsley\n1/2 teaspoon dried chives\n1/4 teaspoon onion powder\n1/2 teaspoon garlic powder\n1/4 teaspoon fine sea salt\n1/8 teaspoon finely cracked pepper\nfreshly squeezed lemon juice to taste (approximately 1-3 teaspoons, adjust to taste)", "instructions": "Whisk together the mayo, sour cream and milk until smooth. Add the spices and whisk until combined. Add the lemon and whisk again. Pour into a jar and chill in the refrigerator until ready to serve. This dressing will keep nicely in the refrigerator for up to a week. Enjoy!", "preptime": "5 min", "cooktime": "", "servings": "24", "tags": "Salad", "notes": "Perfectly tangy, creamy homemade ranch dressing tastes better than anything you could buy in a store.", "url": "https://barefeetinthekitchen.com/homemade-ranch-salad-dressing/#wprm-recipe-container-20539", "date": "", "rating": 0}, {"id": 118, "name": "Recipes and Cooking Guides From The New York Times", "cuisine": "Other", "source": "cooking.nytimes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "NYT Cooking is the digital source for thousands of the best recipes from The New York Times along with how-to guides for home cooks at every skill level. Discover new recipes that are tried, tested, and truly delicious with NYT Cooking.", "url": "https://cooking.nytimes.com/", "date": "", "rating": 0}, {"id": 119, "name": "Best Ever Homemade Flour Tortillas (Ridiculously Easy!)", "cuisine": "Mexican", "source": "thecafesucrefarine.com", "location": "", "ingredients": "3 cups all-purpose flour\n1 teaspoon kosher salt (I use Morton's)\n1 teaspoon baking powder\n⅓ cup extra virgin olive oil, vegetable oil or other fairly neutral flavored oil\n1 cup warm water", "instructions": "— To make by hand: —\nIn a medium bowl, combine flour, salt, and baking powder. Using a sturdy silicone spatula or a sturdy wooden spoon, mix dry ingredients until well combined.\nMake a well in the center of the dry ingredients and add the oil and water. Stir well from the bottom up, until all dry ingredients are incorporated and the dough begins to come together to form a shaggy ball.\nTurn the dough out onto a lightly floured work surface and knead for 1-2 minutes until the dough is nice and smooth.\n— To make with a mixer: —\nCombine flour, salt and baking powder in the bowl of a stand mixer. Using the dough hook, mix the dry ingredients until well combined.\nAdd oil and water while the mixer is running at medium speed. After about 1 minute, or when the mixture comes together and begins to form a ball, decrease the mixing speed to low. Continue mixing for 1 minute, or until the dough is smooth.\nTransfer dough to a lightly floured work surface.\n— Continue with both methods: —\nDivide into 16 equal portions. (I use a food scale) Turn each piece to coat with flour. Form each piece into a ball and flatten with the palm of your hand.\nCover flattened balls of dough with a clean kitchen towel or a piece of plastic wrap. Allow to rest for at least 15 minutes before proceeding.\nRoll each ball into a 6–7-inch circle on a lightly floured surface. Keep the work surface and rolling pin lightly floured.\nDon’t stack uncooked tortillas directly on top of each other, or they will stick together. (I like to separate my tortillas with parchment paper.)\nHeat a large pan over medium heat.\nCook the tortillas one at a time for 45–60 seconds, until bubbles and golden spots appear on the surface. If browning too quickly, reduce the heat slightly. If it’s taking longer than a minute to see a few pale, golden-brown spots on the underside of the tortillas, increase the heat slightly. Flip to the other side and cook for 15-20 seconds. The tortillas should be nice and soft but have a few small brown spots on the surface.\nRemove the cooked tortillas from the pan with tongs and stack them in a covered container, an open ziplock bag, or cover them with a slightly damp kitchen towel. Stacking and covering is what will keep the tortillas soft.\nServe warm or allow to cool for later use. When ready to use, place a slightly damp paper towel in the bottom of a microwave-safe container (with a cover) that will hold the stacked tortillas. Microwave uncovered for 15-30 seconds (start with 15) or until warm, then keep covered to hold heat while serving.\nStore in an airtight container or zippered bag at room temperature for 24 hours or refrigerate for up to 1 week. To freeze, separate the tortillas with parchment paper or waxed paper and place them in a zippered bag before storing in the freezer.", "preptime": "25 min", "cooktime": "25 min", "servings": "16", "tags": "Baking, Best Flour Tortilla Recipe, Easy Flour Tortillas, Flour Tortillas, Flour Tortillas From Scratch, Homemade Flour Tortilas", "notes": "These homemade flour tortillas are soft, tender, and SO much better than store-bought! With just 5 basic ingredients, this easy flour tortilla recipe comes together quickly, by hand or with a mixer and makes perfect wraps, tacos, quesadillas, or even tortilla pizzas.", "url": "https://thecafesucrefarine.com/best-ever-homemade-flour-tortillas
