<style>
  :root {
    --cream: #f7f1e8;
    --warm-white: #fdf9f3;
    --ink: #2b2118;
    --espresso: #3d2b1f;
    --rust: #b5541c;
    --terracotta: #c9714a;
    --sage: #7a8c6e;
    --gold: #c9a84c;
    --parchment: #ede0cc;
    --shadow: rgba(43,33,24,0.12);
    --shadow-deep: rgba(43,33,24,0.25);
    --dur-press: 80ms;
    --dur-release: 140ms;
    --dur-micro: 120ms;
    --dur-feedback: 180ms;
    --dur-toast: 200ms;
    --dur-modal-close: 150ms;
    --dur-undo-bar: 6000ms;
    --ease-press: cubic-bezier(0.2, 0, 0.4, 1);
    --ease-release: cubic-bezier(0.34, 1.56, 0.64, 1);
    --ease-shake: cubic-bezier(0.36, 0.07, 0.19, 0.97);
    --ease-modal: cubic-bezier(0.16, 1, 0.3, 1);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 100%, rgba(181,84,28,0.08) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* HEADER */
  header { text-align: center; padding: 48px 24px 36px; position: relative; }
  header::after { content:''; display:block; width:200px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); margin:24px auto 0; }
  .header-eyebrow { font-family:'Dancing Script',cursive; font-size:1.15rem; color:var(--terracotta); margin-bottom:8px; }
  h1 { font-family:'Playfair Display',serif; font-size:clamp(2.2rem,5vw,3.4rem); font-weight:700; color:var(--espresso); line-height:1.15; }
  h1 em { font-style:italic; color:var(--rust); }
  .header-sub { margin-top:10px; font-size:0.9rem; color:var(--sage); letter-spacing:0.08em; text-transform:uppercase; }

  /* IMPORT BANNER */
  .import-banner { max-width:920px; margin:0 auto 28px; padding:0 24px; }
  .import-card { background:var(--warm-white); border:1.5px dashed var(--gold); border-radius:12px; padding:22px 24px; display:flex; flex-wrap:wrap; gap:16px; align-items:center; }
  .import-card-text { flex:1; min-width:180px; }
  .import-card-text strong { display:block; font-family:'Playfair Display',serif; font-size:1.05rem; color:var(--espresso); margin-bottom:3px; }
  .import-card-text span { font-size:0.82rem; color:var(--sage); line-height:1.5; }
  .import-controls { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .import-url-row { display:flex; gap:8px; align-items:center; }
  .import-url-row input { padding:10px 14px; border:1.5px solid var(--parchment); border-radius:6px; background:var(--cream); font-family:'Lato',sans-serif; font-size:0.88rem; color:var(--ink); width:300px; max-width:100%; outline:none; transition:border-color .2s; }
  .import-url-row input:focus { border-color:var(--gold); }
  .btn-import { padding:10px 20px; background:var(--rust); color:#fff; border:none; border-radius:6px; font-family:'Lato',sans-serif; font-size:0.88rem; font-weight:700; letter-spacing:.05em; cursor:pointer; transition:background .15s,transform .12s; white-space:nowrap; }
  .btn-import:hover { background:var(--terracotta); transform:translateY(-1px); }
  .btn-import:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .btn-file { padding:10px 18px; border:1.5px solid var(--parchment); border-radius:6px; background:var(--warm-white); font-family:'Lato',sans-serif; font-size:0.85rem; color:var(--espresso); cursor:pointer; transition:border-color .15s,background .15s; white-space:nowrap; }
  .btn-file:hover { border-color:var(--gold); background:var(--cream); }
  #fileInput { display:none; }
  .or-divider { font-size:0.75rem; color:var(--sage); letter-spacing:.06em; }

  /* TOOLBAR */
  .toolbar { max-width:920px; margin:0 auto 28px; padding:0 24px; display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
  .search-wrap { flex:1; min-width:200px; position:relative; }
  .search-wrap input { width:100%; padding:12px 16px 12px 44px; border:1.5px solid var(--parchment); border-radius:6px; background:var(--warm-white); font-family:'Lato',sans-serif; font-size:0.9rem; color:var(--ink); outline:none; transition:border-color .2s; }
  .search-wrap input:focus { border-color:var(--gold); }
  .search-wrap::before { content:'🔍'; position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:.85rem; opacity:.5; }
  .recent-searches { display:flex; gap:8px; align-items:center; overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; padding-top:0; scrollbar-width:none; max-height:0; opacity:0; pointer-events:none; transform:translateY(-4px); transition:opacity .15s,transform .15s,max-height .15s,padding-top .15s; }
  .recent-searches.show { padding-top:8px; max-height:44px; opacity:1; pointer-events:all; transform:translateY(0); }
  .recent-searches::-webkit-scrollbar { display:none; }
  .suggestion-chip { display:inline-flex; align-items:center; justify-content:center; min-height:36px; max-width:120px; padding:7px 12px; border:1.5px solid var(--parchment); border-radius:999px; background:var(--warm-white); color:var(--espresso); font-family:'Lato',sans-serif; font-size:.78rem; letter-spacing:.03em; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:border-color .15s,background .15s,color .15s; }
  .suggestion-chip:hover,.suggestion-chip:focus-visible { border-color:var(--gold); background:var(--cream); outline:none; }
  .filter-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .filter-btn { padding:9px 16px; border:1.5px solid var(--parchment); border-radius:20px; background:var(--warm-white); font-family:'Lato',sans-serif; font-size:.82rem; letter-spacing:.04em; color:var(--espresso); cursor:pointer; transition:all .18s; }
  .filter-btn:hover,.filter-btn.active { background:var(--espresso); border-color:var(--espresso); color:var(--cream); }
  .filter-cluster { flex:1 1 100%; display:grid; gap:10px; }
  .filter-row { display:flex; gap:10px; align-items:flex-start; flex-wrap:wrap; }
  .filter-row-label { min-width:68px; padding-top:10px; font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--sage); font-weight:700; }
  .active-filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .active-filter-chip { display:inline-flex; align-items:center; gap:8px; padding:7px 12px; border-radius:999px; background:rgba(61,43,31,0.08); color:var(--espresso); font-size:.78rem; letter-spacing:.03em; }
  .active-filter-chip button { border:none; background:none; color:inherit; cursor:pointer; font-size:1rem; line-height:1; opacity:.6; }
  .active-filter-chip button:hover,.active-filter-chip button:focus-visible { opacity:1; outline:none; }
  .filter-clear { border:none; background:none; color:var(--rust); cursor:pointer; font-size:.8rem; letter-spacing:.04em; text-decoration:underline; text-underline-offset:3px; }
  .filter-more-chip { border-style:dashed; }
  .add-btn { padding:11px 20px; background:var(--sage); color:#fff; border:none; border-radius:6px; font-family:'Lato',sans-serif; font-size:.88rem; font-weight:700; letter-spacing:.05em; cursor:pointer; transition:background .15s,transform .12s; white-space:nowrap; }
  .add-btn:hover { background:#5c7052; transform:translateY(-1px); }
  .add-btn-primary { padding:12px 24px; font-size:.95rem; box-shadow:0 4px 14px rgba(122,140,110,0.3); }
  .toolbar-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .btn-toolbar { padding:10px 14px; border:1.5px solid var(--parchment); border-radius:6px; background:var(--warm-white); font-family:'Lato',sans-serif; font-size:.82rem; color:var(--espresso); cursor:pointer; transition:border-color .15s,background .15s; white-space:nowrap; }
  .btn-toolbar:hover,.btn-toolbar:focus-visible { border-color:var(--gold); background:var(--cream); outline:none; }

  /* ACCESSIBILITY */
  .visually-hidden { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
  .skip-link { position:absolute; top:-40px; left:8px; background:var(--espresso); color:var(--cream); padding:10px 16px; border-radius:6px; text-decoration:none; font-weight:700; z-index:400; transition:top .15s; }
  .skip-link:focus { top:8px; outline:2px solid var(--gold); outline-offset:2px; }
  :focus-visible { outline:2px solid var(--gold); outline-offset:2px; }

  /* UNDO TOAST */
  .toast-undo { display:flex; align-items:center; gap:14px; max-width:380px; }
  .toast-undo button { background:var(--gold); color:var(--espresso); border:none; padding:6px 14px; border-radius:4px; font-weight:700; font-size:.82rem; cursor:pointer; font-family:inherit; letter-spacing:.04em; }
  .toast-undo button:hover,.toast-undo button:focus-visible { background:#d9b85e; outline:none; }
  .toast-action { display:flex; align-items:center; gap:14px; max-width:420px; }
  .toast-action button { background:var(--gold); color:var(--espresso); border:none; padding:6px 14px; border-radius:4px; font-weight:700; font-size:.82rem; cursor:pointer; font-family:inherit; letter-spacing:.04em; }
  .toast-action button:hover,.toast-action button:focus-visible { background:#d9b85e; outline:none; }

  /* STATS */
  .stats-bar { max-width:920px; margin:0 auto 24px; padding:0 24px; display:flex; gap:24px; flex-wrap:wrap; }
  .stat-chip { display:flex; align-items:center; gap:7px; font-size:.82rem; color:var(--sage); letter-spacing:.04em; }
  .stat-chip strong { color:var(--espresso); font-size:1.05rem; }

  /* GRID */
  .recipe-grid { max-width:920px; margin:0 auto; padding:0 24px 80px; display:grid; grid-template-columns:repeat(auto-fill,minmax(265px,1fr)); gap:24px; }

  /* CARD */
  .card { background:var(--warm-white); border-radius:10px; border:1px solid rgba(201,168,76,0.2); overflow:hidden; box-shadow:0 2px 14px var(--shadow); cursor:pointer; transition:transform .18s,box-shadow .18s; animation:fadeUp .4s ease both; display:flex; flex-direction:column; }
  .card:hover { transform:translateY(-4px); box-shadow:0 8px 28px var(--shadow); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .card-image { aspect-ratio:4 / 3; background:linear-gradient(135deg, var(--parchment), var(--cream)); overflow:hidden; }
  .card-image img { width:100%; height:100%; display:block; object-fit:cover; }
  .card-image-empty { display:grid; place-items:center; }
  .card-image-empty::before { content:'🍳'; font-size:3rem; opacity:.25; }
  .card-banner { height:4px; background:var(--parchment); margin:0 -20px 14px; }
  .card-banner.cuisine-italian{background:linear-gradient(90deg,#e8a87c,#c9714a)}
  .card-banner.cuisine-french{background:linear-gradient(90deg,#7a8c6e,#5c7052)}
  .card-banner.cuisine-japanese{background:linear-gradient(90deg,#c47a8a,#a0445a)}
  .card-banner.cuisine-mexican{background:linear-gradient(90deg,#e8c47c,#c9a84c)}
  .card-banner.cuisine-indian{background:linear-gradient(90deg,#d4a06a,#b5541c)}
  .card-banner.cuisine-american{background:linear-gradient(90deg,#8caab8,#4a7a94)}
  .card-banner.cuisine-mediterranean{background:linear-gradient(90deg,#8cb8a0,#4a9470)}
  .card-banner.cuisine-thai{background:linear-gradient(90deg,#c4917a,#8c4a3c)}
  .card-banner.cuisine-chinese{background:linear-gradient(90deg,#c47a7a,#943030)}
  .card-banner.cuisine-greek{background:linear-gradient(90deg,#8ab0c4,#3a6a88)}
  .card-banner.cuisine-spanish{background:linear-gradient(90deg,#e8d47c,#b8942c)}
  .card-banner.cuisine-other{background:linear-gradient(90deg,#b0a0c0,#7a6a94)}
  .card-body { padding:0 20px 10px; flex:1; }
  .card-meta { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .card-cuisine { font-size:.72rem; letter-spacing:.1em; text-transform:uppercase; color:var(--terracotta); font-weight:700; }
  .card-stars { font-size:.9rem; letter-spacing:-1px; }
  .card-title { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:600; color:var(--espresso); margin-bottom:5px; line-height:1.3; }
  .card-origin { font-size:.78rem; color:var(--sage); margin-bottom:8px; display:flex; align-items:center; gap:4px; }
  .card-origin::before { content:'📍'; font-size:.72rem; }
  .card-notes { font-size:.83rem; color:#6b5a50; line-height:1.55; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
  .card-link { font-size:.72rem; color:var(--gold); margin-top:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; opacity:.8; }
  .card-footer { padding:10px 16px 14px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid var(--parchment); margin-top:10px; }
  .card-tags { display:flex; gap:5px; flex-wrap:wrap; }
  .tag { display:inline-flex; align-items:center; padding:2px 9px; background:var(--parchment); border-radius:12px; font-size:.7rem; color:var(--espresso); letter-spacing:.03em; border:none; }
  .card-tag { cursor:pointer; font:inherit; background:linear-gradient(90deg,var(--tag-accent,var(--gold)) 0,var(--tag-accent,var(--gold)) 4px,var(--parchment) 4px,var(--parchment) 100%); padding:3px 10px 3px 12px; transition:transform .15s,box-shadow .15s,filter .15s; }
  .card-tag:hover,.card-tag:focus-visible { transform:translateY(-1px); box-shadow:0 0 0 2px rgba(201,168,76,0.18); filter:saturate(1.05); outline:none; }
  .card-actions { display:flex; gap:8px; }
  .icon-btn { width:45px; height:45px; padding:0; display:grid; place-items:center; background:none; border:none; cursor:pointer; font-size:1.15rem; opacity:.4; transition:opacity .15s,transform .12s; }
  .icon-btn:hover { opacity:1; transform:scale(1.15); }

  /* EMPTY */
  .empty-state { grid-column:1/-1; text-align:center; padding:64px 24px; color:var(--sage); }
  .empty-state .ei { font-size:3.5rem; margin-bottom:16px; }
  .empty-state p { font-family:'Playfair Display',serif; font-style:italic; font-size:1.1rem; }

  /* MODAL BASE */
  .modal-overlay { position:fixed; inset:0; background:rgba(43,33,24,0.55); backdrop-filter:blur(3px); display:flex; align-items:center; justify-content:center; z-index:100; padding:16px; opacity:0; pointer-events:none; transition:opacity .22s; }
  .modal-overlay.open { opacity:1; pointer-events:all; }
  .modal { background:var(--warm-white); border-radius:14px; width:100%; max-width:600px; max-height:92vh; overflow-y:auto; box-shadow:0 20px 60px var(--shadow-deep); transform:translateY(20px); transition:transform .22s; border:1px solid rgba(201,168,76,0.2); }
  .modal-overlay.open .modal { transform:translateY(0); }
  .modal-header { padding:24px 26px 18px; border-bottom:1px solid var(--parchment); display:flex; justify-content:space-between; align-items:flex-start; }
  .modal-header h2 { font-family:'Playfair Display',serif; font-size:1.5rem; color:var(--espresso); }
  .close-btn { background:none; border:none; font-size:1.4rem; cursor:pointer; opacity:.4; line-height:1; transition:opacity .15s; }
  .close-btn:hover { opacity:1; }
  .modal-body { padding:22px 26px 10px; }
  .modal-footer { padding:12px 26px 26px; display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }

  /* FORM */
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .form-group { margin-bottom:16px; }
  .form-group label { display:block; font-size:.75rem; letter-spacing:.1em; text-transform:uppercase; color:var(--sage); margin-bottom:5px; font-weight:700; }
  .form-group input,.form-group select,.form-group textarea { width:100%; padding:10px 13px; border:1.5px solid var(--parchment); border-radius:6px; background:var(--cream); font-family:'Lato',sans-serif; font-size:.88rem; color:var(--ink); outline:none; transition:border-color .18s; }
  .form-group input:focus,.form-group select:focus,.form-group textarea:focus { border-color:var(--gold); }
  .form-group textarea { resize:vertical; min-height:88px; line-height:1.55; }
  .hint { font-size:.73rem; color:var(--sage); margin-top:4px; }
  .tag-input-shell { position:relative; }
  .tag-input-wrap { width:100%; min-height:46px; padding:8px 10px; border:1.5px solid var(--parchment); border-radius:6px; background:var(--cream); display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .tag-input-wrap:focus-within { border-color:var(--gold); box-shadow:0 0 0 3px rgba(201,168,76,0.15); }
  .tag-chip-list { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .tag-chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; background:var(--parchment); color:var(--espresso); font-size:.76rem; letter-spacing:.03em; animation:chip-bounce var(--dur-feedback) var(--ease-release); }
  .tag-chip.flash { box-shadow:0 0 0 3px rgba(201,168,76,0.45); }
  .tag-chip button { border:none; background:none; color:inherit; cursor:pointer; font-size:1rem; line-height:1; opacity:.7; }
  .tag-chip button:hover,.tag-chip button:focus-visible { opacity:1; outline:none; }
  .tag-input-field { flex:1 1 140px; min-width:140px; border:none!important; background:transparent!important; box-shadow:none!important; padding:4px 2px!important; }
  .tag-dropdown { position:absolute; inset:auto 0 auto 0; top:calc(100% + 6px); z-index:20; list-style:none; margin:0; padding:6px; max-height:200px; overflow-y:auto; border:1.5px solid var(--parchment); border-radius:10px; background:var(--warm-white); box-shadow:0 10px 28px var(--shadow); display:none; }
  .tag-dropdown.show { display:block; }
  .tag-dropdown-item { width:100%; padding:9px 10px; border:none; border-radius:8px; background:transparent; display:flex; justify-content:space-between; align-items:center; text-align:left; color:var(--espresso); cursor:pointer; font:inherit; }
  .tag-dropdown-item span:last-child { font-size:.72rem; color:var(--sage); }
  .tag-dropdown-item:hover,.tag-dropdown-item[aria-selected="true"] { background:rgba(201,168,76,0.16); outline:none; }
  .star-select { display:flex; gap:8px; margin-top:4px; }
  .star-option { font-size:1.35rem; cursor:pointer; opacity:.3; transition:opacity .12s,transform .12s; }
  .star-option.active,.star-option:hover { opacity:1; transform:scale(1.1); }

  /* TAG MANAGER */
  .tag-manager-modal { max-width:920px; }
  .tag-manager-layout { display:grid; gap:16px; }
  .tag-manager-note { font-size:.8rem; color:var(--sage); }
  .tag-bulk-bar { display:none; align-items:center; justify-content:space-between; gap:12px; padding:12px 14px; border:1px solid rgba(201,168,76,0.28); border-radius:10px; background:rgba(201,168,76,0.08); }
  .tag-bulk-bar.show { display:flex; }
  .tag-bulk-bar-actions { display:flex; gap:8px; flex-wrap:wrap; }
  .tag-table-wrap { border:1px solid rgba(201,168,76,0.2); border-radius:12px; overflow:auto; max-height:50vh; background:var(--warm-white); }
  .tag-table { min-width:760px; }
  .tag-table-row { display:grid; grid-template-columns:44px 80px minmax(180px, 1.3fr) 90px 90px 160px; align-items:center; gap:10px; padding:10px 14px; border-bottom:1px solid rgba(237,224,204,0.9); }

<script type="module">
// ══════════════════════════════════════════════
// SAFETY — imported from src/recipe-lib.js (single source of truth, testable)
// ══════════════════════════════════════════════
import {
  TAG_COLOR_PALETTE,
  cleanTagLabel,
  escapeHtml,
  getRecipeTagLabels,
  getTagLabel,
  humanizeTagSlug,
  resolveTagColor,
  safeUrl,
  slugifyTag,
  splitTagLabels,
} from './src/recipe-lib.js';
import { filtered as filteredRecipes, renderGridHtml, statsFor, stars } from './src/recipe-render.js';
import { validateImport } from './src/recipe-schema.js';
import { mergeSeedImages } from './src/seed-images.js';
import { createRecipeApi } from './src/recipe-api.js';
import { submitAccessCode } from './src/auth.js';
import { loadRemoteRecipeCache, saveRemoteRecipeCache } from './src/recipe-cache.js';
import { bootstrapRemoteRecipes, deleteRemoteRecipe, importRemoteRecipes, saveRemoteRecipe } from './src/recipe-store.js';
import { loadPrefs, recordEdit, recordExport, recordFilter, recordRating, recordSearch, recordView, savePrefs } from './src/recipe-prefs.js';

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const KEY = 'recipe_journal_v3';
const SCHEMA_KEY = 'recipe_journal_schema_version';
const SCHEMA_VERSION = 5;
const DEFAULT_FILTERS = Object.freeze({
  cuisine: null,
  tags: [],
  rating: 0,
  search: '',
});
const MAX_VISIBLE_TAGS = 12;
const FALLBACK_CUISINES = ['Italian','French','Japanese','Mexican','Indian','American','Mediterranean','Thai','Chinese','Greek','Spanish','Other'];
const APP_CONFIG = Object.freeze({
  syncMode: 'local',
  apiBaseUrl: '/api/v1',
  ...(globalThis.RECIPE_TRACKER_CONFIG || {}),
});
const REMOTE_MODE = APP_CONFIG.syncMode === 'remote';
const remoteApi = REMOTE_MODE ? createRecipeApi({ baseUrl: APP_CONFIG.apiBaseUrl || '/api/v1' }) : null;
let prefs = loadPrefs();

const cloneFilters = (value = DEFAULT_FILTERS) => ({
  cuisine: value?.cuisine ? String(value.cuisine) : null,
  tags: Array.isArray(value?.tags) ? [...new Set(value.tags.map((slug) => String(slug)).filter(Boolean))] : [],
  rating: Number.isFinite(Number(value?.rating)) ? Math.max(0, Math.min(5, Number(value.rating))) : 0,
  search: String(value?.search || ''),
});

function getStoredSchemaVersion() {
  try {
    const raw = Number(localStorage.getItem(SCHEMA_KEY) || 0);
    return Number.isFinite(raw) ? raw : 0;
  } catch {
    return 0;
  }
}

function setStoredSchemaVersion(version = SCHEMA_VERSION) {
  localStorage.setItem(SCHEMA_KEY, String(version));
}

function createTagRecord(label, options = {}) {
  const slug = options.slug || slugifyTag(label);
  const createdAt = options.createdAt || new Date().toISOString();
  const colorIndex = Number.isFinite(Number(options.colorIndex)) ? Number(options.colorIndex) : 0;
  return {
    label: cleanTagLabel(label) || humanizeTagSlug(slug),
    slug,
    color: options.color === undefined
      ? TAG_COLOR_PALETTE[colorIndex % TAG_COLOR_PALETTE.length]
      : options.color,
    colorIndex,
    pinned: Boolean(options.pinned),
    createdAt,
    updatedAt: options.updatedAt || createdAt,
  };
}

function mergeTagRegistryMetadata(baseRegistry = {}, incomingRegistry = {}) {
  const merged = { ...(baseRegistry || {}) };
  Object.entries(incomingRegistry || {}).forEach(([key, raw]) => {
    const slug = slugifyTag(raw?.slug || key);
    if (!slug) return;
    const existing = merged[slug];
    merged[slug] = {
      ...createTagRecord(raw?.label || existing?.label || humanizeTagSlug(slug), {
        slug,
        color: raw?.color ?? existing?.color ?? null,
        colorIndex: raw?.colorIndex ?? existing?.colorIndex ?? Object.keys(merged).length,
        pinned: raw?.pinned ?? existing?.pinned ?? false,
        createdAt: existing?.createdAt || raw?.createdAt,
        updatedAt: raw?.updatedAt || existing?.updatedAt,
      }),
      ...existing,
      label: cleanTagLabel(raw?.label || existing?.label || humanizeTagSlug(slug)),
      slug,
      color: raw?.color ?? existing?.color ?? null,
      colorIndex: Number.isFinite(Number(raw?.colorIndex))
        ? Number(raw.colorIndex)
        : (Number.isFinite(Number(existing?.colorIndex)) ? Number(existing.colorIndex) : Object.keys(merged).length),
      pinned: Boolean(raw?.pinned ?? existing?.pinned),
      createdAt: existing?.createdAt || raw?.createdAt || new Date().toISOString(),
      updatedAt: raw?.updatedAt || existing?.updatedAt || existing?.createdAt || raw?.createdAt || new Date().toISOString(),
    };
  });
  return merged;
}

function hydrateRecipeState(recipeList = [], registryInput = {}) {
  const registry = mergeTagRegistryMetadata({}, registryInput);
  const normalizedRecipes = Array.isArray(recipeList)
    ? recipeList.map((recipe) => {
        const rawTags = Array.isArray(recipe?.tags) ? recipe.tags : splitTagLabels(recipe?.tags);
        const tagSlugs = [];
        const seen = new Set();
        rawTags.forEach((rawTag) => {
          const cleaned = cleanTagLabel(rawTag);
          if (!cleaned) return;
          const slug = registry[cleaned]?.slug === cleaned ? cleaned : slugifyTag(cleaned);
          if (!slug || seen.has(slug)) return;
          seen.add(slug);
          if (!registry[slug]) {
            registry[slug] = createTagRecord(
              Array.isArray(recipe?.tags) ? getTagLabel(cleaned, registry) : cleaned,
              { slug, colorIndex: Object.keys(registry).length }
            );
          }
          tagSlugs.push(slug);
        });
        return { ...recipe, tags: tagSlugs };
      })
    : [];

  normalizedRecipes.forEach((recipe) => {
    recipe.tags.forEach((slug) => {
      if (!registry[slug]) {
        registry[slug] = createTagRecord(humanizeTagSlug(slug), {
          slug,
          colorIndex: Object.keys(registry).length,
        });
      }
    });
  });

  return { recipes: normalizedRecipes, tagRegistry: registry };
}

function loadLocalState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (!raw) return { recipes: [], tagRegistry: {}, hasStoredState: false, requiresTagMigration: false };
    const parsed = JSON.parse(raw);
    const requiresTagMigration = getStoredSchemaVersion() < SCHEMA_VERSION && (
      Array.isArray(parsed) ||
      !parsed?.tagRegistry ||
      (Array.isArray(parsed?.recipes) && parsed.recipes.some((recipe) => !Array.isArray(recipe?.tags)))
    );
    if (Array.isArray(parsed)) return { ...hydrateRecipeState(parsed, {}), hasStoredState: true, requiresTagMigration };
    if (parsed && typeof parsed === 'object') {
      return { ...hydrateRecipeState(parsed.recipes, parsed.tagRegistry), hasStoredState: true, requiresTagMigration };
    }
    return { recipes: [], tagRegistry: {}, hasStoredState: false, requiresTagMigration: false };
  } catch (e) {
    console.error('loadLocalState failed:', e);
    return { recipes: [], tagRegistry: {}, hasStoredState: false, requiresTagMigration: false };
  }
}

function getTagMatchScore(label, query) {
  const loweredLabel = String(label || '').toLowerCase();
  const loweredQuery = String(query || '').trim().toLowerCase();
  if (!loweredQuery) return 2;
  if (loweredLabel.includes(loweredQuery)) return 2;
  let queryIndex = 0;
  for (const ch of loweredLabel) {
    if (ch === loweredQuery[queryIndex]) queryIndex += 1;
    if (queryIndex === loweredQuery.length) return 1;
  }
  return 0;
}

function withUniqueIds(baseRecipes, incomingRecipes) {
  const used = new Set(baseRecipes.map((recipe) => String(recipe?.id ?? '')));
  return incomingRecipes.map((recipe) => {
    let id = String(recipe?.id ?? '');
    if (!id || used.has(id)) {
      do {
        id = makeRecipeId();
      } while (used.has(id));
    }
    used.add(id);
    return { ...recipe, id };
  });
}

  }, new Map());
}

};

const topTagsForLibrary = (limit = 8) => {

}

chopped\n2 sprigs fresh thyme, leaves only\n2 tablespoons unsalted butter\n2 tablespoons extra-virgin olive oil\nKosher salt and freshly ground black pepper\nOne 3-pound center cut beef tenderloin (filet mignon), trimmed\nExtra-virgin olive oil\nKosher salt and freshly ground black pepper\n12 thin slices prosciutto\n6 sprigs of fresh thyme, leaves only\n2 tablespoons Dijon mustard\nFlour, for rolling out puff pastry\n1 pound puff pastry, thawed if using frozen\n2 large eggs, lightly beaten\n1/2 teaspoon coarse sea salt\nMinced chives, for garnish\nGreen Peppercorn Sauce, recipe follows\nRoasted Fingerling Potatoes with Fresh Herbs and Garlic, recipe follows\nWarm Wilted Winter Greens, recipe follows\n2 tablespoons olive oil\n2 shallots, sliced\n2 cloves garlic, peeled and smashed\n3 sprigs fresh thyme, leaves only\n1 cup brandy\n1 box beef stock\n2 cups cream\n2 tablespoons grainy mustard\n1/2 cup green peppercorns in brine, drained, brine reserved\n2 pints fingerling potatoes\n2 sprigs fresh rosemary\n2 to 3 sprigs fresh sage\n3 sprigs fresh thyme\n6 cloves garlic, left unpeeled\n3 tablespoons extra-virgin olive oil, plus for sheet pan\nSalt and pepper\n1/4 cup honey\n1/2 cup balsamic vinegar\n1/2 pint walnuts, for garnish\n3 bunches assorted winter greens (such as Swiss chard, radicchio, or escarole), washed, stemmed, and torn into pieces\n1 tablespoon grainy mustard\nExtra-virgin olive oil\n1/2 cup pomegranate seeds, for garnish\nParmesan shavings, for garnish\n1 shallot, chopped, for garnish", "instructions": "For the Duxelles:\nTo make the Duxelles: Add mushrooms, shallots, garlic, and thyme to a food processor and pulse until finely chopped. Add butter and olive oil to a large saute pan and set over medium heat. Add the shallot and mushroom mixture and saute for 8 to 10 minutes until most of the liquid has evaporated. Season with salt and pepper and set aside to cool.\nFor the Beef:\nTo prepare the beef: Tie the tenderloin in 4 places so it holds its cylindrical shape while cooking. Drizzle with olive oil, then season with salt and pepper and sear all over, including the ends, in a hot, heavy-based skillet lightly coated with olive oil - about 2 to 3 minutes. Meanwhile set out your prosciutto on a sheet of plastic wrap (plastic needs to be about a foot and a half in length so you can wrap and tie the roast up in it) on top of your cutting board. Shingle the prosciutto so it forms a rectangle that is big enough to encompass the entire filet of beef. Using a rubber spatula cover evenly with a thin layer of duxelles. Season the surface of the duxelles with salt and pepper and sprinkle with fresh thyme leaves. When the beef is seared, remove from heat, cut off twine and smear lightly all over with Dijon mustard. Allow to cool slightly, then roll up in the duxelles covered prosciutto using the plastic wrap to tie it up nice and tight. Tuck in the ends of the prosciutto as you roll to completely encompass the beef. Roll it up tightly in plastic wrap and twist the ends to seal it completely and hold it in a nice log shape. Set in the refrigerator for 30 minutes to ensure it maintains its shape.\nPreheat oven to 425 degrees F.\nOn a lightly floured surface, roll the puff pastry out to about a 1/4-inch thickness. Depending on the size of your sheets you may have to overlap 2 sheets and press them together. Remove beef from refrigerator and cut off plastic. Set the beef in the center of the pastry and fold over the longer sides, brushing with egg wash to seal. Trim ends if necessary then brush with egg wash and fold over to completely seal the beef - saving ends to use as a decoration on top if desired. Top with coarse sea salt. Place the beef seam side down on a baking sheet.\nBrush the top of the pastry with egg wash then make a couple of slits in the top of the pastry using the tip of a paring knife ¿ this creates vents that will allow the steam to escape when cooking. Bake for 40 to 45 minutes until pastry is golden brown and beef registers 125 degrees F on an instant-read thermometer. Remove from oven and rest before cutting into thick slices. Garnish with minced chives, and serve with Green Peppercorn Sauce, Roasted Fingerling Potatoes with Fresh Herbs and Garlic, and Warm Wilted Winter Greens.\nAdd olive oil to pan after removing beef. Add shallots, garlic, and thyme; saute for 1 to 2 minutes, then, off heat, add brandy and flambe using a long kitchen match. After flame dies down, return to the heat, add stock and reduce by about half. Strain out solids, then add 2 cups cream and mustard. Reduce by half again, then shut off heat and add green peppercorns.\nPreheat oven to 500 degrees F and place a baking sheet inside to heat.\nAdd potatoes, rosemary, sage, thyme, and garlic to a medium bowl. Drizzle with olive oil, and season with salt and pepper. Remove sheet pan from oven, lightly coat with olive oil, and pour potatoes onto pan. Place potatoes in oven and reduce heat to 425 degrees F. Roast for 20 minutes, or until crispy on outside and tender on inside.\nCook honey and balsamic together over medium-high heat in a large saute pan, about 5 minutes. Toast walnuts in a small skillet; set aside to cool.\nPile greens on a platter. Stir mustard into balsamic-honey dressing, then whisk in about 1 cup extra-virgin olive oil; pour over greens. Season greens with salt and pepper and garnish with walnuts, pomegranate seeds, shavings of Parmesan, and shallot.", "preptime": "", "cooktime": "", "servings": "6 to 8 servings", "tags": "Main, Roast Beef, Roast Recipes, Pastry Recipes, Shallot Recipes, Mushroom", "notes": "Beef wellington will steal the show at your next dinner party. Here, learn how to make beef wellington like a pro.", "url": "https://www.foodnetwork.com/recipes/tyler-florence/the-ultimate-beef-wellington-recipe2-1952280", "date": "", "rating": 0}, {"id": 11, "name": "Grilled Persian Chicken", "cuisine": "Mediterranean", "source": "delish.com", "location": "", "ingredients": "1 1/2 oz. plain whole-milk yogurt\n2 tsp. kosher salt, plus more\n1 1/2 tsp. ground turmeric\n1 tsp. finely grated lime zest or ground sumac\n1 tsp. ground cinnamon\n1 tsp. ground cumin\n1/4 tsp. freshly ground black pepper, plus more\n1/4 tsp. ground cloves\n1/4 tsp. ground coriander\n1/8 tsp. cayenne pepper\n4 bone-in, skin-on chicken thighs (about 1 1/2 lb.)\n4 whole chicken drumsticks (about 1 1/2 lb.)\n2 bone-in, skin-on chicken breasts (about 2 lb.), halved crosswise\n1 pint grape tomatoes\n1 lemon, quartered\nNeutral oil, for brushing and grill\nSteamed jasmine rice (optional) and fresh cilantro, parsley, and mint leaves, for serving\n2 to 3 metal or soaked wooden bamboo skewers", "instructions": "In a large bowl, mix yogurt, salt, turmeric, lime zest, cinnamon, cumin, black pepper, cloves, coriander, and cayenne. Add chicken and turn to coat. Transfer chicken and marinade to a resealable plastic bag. Seal bag and refrigerate at least 4 hours or up to 24.\nLet chicken sit at room temperature 30 minutes before grilling. Thread tomatoes and lemon wedges onto skewers. Brush with oil; season with salt and pepper.\nPrepare a grill for medium-high heat; preheat 5 minutes. Clean and oil grates. Brush excess marinade of chicken; discard marinade.\nGrill chicken skin side down until skin is golden brown, about 15 minutes. Turn and continue to grill until skin is charred, chicken is cooked through, and an instant-read thermometer inserted into thickest part of thighs registers 160°, about 10 minutes. Transfer to a plate and tent with foil. Let cool 10 minutes.\nGrill tomato and lemon skewers, turning occasionally, until charred in spots, 5 to 6 minutes. Using a fork, remove tomatoes and lemon wedges from skewers.\nServe chicken and tomatoes with rice (if using). Squeeze grilled lemon wedges over. Top with cilantro, parsley, and mint.", "preptime": "10 min", "cooktime": "", "servings": "4 - 6 serving(s)", "tags": "Main, Content-Type: Recipe, Locale: Us, Displaytype: Recipe, Shorttitle: Grilled Persian Chicken, Contentid: 8F955885-8774-43De-A728-A49238D7D959", "notes": "A perfect easy summer dinner on the grill, Persian-spiced grilled chicken with tomatoes and lemons is served with fresh herbs over fluffy jasmine rice.", "url": "https://www.delish.com/cooking/recipe-ideas/a60204284/grilled-persian-chicken-recipe/", "date": "", "rating": 0}, {"id": 12, "name": "Béarnaise Sauce", "cuisine": "French", "source": "epicurious.com", "location": "", "ingredients": "1 Tbsp. plus 1 cup (2 sticks) unsalted butter, cut into ½\" pieces\n3 medium shallots, finely chopped\nKosher salt, freshly ground black pepper\n2 Tbsp. Champagne vinegar or white wine vinegar\n2 large egg yolks*\n1 Tbsp. (or more) fresh lemon juice\n1 Tbsp. finely chopped tarragon", "instructions": "Melt 1 Tbsp. unsalted butter in a small saucepan over medium heat. Add 3 medium shallots, finely chopped, and stir to coat; season with kosher salt and freshly ground black pepper. Stir in 2 Tbsp. Champagne vinegar or white wine vinegar, reduce heat to medium-low, and cook, stirring occasionally, until vinegar is evaporated, about 3 minutes. Reduce heat to low and continue to cook, stirring often, until shallots are softened and translucent, about 5 minutes longer. Scrape shallot reduction into a small bowl and let cool.\nMeanwhile, fill a blender with hot water to warm it. Melt remaining 1 cup (2 sticks) unsalted butter, cut into ½\" pieces, in a clean small saucepan over medium heat. Once butter starts to foam, pour into a measuring glass.\nPour off water from blender; dry well. Add 2 large egg yolks*, 1 Tbsp. fresh lemon juice, and 1 Tbsp. water and blend until mixture is smooth. With motor running, very gradually stream in melted butter, leaving milk solids at bottom of measuring glass behind. Blend until a smooth, creamy sauce forms.\nPour sauce into a medium bowl. Stir in shallot reduction and 1 Tbsp. finely chopped tarragon. Taste and season with more salt, pepper, and/or lemon juice if needed. Do Ahead: Sauce be made 1 hour ahead. Cover and let sit at room temperature. *Raw egg is not recommended for infants, the elderly, people who are pregnant or have weakened immune systems...or folks who don’t like raw eggs. Editor’s note: This recipe was originally published in March 2012. Head this way for some French desserts to serve for the final course →", "preptime": "", "cooktime": "", "servings": "Makes about 1 cup", "tags": "Sauce, Epicurious, French, Shallot, Lemon, Tarragon", "notes": "This easy blender béarnaise sauce stems from the creamy classic, hollandaise. Vinegar, lemon juice, and tarragon give the rich sauce brightness.", "url": "https://www.epicurious.com/recipes/food/views/bearnaise-sauce-395049", "date": "", "rating": 0}, {"id": 13, "name": "Seriously Fudgy Homemade Brownies", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "3/4 cup (12 Tbsp; 170g) unsalted butter, sliced into 12 Tbsp-size pieces\n4-ounce (113g) semi-sweet chocolate bar, coarsely chopped and divided*\n1 and 2/3 cups (333g) granulated sugar\n3 large eggs, at room temperature\n2 teaspoons pure vanilla extract\n1 cup (84g) unsweetened natural or Dutch-process cocoa powder*\n1 cup (125g) all-purpose flour (spooned & leveled)\n3/4 teaspoon salt\n1 cup (180g) semi-sweet chocolate chips", "instructions": "Preheat the oven to 350°F (177°C) and line a 9-inch square metal baking pan with parchment paper, leaving an overhang on two opposite sides to lift out the finished brownies (makes cutting easier!). Set aside.\nIn a small microwave-safe bowl or liquid measuring cup, combine the butter and half (2oz/56g) of the chopped chocolate. Melt in 30-second increments, stirring after each, until completely melted and smooth. Set aside to slightly cool while you continue.\nIn a large bowl with a handheld or stand mixer fitted with a whisk attachment, combine the sugar and eggs. Beat on medium-high speed until the sugar is dissolved and the mixture is pale and ribbon-y, about 3 minutes.\nPour the warm melted butter/chocolate into the bowl with the sugar/eggs, add the vanilla, and beat or whisk to combine.\nWith a fine-mesh sieve, sift the cocoa powder, flour, and salt into the batter, then whisk or beat on low speed to incorporate. Fold in the remaining 2 ounces/57g chopped chocolate and the chocolate chips. The batter will be very thick. Spread it evenly into the prepared pan. (A small offset spatula can help here.)\nBake for 28–30 minutes, then test the brownies with a toothpick. Insert the toothpick into the center of the pan. If it comes out coated with wet batter, the brownies are not done. If there are only a few moist crumbs, the brownies are done. Keep checking every 2 minutes until you have moist crumbs. Brownies typically take 30–32 minutes in my oven. Err on the side of under-baking, as the brownies will continue to set as they cool.\nRemove from the oven and place on a cooling rack to cool completely in the pan. When cool, lift the brownies out by gripping the parchment overhangs and transfer to a cutting board. Use a sharp knife to cut into squares.\nCover and store leftover brownies at room temperature for up to 1 week.", "preptime": "10 min", "cooktime": "30 min", "servings": "16", "tags": "Dessert, Homemade Brownies", "notes": "This recipe has been *slightly updated* since my team and I originally published it in 2016. These seriously fudgy homemade brownies are thick, dense, and intensely chocolatey thanks to cocoa powder, melted baking chocolate, and chocolate chips. With shiny crackly tops and melt-in-your-mouth centers, this is our go-to brownie recipe.", "url": "https://sallysbakingaddiction.com/seriously-fudgy-homemade-brownies/#tasty-recipes-66528", "date": "", "rating": 0}, {"id": 14, "name": "Black Beans and Rice", "cuisine": "Other", "source": "foodnetwork.com", "location": "", "ingredients": "1/4 cup olive oil\n2 onions, finely chopped\n2 green bell peppers, chopped\n3 garlic cloves, chopped\n4 bay leaves\n1 tablespoon ground cumin\n2 cups long-grain white rice\n4 (14-ounce) cans black beans, drained and rinsed\n2 (14-ounce) cans diced tomatoes with green chiles drained\n2 cups water\n1/4 cup apple cider vinegar\nKosher salt and freshly ground black pepper", "instructions": "Heat a large pot over medium-high heat and add the oil. Stir in the onions, peppers, garlic, bay leaves and cumin. Stir and cook for 8 minutes.\nStir in the rice, black beans, tomatoes, water, vinegar and salt and pepper. Bring to a boil, cover and reduce heat to low. Cook for about 40 minutes or until the rice is tender. Serve hot.", "preptime": "", "cooktime": "", "servings": "16 servings", "tags": "Side, Vegan, Rice Recipes, Side Dish, High Fiber, Grain Recipes", "notes": "", "url": "https://www.foodnetwork.com/recipes/ingrid-hoffmann/black-beans-and-rice-recipe-1938568", "date": "", "rating": 0}, {"id": 15, "name": "Homemade Biscuits (Popular Recipe!)", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "2 and 1/2 cups (313g) all-purpose flour (spooned & leveled), plus more as needed for hands and work surface\n1 Tablespoon baking powder (see Note)\n1/2 teaspoon baking soda (see Note)\n1 teaspoon salt\n1/2 cup (8 Tbsp; 113g) unsalted butter, cubed and very cold\n1 cup + 2 Tablespoons (270ml/g) cold buttermilk, divided\n2 teaspoons (14g) honey\n2 Tablespoons (28g) butter, melted\n1 Tablespoon (21g) honey", "instructions": "Preheat oven to 425°F (218°C).\nPlace the flour, baking powder, baking soda, and salt in a large bowl or in a large food processor. Whisk or pulse until combined. Add the cubed butter and cut into the dry ingredients with a pastry cutter or by pulsing several times in the processor. Cut/pulse until coarse crumbs form.\nIf you used a food processor, pour the mixture into a large bowl. Make a well in the center. Pour 1 cup (240ml/g) buttermilk into the well and drizzle honey on top. Using a large spoon or spatula, fold until it begins to come together. Do not overwork the dough. The dough will be shaggy and crumbly with some wet spots.\nPour the dough and any dough crumbles onto a floured work surface and gently bring together with generously floured hands. The dough will become sticky as you bring it together. Have extra flour nearby and use it often to flour your hands and work surface as needed in this step. Using floured hands, flatten into a 3/4-inch-thick rectangle as best you can. Fold one side into the center, then the other side on top. Turn the dough 90 degrees, so it’s now horizontal. Gently flatten into a 3/4-inch-thick rectangle again. Repeat the folding again. Turn the dough horizontally one more time. Gently flatten into a 3/4-inch-thick rectangle. Repeat the folding one last time. Flatten into the final 3/4-inch-thick rectangle.\nCut into 2.5- or 3-inch circles with a biscuit cutter. (Tip: Do not twist the biscuit cutter when pressing down into the dough because this seals off the edges of the biscuit which prevents them from fully rising.) Re-roll scraps until all the dough is used. You should have about 8–11 biscuits. Arrange in a 10-inch cast iron skillet (see Note) or close together on a parchment paper-lined baking sheet. Make sure the biscuits are touching.\nBrush the tops with remaining buttermilk. Bake for 18–20 minutes or until tops are golden brown.\nRemove from the oven. If adding the optional topping, whisk the melted butter and honey together. Using a pastry brush, brush the warm biscuits with honey butter topping. Serve warm.\nCover leftovers tightly and store at room temperature or in the refrigerator for up to 5 days.", "preptime": "15 min", "cooktime": "20 min", "servings": "8", "tags": "Baking, Homemade Biscuits", "notes": "These homemade biscuits are soft and buttery with hundreds of flaky layers! This biscuit recipe only requires 7 simple ingredients and they're ready in about 35 minutes.", "url": "https://sallysbakingaddiction.com/flaky-buttermilk-biscuits/#tasty-recipes-66534", "date": "", "rating": 0}, {"id": 16, "name": "Caramelized Onions and Eggplant Montaditos (Spanish Open Faced Sandwiches)", "cuisine": "Spanish", "source": "mediterraneanliving.com", "location": "", "ingredients": "1 large eggplant, sliced thin\n3 sweet onions, cut in half and sliced thin\n1/2 cup extra virgin olive oil\n4 tsp balsamic vinegar\n1/2 pound fresh mozzarella, sliced\n1 tsp dried oregano\n4 slices hearty on the outside, soft on the inside whole grain bread", "instructions": "Lay eggplant slices out and lightly salt both sides.\nAdd 3 teaspoons of olive oil to a skillet. Heat onions on medium heat. Sauté onions until they begin to brown (approx ½ hour). Stir more as caramelizing begins. Be careful not to burn. Add a little salt. Turn off heat and stir in balsamic vinegar.\nWhile onions are caramelizing, fry eggplant slices in olive oil in another skillet on medium heat. Fry until slices start to brown. You may need to add more oil as the eggplant tends to suck up a lot of oil. Drain cooked slices on a paper towel. Continue until all slices are cooked.\nTurn oven on to broil setting.\nPlace bread on top rack of oven and toast for a few minutes (be careful not to burn bread).\nRemove bread from oven. Top each piece of bread with a quarter of the onion mixture. Lightly salt. Cover the onions with 2 slices of eggplant and then top with a slice of mozzarella and then oregano.\nBroil until cheese is melted and is just beginning to brown.\nServe immediately.", "preptime": "10 min", "cooktime": "20 min", "servings": "4", "tags": "", "notes": "", "url": "https://www.mediterraneanliving.com/recipe-items/caramelized-onions-and-eggplant-crostini/", "date": "", "rating": 0}, {"id": 17, "name": "Challah French Toast with Orange Honey Glaze", "cuisine": "American", "source": "themediterraneandish.com", "location": "", "ingredients": "1/2 cup honey\n1/4 cup orange juice\n2 oranges, (zested and supremed)\n1 loaf challah bread, (about 8 to 10 thick slices)\n6 eggs\n1 cup whole milk\n1 3/4 teaspoon ground cinnamon\n1 teaspoon almond extract\n1/4 teaspoon kosher salt\n4 teaspoons granulated sugar\n1 cup blueberries\n4 tablespoons creme fraiche, (optional)", "instructions": "Supreme the oranges: Zest each orange and set zest aside. Slice the top and bottom off of an orange so you have a flat surface to work with and the flesh of the orange is exposed. Starting at the top, move your knife downward slicing between the flesh of the orange and the white pith. Do this around the entire orange until there isn’t any peel or pith attached.\nHold the orange over a small bowl to catch any juices, slowly cut each segment out from the membrane and place on a small plate. Repeat with the second orange. Once each orange has been segmented, squeeze the membranes to release any juices into the bowl.\nMake the syrup: In a small saucepan set over medium low heat add ½ cup honey, and 1/4 cup of orange juice from when you supremed the oranges. Heat, stirring occasionally just until the mixture is combined and pourable. Transfer to a small container.\nSlice the bread: Slice the loaf into 1 or 1 ½ inch thick slices. You should end up with 8 to 10 slices depending upon the size of your loaf.\nMake the custard: In a pie plate or wide shallow dish use a fork or whisk to combine the eggs, milk, ground cinnamon, almond extract, salt, sugar, and orange zest until well combined.\nSoak the bread: Place as many slices as will fit in a single layer in the dish with the custard. Flip them over so both sides are coated.\nHeat the skillet: Place 2 tablespoons of butter or ghee in a skillet set over medium heat. Once it sizzles add the soaked bread in a single layer. Cook on one side until golden brown, then flip and cook on the other side until golden brown.\nServe: Place two slices of french toast on a plate. Top with 1 tablespoon of creme fraiche, berries and orange slices. Drizzle with the orange honey syrup and serve. (If you have another orange laying around and you’re feeling fancy, go ahead and zest a little over the top of the toast before serving.)", "preptime": "20 min", "cooktime": "10 min", "servings": "5", "tags": "Breakfast, Challah, French Toast", "notes": "Thick, pillowy slices of challah bread, soaked in a slightly sweet milk-based custard and cooked in a skillet until golden brown. Add a dollop of creme fraiche and a drizzle of orange honey syrup on top for a bit of extra decadence.", "url": "https://www.themediterraneandish.com/challah-french-toast/#wprm-recipe-container-58081", "date": "", "rating": 0}, {"id": 18, "name": "How To Make Chicago-Style Deep Dish Pizza", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "3 and 1/4 cups (406g) all-purpose flour (spooned & leveled)\n1/2 cup (60g) yellow cornmeal\n1 and 1/4 teaspoons salt\n1 Tablespoon (12g) granulated sugar\n2 and 1/4 teaspoons (7g) Platinum Yeast from Red Star instant yeast (1 standard packet)*\n1 and 1/4 cups (300ml) slightly warm water\n1/2 cup (8 Tbsp; 113g) unsalted butter, divided (1/4 cup melted, 1/4 cup softened to room temperature)\nolive oil for coating\n2 Tablespoons (28g) unsalted butter\n1 small onion, grated (about 1/3 cup)*\n3/4 teaspoon salt\n1 teaspoon dried oregano\n1/2 teaspoon crushed red pepper flakes (optional, but recommended)\n3 garlic cloves, minced\none 28-ounce can (794g) crushed tomatoes*\n1/4 teaspoon granulated sugar\n4 cups (about 16 oz) shredded mozzarella cheese*\n1/2 cup (45g) grated parmesan cheese\noptional: 1/2 cup sliced pepperoni\noptional: 4 slices bacon, cooked and crumbled", "instructions": "Please use my step-by-step photos below this written out recipe as a guide to making the pizza. For best results and ease of mind, read through the recipe completely before beginning. You will need two deep dish 9×2-inch round cake pans if you are making both pizzas at the same time. You can also use 9-inch springform pans.\nCombine the flour, cornmeal, salt, sugar, and yeast in the bowl of your stand mixer fitted with a dough hook attachment. If you do not have a stand mixer, use your hand mixer and a very very large bowl. If you do not have any mixer, you will do this all by hand. Again, use a very large bowl. Give those ingredients a quick toss with your mixer on low or with a large wooden spoon. Add the warm water and 1/4 cup of melted butter. The warm water should be around 90°F (32°C). Make sure it is not very, very hot or it will kill the yeast. Likewise, make sure the butter isn’t boiling hot. If you melt it in the microwave, let it sit for 5 minutes before adding. On low speed, beat (or stir) the dough ingredients until everything begins to be moistened. Continuing on low speed (or remove from the bowl and knead by hand if you do not own a mixer), beat the dough until it is soft and supple and gently pulls away from the sides of the bowl and falls off of the dough hook- about 4-5 minutes. If the dough is too hard (it will be textured from the cornmeal), but if it feels too tough, beat in 1 teaspoon of warm water. Alternatively, if it feels too soft, beat in 1 Tablespoon of flour.\nRemove the dough from the bowl and form into a ball. Lightly grease a large mixing bowl with olive oil and place the dough inside, turning it around so that all sides of the dough are coated in the oil. Cover the bowl tightly with aluminum foil and allow to rise in a warm environment for 1-2 hours or until double in size.\nOnce the dough is ready, lightly flour a large work surface. Remove dough from the bowl, set the bowl and aluminum foil aside (to use later). Gently punch down the dough to remove any air bubbles and roll the dough into a large 15×12-inch rectangle. Spread 1/4 cup of softened butter on top of the dough. Roll it up lengthwise per the photos below. Cut the dough log in half. Form the two pieces of dough into balls and place back into your greased bowl. Cover with aluminum foil and allow to rise in the refrigerator (not in a warm place) for 1 hour until they are puffy as you make the sauce.\nPlace butter in a medium saucepan over medium heat and allow it to melt. Once melted, add the grated onion, salt, oregano, and red pepper flakes. Once the onion has slightly browned after about 5 minutes, add the garlic, tomatoes, and sugar. Turn the heat down to low-medium and allow it to simmer until it’s hearty, fragrant, and thick- about 30 minutes. You’ll have about 2 and 1/2 cups of sauce at this point. If you have more than that, keep simmering until the amount has reduced. Remove from heat and set aside until ready to be used. You may store the sauce in a tightly covered container in the refrigerator for up to 2 days if planning to make the pizza another day. You may freeze this sauce for up to 2 months as well.\nPreheat oven to 425°F (218°C).\nAfter the dough balls have risen in the refrigerator, they should be puffy. Keep one ball of dough in the refrigerator as you work with the first one. Roll it out on a lightly floured work surface, working it into a 12-inch circle. Using your rolling pin as a guide (see photos below), place over a 9×2-inch deep dish cake pan. Using your fingers, press the dough into the cake pan. Make sure it is nice and tight fitting inside the pan. Trim any excess dough off the edges with a small knife. Repeat with 2nd dough. Brush the top edges of the dough with a little olive oil, which gives the crust a beautiful sheen. Fill each pizza with 1/2 of the cheese (about 2 cups/8 oz per pizza), then the pepperoni and bacon or your desired toppings. Pour about 1 and 1/4 cups (300ml) of sauce evenly on top of each. If you do not like that much sauce, you can reduce to 3/4 cup (180ml) per pizza and have leftover sauce. Sprinkle each with 1/4 cup (22g) of grated parmesan cheese.\nPlace the cake pans on top of a large baking sheet, which will catch anything potentially spilling over the sides of the pans. (Nothing usually does.) Bake for 20-28 minutes or until the crust is golden brown. Feel free to loosely cover the pizzas with aluminum foil after the 15 minute mark to prevent any heavy browning and uneven baking. Remove the pizzas from the oven and allow to cool in the pans placed on a wire rack for 10 minutes. After 10 minutes, slice, serve, and enjoy. Place any leftover pizza in an airtight container and refrigerate for up to 5 days. Reheat leftovers in a 300°F (149°C) oven for 15-20 minutes or until hot.", "preptime": "4 h", "cooktime": "30 min", "servings": "2", "tags": "Main, Deep Dish Pizza, Chicago Style Deep Dish Pizza", "notes": "Here's how to make authentic-tasting Chicago deep dish pizza. Complete with the buttery crust, slightly sweet tomato sauce, and a thick layer of cheese. This recipe makes two deep dish 9-inch pizzas. Make them both if you have a family of 4-5 or are having friends over. If your family is smaller, freeze half of the dough per the make-ahead/freezing instructions in the recipe notes.", "url": "https://sallysbakingaddiction.com/how-to-make-chicago-style-deep-dish-pizza/", "date": "", "rating": 0}, {"id": 19, "name": "Chicken Chilindrón", "cuisine": "Spanish", "source": "spanishsabores.com", "location": "", "ingredients": "6-8 chicken thighs or drumsticks (seasoned with salt and pepper)\n4 cloves garlic (peeled and thinly sliced)\n1.75 ounce Serrano ham or other cured ham (diced)\n1 onion (diced)\n1 red bell pepper (thinly sliced)\n2 juicy medium tomatoes\n1 bay leaf\n1 teaspoon sweet Spanish paprika\n1/2 cup white wine\n4 tablespoons olive oil\nsalt (to taste)\nblack pepper (to taste)", "instructions": "Place heavy pan over medium heat and cover the bottom with olive oil. Once it's hot, add the seasoned chicken and brown on both sides, then reserve the chicken on the side. Work in batches to avoid overcrowding the pan.\nLower the heat to medium-low and add the garlic and ham to the pan. Sauté for 1 minute, making sure the garlic doesn't stick or burn.\nAdd the red pepper, onion, and a pinch of salt, then sauté for about 10 minutes, or until the vegetables are tender and starting to caramelize.\nMix in the bay leaf, tomato, and sweet paprika, then cook for about 5 minutes.\nAdd the white wine, turn up the heat, and reduce to a thick sauce; about 2-3 minutes.\nAdd the chicken back to the pan and reduce the heat to low. Slowly simmer for about 30 minutes, or until the chicken is tender and fully cooked.\nTaste and add salt and pepper as desired. Serve the chicken chilindrón family-style or individually plated and enjoy!", "preptime": "15 min", "cooktime": "45 min", "servings": "4", "tags": "Main, Chicken Chilindrón, Chicken Stew Recipe", "notes": "This chicken chilindron recipe is an easy Spanish chicken stew from the north of Spain, and is ready to eat in 1 hour! It combines chicken with red pepper, garlic, and ham in a delicious stew that you'll want to make again and again.", "url": "https://spanishsabores.com/chicken-chilindron-recipe/#recipe", "date": "", "rating": 0}, {"id": 20, "name": "Authentic traditional chicken dishes from Spain", "cuisine": "Spanish", "source": "foreverbarcelona.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Sorry! Chorizo doesn't go in chicken paella. Olives baked with chicken are a NYC invention. These are the true traditional Spanish chicken recipes >>", "url": "https://www.foreverbarcelona.com/authentic-spanish-chicken-recipes-from-spain/", "date": "", "rating": 0}, {"id": 21, "name": "Chicken Empanada", "cuisine": "American", "source": "sundaysuppermovement.com", "location": "", "ingredients": "2 3/4 cups all-purpose flour\n1/2 teaspoon salt\nPinch granulated sugar\n3/4 cup unsalted butter (melted)\n1/2 cup cold water\n2 tablespoons vegetable oil\n2 medium onions (diced or thinly sliced)\n3 garlic cloves (minced)\n1 pound boneless, skinless chicken breasts (cooked and shredded)\n1 teaspoon paprika\n1 teaspoon ground cumin\n1 teaspoon salt\n1/2 teaspoon freshly ground black pepper\n1/4 teaspoon ground red chili\n1 cup hot water\n1 egg (beaten)", "instructions": "— To make the empanada dough: —\nIn the bowl of a food processor fitted with a dough blade, combine the flour, salt, and sugar. Slowly add in the melted butter, followed by enough water to create a soft and smooth dough.Form the dough into a disc, wrap in plastic and refrigerate for 1 hour.\n— To make the empanada filling: —\nDrizzle the oil in a large pan over medium-low heat. Add the onion and cook, stirring occasionally, until golden and caramelized, 15-20 minutes. Add the garlic and cook until just fragrant, 30 seconds to 1 minute.Stir in the shredded chicken and season with the paprika, cumin, salt, black pepper, and ground chili. Add the water, bring to a simmer, and cook, uncovered, until most of the water has evaporated, 20-30 minutes. Remove from heat and allow to cool to room temperature. At this point, the filling can be refrigerated until the next day if desired.\n— To assemble and bake the chicken empanadas: —\nPreheat oven to 350˚F. Line two baking sheets with parchment or lightly grease.On a lightly floured surface, roll the dough into a thin sheet. Use 4 3/4 inch circular cutter to cut out circles of dough.\nPlace about 2 tablespoons of the cooled chicken mixture in the center of each circle. Brush the edges lightly with a little beaten egg, fold the dough over the filling, and press the edges together to seal. Seal completely using the tines of a fork or create a rope appearance by pulling the edge out slightly and folding over, starting from one end and finishing at the opposite side. Repeat with remaining empanadas.\nPlace the empanadas two inches apart on the prepared baking sheets. Brush the tops with beaten egg and bake until golden, 20-25 minutes.", "preptime": "30 min", "cooktime": "60 min", "servings": "16", "tags": "Snack, Chicken Empanada Recipe, Chicken Empanadanas Recipe, Chicken Empanadas, Empanada Recipe", "notes": "My Chicken Empanada Recipe combines shredded chicken and caramelized onions simmered in flavorful spices with a buttery shortcrust for the most amazing empanadas!", "url": "https://sundaysuppermovement.com/chicken-empanada-recipe/#recipe", "date": "", "rating": 0}, {"id": 22, "name": "Chicken Enchilada", "cuisine": "Mexican", "source": "skinnytaste.com", "location": "", "ingredients": "2 garlic cloves (minced)\n1-2 tablespoons chipotle chilis in adobo sauce (depending how spicy you like it)\n1-1/2 cups tomato sauce\n1/2 teaspoon chipotle chili powder\n1/2 teaspoon ground cumin\n3/4 cup reduced sodium chicken broth\nkosher salt and fresh pepper to taste\n1 teaspoon extra virgin olive oil\n10 ounces cooked shredded chicken breast (from 2 breasts of a rotisserie chicken or shredded chicken in the slow cooker*)\n1 cup diced onion\n2 large cloves garlic (minced)\n1/4 cup cilantro\nkosher salt\n1 teaspoon cumin\n1/2 teaspoon dried oregano\n1 teaspoon chipotle chili powder\n1/3 cup chicken broth\n1/2 cup tomato sauce\n8 7-inch whole wheat flour tortillas ((I use low-carb la tortilla factory))\n1 cup part-skim shredded Mexican cheese blend (or cheddar)\nolive oil spray\n2 tbsp chopped scallions (or cilantro, for topping)\noptional toppings: sour cream, avocado, Greek yogurt, jalapenos, etc", "instructions": "Preheat oven to 400F degrees.\nSpray a medium pot with oil and and add garlic, sauté 30 seconds. Add chipotle chiles, chili powder, cumin, chicken broth, tomato sauce, salt and pepper. Bring to a boil. Reduce the heat to low and simmer for 5-10 minutes, to let the flavors meld. Set aside until ready to use.\nHeat the oil in a medium skillet over medium-high heat. Sauté onions and garlic on low until soft, about 2 minutes. Add chicken, salt, cilantro, cumin, oregano, chili powder, tomato sauce, chicken broth, and cook 4 to 5 minutes. Remove from heat.\nSpray a 13 by 9-inch glass or ceramic baking dish with oil. Put 1/3 cup chicken mixture into each tortilla and roll it.\nPlace on baking dish seam side down, top with sauce. Then top with cheese.\nCover with foil and bake in the oven on the middle rack for 20-25 minutes, until it's heated through and the cheese is melted. Garnish with scallions or cilantro. Optional: top with your favorite toppings if desired. (Extra points) Makes 8 enchiladas.", "preptime": "10 min", "cooktime": "35 min", "servings": "8", "tags": "Main, Best Chicken Enchilada Recipe, Chicken Enchilada Recipe, Chicken Enchiladas, Easy Chicken Enchiladas, Enchiladas", "notes": "Craving restaurant-style enchiladas at home? This 5-star chicken enchilada recipe is easy, flavorful, and made with pantry staples.", "url": "https://www.skinnytaste.com/chicken-enchiladas/", "date": "", "rating": 0}, {"id": 23, "name": "Apple Crisp II", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/12409/apple-crisp-ii/", "date": "", "rating": 0}, {"id": 24, "name": "Daniel Boulud’s Chicken Tagine", "cuisine": "French", "source": "cooking.nytimes.com", "location": "", "ingredients": "3 1/2 tablespoons sweet paprika\n1 teaspoon garlic powder\n2 teaspoons cinnamon\n3 tablespoons ground coriander\n1 tablespoon plus 1 teaspoon ground turmeric\n1 tablespoon ginger powder\n1/2 tablespoon ground cardamom\n2 1/2 teaspoons ground allspice\n8 chicken thighs, approximately 3 pounds\nKosher salt and freshly ground black pepper to taste\n2 tablespoons spice mix\n1/3 cup extra-virgin olive oil\n3 Roma tomatoes\n1 head cauliflower, cut into bite-size florets\n1 large white onion, diced\n3 cloves garlic, diced\n1 tablespoon grated fresh ginger\n1 pinch saffron\n1 tablespoon tomato paste\n2 cups chicken stock, homemade or low-sodium\n3 tablespoons preserved lemons, approximately 2 lemons, roughly chopped\n1 cup green olives, like Castelvetranos\n1/2 bunch cilantro, leaves picked and stems discarded.", "instructions": "Combine the spices in a dry sauté pan set over low heat, and toast them gently until they release their fragrance, 2 minutes or so. Transfer to a bowl, and allow to cool.\nPreheat oven to 350. Season the chicken thighs with the salt, pepper and 2 tablespoons of the spice mix, along with 2 tablespoons of the olive oil.\nBring a large pot of salted water to a boil over high heat, and set a large bowl of ice water to the side. Core the tomatoes, and score an X on their bottoms. Boil the cauliflower florets in the water for 3 minutes, then submerge them in the ice water. Boil the tomatoes for 20 seconds, and chill them in the ice water as well. Remove the cauliflower when it is cold, and pat the florets dry. Peel the skin off the tomatoes, then cut them into quarters lengthwise. Trim away the seeds to make petals.\nHeat the remaining olive oil in a large sauté pan set over medium heat, and sear the chicken in batches, starting skin-side down, until the thighs are browned. Remove the chicken to a large Dutch oven or tagine pot. Remove all but two tablespoons of the fat in pan, then return it to the heat, and brown the cauliflower and add to the chicken.\nReduce heat below the pan, and add the onion, garlic, ginger and saffron. Cook, stirring, until the onions are translucent, approximately 5 minutes. Add tomato paste and chicken stock, and simmer until reduced by 1/3.\nPour sauce over the chicken and cauliflower, cover the pot and transfer to oven for 20 minutes. Remove, stir in the tomatoes, preserved lemon and olives, then cover the pot again and cook for an additional 20 minutes or until the chicken is cooked through. Serve the chicken in the pot, garnished with the cilantro leaves, with couscous. Reserve remaining spice mix for the next batch or another use. It keeps well in a sealed container.", "preptime": "", "cooktime": "", "servings": "4 servings", "tags": "Main", "notes": "This recipe for an elegant North African stew comes out of the kitchen of Boulud Sud, Daniel Boulud’s sophisticated Mediterranean French restaurant in New York. It is a dish steeped in the flavors of North Africa, but also of France. Chicken serves as the protein, bathed in a blend of North African spices — cinnamon and coriander, turmeric, ginger powder and cardamom — combined with tomatoes, saffron and a little stock. Preserved lemons and olives added at the end provide bite. Tagines are often cooked with root vegetables and dried fruits. Boulud, who famously grew up on a farm, in Lyon, uses cauliflower. ‘‘It is maybe a little more French approach to the tagine,’’ he said. Blanching the cauliflower and tomatoes before cooking them may cause some cooks to blanch themselves. But the effort is worth it.", "url": "https://cooking.nytimes.com/recipes/1016987-daniel-bouluds-chicken-tagine", "date": "", "rating": 0}, {"id": 25, "name": "Chicken Tagine With Olives and Preserved Lemons", "cuisine": "Mediterranean", "source": "cooking.nytimes.com", "location": "", "ingredients": "5 cloves garlic, finely chopped\n1/4 teaspoon saffron threads, pulverized\n1/2 teaspoon ground ginger\n1 teaspoon sweet paprika\n1/2 teaspoon ground cumin\n1/2 teaspoon turmeric\nSalt and freshly ground black pepper\n1 chicken, cut in 8 to 10 pieces\n2 tablespoons extra virgin olive oil\n3 medium onions, sliced thin\n1 cinnamon stick\n8 calamata olives, pitted and halved\n8 cracked green olives, pitted and halved\n1 large or 3 small preserved lemons (sold in specialty food shops)\n1 cup chicken stock\nJuice of 1/2 lemon\n1 tablespoon chopped flat-leaf parsley", "instructions": "Mix garlic, saffron, ginger, paprika, cumin and turmeric together. If not using kosher chicken, add 1/2 teaspoon salt. Add pepper to taste. Rub chicken with mixture, cover, refrigerate and marinate 3 to 4 hours.\nHeat oil in heavy skillet. Add chicken, and brown on all sides. Remove to platter. Add onions to skillet, and cook over medium-low heat about 15 minutes, until lightly browned. Transfer to tagine, if you are using one, or leave in skillet. Add cinnamon stick.\nPut chicken on onions. Scatter with olives. Quarter the lemons, remove pulp and cut skin in strips. Scatter over chicken. Mix stock and lemon juice. Pour over chicken.\nCover tagine or skillet. Place over low heat, and cook about 30 minutes, until chicken is done. Scatter parsley on top, and serve.", "preptime": "", "cooktime": "", "servings": "4 servings", "tags": "Main, Cinnamon Stick, Great Leftovers, Green Olive, Kalamata Olive, Plan-Ahead", "notes": "This rich and fragrant chicken stew is laden with complex flavors and spices reminiscent of the sort you might encounter in a mountainside cafe in Morocco. Save yourself the cost of a plane ticket, however, and make this at home. First, rub the chicken with a redolent combination of garlic, saffron, ground ginger, paprika, cumin, turmeric and black pepper, then pop it into the refrigerator for 3 to 4 hours to marinate. Once that's done, brown the chicken parts, and remove from the pan, making room for a pile of sliced onions that you'll sauté until golden brown. Nestle a cinnamon stick into the tangle of onions, pile the chicken parts on top and scatter with slices of preserved lemons and olives, a combination of green and kalamata. Add a bit of chicken stock and lemon juice, then cook over low heat until the chicken is cooked through, and your house smells amazing.", "url": "https://cooking.nytimes.com/recipes/6555-chicken-tagine-with-olives-and-preserved-lemons", "date": "", "rating": 0}, {"id": 26, "name": "Seared Cast Iron Chicken with Baked Lemon Pasta", "cuisine": "American", "source": "howsweeteats.com", "location": "", "ingredients": "3 tablespoons unsalted butter\n16 ounces tiny-cut pasta, like orzo, ditalini, farfallini, etc\n2 garlic cloves, (minced)\nkosher salt and pepper\n32 ounces chicken or vegetable stock\n½ cup finely grated parmesan cheese\n1 to 2 tablespoons freshly grated lemon zest, (depending on how lemony you like it)\n3 tablespoons chopped fresh parsley or herbs\n1 pound boneless, skinless chicken breasts\nkosher salt and pepper\n1 teaspoon garlic powder\n1 teaspoon dried oregano\n3 tablespoons unsalted butter", "instructions": "— baked lemon pasta —\nPreheat the oven to 375 degrees F.\nMelt the butter in an oven-safe saute pan, skillet, braiser or dutch oven over medium heat. Stir in the pasta and cook for a few minutes, stirring often, so the pasta toasts. Stir in the garlic and a pinch of salt and pepper.\nPour in 3 ½ cups of the stock, stirring to combine. Place the skillet in the oven, uncovered, and cook for 12 to 15 minutes, until the liquid is mostly absorbed and the pasta is tender.\nRemove the pan from the oven and stir in the remaining stock, the parmesan and the lemon zest. Place it back in the oven for 5 minutes. Don’t worry if it seems too liquidy - the pasta soaks up all the stock quickly! Stir in the chopped parsley.\n— seared cast iron chicken breast —\nWhile the pasta is in the oven, heat the cast iron skillet over medium heat. Pat the chicken breast dry with a paper towel and season it all over with the salt, pepper, garlic powder and oregano.\nAdd the butter to the skillet. Once melted and sizzling, add in the chicken. Cook it on one side until deeply golden brown, about 5 minutes. Flip it and cook for an additional 5 minutes, not moving it so it gets that golden brown\nPlace the skillet in the oven for 5 to 10 minutes, or until the internal temperature of the chicken reaches 165 degrees F. Let the chicken rest for 5 minutes, then slice and serve with the pasta!", "preptime": "25 min", "cooktime": "25 min", "servings": "4", "tags": "Main, Chicken With Baked Lemon Pasta", "notes": "We are obsessed with this chicken with baked lemon pasta! It's the perfect flavorful, comforting dinner that everyone loves. Add a roasted vegetable on the side and it's the ideal weeknight meal.", "url": "https://www.howsweeteats.com/2023/02/chicken-with-baked-lemon-pasta/", "date": "", "rating": 0}, {"id": 27, "name": "Homemade Chili Sauce", "cuisine": "Other", "source": "fountainavenuekitchen.com", "location": "", "ingredients": "1 8-ounce can tomato sauce\n2 tablespoons tomato paste\n2 tablespoons vinegar (I used white vinegar; cider vinegar would be good, too)\n2 tablespoons brown sugar\n1/2 teaspoon chili powder (I used ancho chili powder; regular would be fine)\n1/8 teaspoon cinnamon\nTabasco to taste (I used 5-6 dashes)\nDash each of cloves and allspice (my \"dash\" equals about half of my 1/8 measuring spoon)", "instructions": "Mix all ingredients together in a medium bowl until full blended.\nTransfer to a jar and store in the refrigerator. Flavors will develop as the chili sauce sits so make a few hours or a day in advance, if possible.", "preptime": "5 min", "cooktime": "", "servings": "", "tags": "Sauce, Uncategorized, Make-Ahead, No-Cook, Under 30 Minutes, Weeknight Favorites", "notes": "Chili sauce has an inherent sweetness to it. If you would prefer yours a little less sweet, start by adding one tablespoon of brown sugar and then taste after the remaining ingredients have been mixed in, adding the additional brown sugar as desired.", "url": "https://fountainavenuekitchen.com/homemade-chili-sauce/", "date": "", "rating": 0}, {"id": 28, "name": "Cilantro Lime Chicken", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "8 bone in, (skin on chicken thighs)\nExtra virgin olive oil\n1 cup dry white wine\n2 cups chicken broth\n1 bunch cilantro, (leaves and tender stems chopped)\n2 limes (juiced)\n6 garlic cloves, (roughly chopped)\n1 teaspoon sweet Spanish paprika ((or hot paprika, if you like))\n1 tablespoon garlic powder\n1/2 teaspoon ground nutmeg\n1 teaspoon kosher salt\n1 teaspoon black pepper", "instructions": "Get ready. Preheat your oven to 375°F.\nSeason the chicken. Mix the spices in a small bowl. Pat the chicken thighs dry, then season all over with the spice mix. Be sure to season underneath the skin as well. Let the chicken thighs sit at room temperature for about 15 minutes while your oven heats.\nSear the chicken. Add 1-2 tablespoons of olive oil to a cast iron skillet over medium-high heat. When the oil is hot, add the chicken thighs with the skin side down and wait until the skin releases from the pan and turns golden, 5-7 minutes. Flip and wait until the second side is golden, about 4 minutes. Remove the chicken from skillet and set aside briefly.\nMake the cilantro lime sauce. Lower the heat to medium low and add the white wine to deglaze the skillet. Let cook for a few minutes to reduce, then add the broth. Bring the liquid to a simmer. Stir in the cilantro (save a little for garnish), lime juice, and garlic.\nSimmer the chicken in the cilantro lime sauce. Return the chicken to the skillet and bring to a simmer once more. Simmer for about 5 minutes or so.\nBake the chicken. Cover the skillet with the lid (or foil if you don’t have one). and transfer to the heated oven for 45 minutes, or until the chicken is fully cooked through. Remove from the oven and let sit for 5 minutes before serving. Garnish with more cilantro, if you like.", "preptime": "20 min", "cooktime": "45 min", "servings": "8", "tags": "Main, Baked Chicken Thighs, Baked Cilantro Chicken, Cilantro Lime Chicken Thighs", "notes": "The key to this zippy cilantro lime chicken recipe is the golden skin. Avoid the temptation to nudge it before it releases from the pan, then allow it to get deeply golden before flipping. (And if you'd prefer to use skinless, boneless thighs that's fine too, just adjust the cooking time as they will cook faster.)", "url": "https://www.themediterraneandish.com/cilantro-lime-chicken-thighs-recipe/?_kx=LuJ9pbAK9jaqx16izPntKPBZPmlKbMFDNvznHYBKgX0%3D.RMuL9Q#recipe", "date": "", "rating": 0}, {"id": 29, "name": "Butter-Fried Snapper with Smashed Fingerling Potatoes | Gusto", "cuisine": "Other", "source": "gustotv.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.gustotv.com/recipe/butter-fried-snapper-smashed-fingerling-potatoes/", "date": "", "rating": 0}, {"id": 30, "name": "Citrus Chicken Marinade", "cuisine": "American", "source": "theforkedspoon.com", "location": "", "ingredients": "2 large limes (zested and juiced (about ¼ cup juice and 1 teaspoon zest))\n1-2 large lemons (zested and juiced (about ¼ cup juice and 1 teaspoon zest))\n2 large oranges (juiced (about ½ cup juice total))\n⅓ cup oil (vegetable oil, canola oil, or avocado oil)\n8 cloves garlic (minced)\n1 tablespoon sugar (granulated or brown sugar)\n1 teaspoon dried basil\n1 teaspoon dried parsley\n½ teaspoon dried rosemary\n½ teaspoon garlic powder\n½ teaspoon onion powder\n2 teaspoons salt\n½ teaspoon black pepper\n3-4 pounds chicken (breasts, thighs, legs, etc.)", "instructions": "Prepare the marinade: Add the orange juice, lemon juice, lime juice, lemon zest, lime zest, vegetable oil, garlic, brown sugar, dried basil, parsley, rosemary, garlic powder, onion powder, salt, and black pepper to a blender or food processor. Blend just until combined.\nReserve some marinade, if desired: If you would like to use some of the marinade as a finishing sauce, set aside a portion before adding the chicken.\nMarinate the chicken: Place the chicken breasts in a large zip-top bag, shallow dish, or mixing bowl. Pour the marinade over the chicken and toss well to coat. Cover and refrigerate for at least 20 to 30 minutes, or up to 8 hours.\nPreheat the grill: Preheat your grill so you have one hotter side for searing and one slightly cooler side for finishing. Lightly oil the grates to help prevent sticking.\nGrill the chicken: Remove the chicken from the marin
