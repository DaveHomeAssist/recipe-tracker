notes": "If you’ve got sweet, ripe berries on hand, this strawberry muffin recipe is the perfect way to use them.", "url": "https://www.onceuponachef.com/recipes/strawberry-muffins.html#tabrecipe", "date": "", "rating": 0}, {"id": 163, "name": "Tarragon Chicken Cutlets", "cuisine": "French", "source": "themediterraneandish.com", "location": "", "ingredients": "1 1/2 pounds boneless skinless chicken breasts or 4 prepared chicken cutlets ((about 6 ounces each))\nKosher salt\nFreshly ground black pepper\n2 tablespoons extra virgin olive oil\n1 small shallot, (minced)\n1/2 cup dry white wine\n1/4 cup water\n2 tablespoons Dijon mustard\n2 tablespoons chopped fresh tarragon", "instructions": "Make the chicken cutlets: Lay the chicken breast on a cutting board. Hold it flat with the palm of your hand. Use a long, sharp, non-serrated knife like a long, thin slicing knife, or a chef’s knife. Slice the chicken in half horizontally, as smoothly as you can, and in as few slices as possible, starting at the thickest side. You will end up with 2 chicken cutlets. Repeat with the remaining chicken breasts. Layer each cutlet one at a time between two sheets of wax paper or plastic wrap. Gently use the smooth side of a meat pounder to shape the cutlet into an even 1/2-inch thickness. Depending on the thickness of the cutlets you can also skip this step, if you like.\nSeason the chicken: Lightly season the chicken cutlets all over with salt and pepper.\nPan fry the cutlets in batches: Heat 1 tablespoon olive oil in a large skillet over medium-high heat. When the oil is hot, add half of the cutlets. Cook until golden brown on both sides, about 4 minutes per side. Transfer the cutlets to a large plate and cover with an overturned bowl to keep warm. Add the remaining olive oil to the pan and repeat with the remaining cutlets. Set them aside with the first batch.\nDeglaze the pan: Add the shallots, wine, and water to the skillet. Raise heat to high and cook, scraping the bottom of the pan with a wooden spoon or spatula to release all the browned bits of chicken. Continue cooking, stirring constantly, until the liquid has reduced by half, about 3 minutes.\nFinish the pan sauce: Add the mustard and pour any accumulated chicken juices from the plate into the sauce. Continue simmering over low heat, using a whisk or fork to incorporate the mustard. Cook until the sauce is completely emulsified and thickened but still pourable. If it’s too thick for your liking, add a few tablespoons of water. If it’s not thick enough, continue cooking until it reaches the desired consistency. Remove the pan from the heat and stir in the tarragon. Season with salt and pepper to taste.\nPlate chicken and drizzle with sauce: If you like, cut the chicken into slices (or leave whole), then divide chicken among plates. Drizzle the sauce over the chicken and serve immediately.", "preptime": "10 min", "cooktime": "20 min", "servings": "4", "tags": "Main, Chicken, Dijon Mustard, Tarragon", "notes": "Tender, golden chicken cutlets are smothered in a savory pan sauce made with Dijon mustard, fresh tarragon, and a splash of white wine for irresistible French flavor.", "url": "https://www.themediterraneandish.com/tarragon-chicken-with-dijon-pan-sauce/", "date": "", "rating": 0}, {"id": 164, "name": "Asturian Bean and Sausage Stew (Fabada Asturiana)", "cuisine": "Spanish", "source": "thespruceeats.com", "location": "", "ingredients": "1 pound dry lima beans or large white beans\n1 1/2 pounds pork loin ribs (country style)\n1 yellow onion\nExtra virgin olive oil\n4 cloves garlic (whole)\n1 bay leaf\n6 to 7 ounces chorizo sausage (sliced; if you can't find chorizo, substitute your favorite sausage and add a little extra paprika)\n1 tablespoon Spanish sweet paprika\nSalt to taste", "instructions": "Pour beans into a large pot or bowl and cover with cold water.\nTurn the burner on high until the water comes to a boil. Boil for 1 minute and then turn off the burner.\nCover and let beans sit in the water for 1 hour.\nWhile the beans are sitting, chop the onion into approximately 1/4-inch pieces. Cut the pork into large chunks, about 2-inch squares.\nCover the bottom of a large pot with olive oil and heat over medium. When hot, add the chopped onions, garlic, and pork. Sauté until the onions are transparent (but not browned). Remove from heat.\nDrain water from the beans. Place the beans in the large pot with the sautéed onions and pork. Add water to cover. Add the bay leaf, sliced chorizo, and Spanish paprika.\nPlace back on the stove and turn on high. When the water comes to a boil , reduce to medium. Water should be at a low boil. Simmer until the meat is tender. This takes approximately 1 1/2 hours.\nTaste the stew and adjust salt if necessary. Serve in soup bowls with crusty bread .", "preptime": "10 min", "cooktime": "150 min", "servings": "6", "tags": "Soup, Sausage", "notes": "Fabada Asturiana is a traditional Spanish stew made with beans, sausage, ham, and pork cuts. This streamlined version will let you enjoy it in no time.", "url": "https://www.thespruceeats.com/simple-asturian-bean-and-sausage-stew-3083338", "date": "", "rating": 0}, {"id": 165, "name": "Spanish Eggplant With Tomato Vinaigrette", "cuisine": "Other", "source": "thespruceeats.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.thespruceeats.com/spanish-eggplant-with-tomato-vinaigrette-recipe-3083668", "date": "", "rating": 0}, {"id": 166, "name": "Joojeh Kabob (Persian Saffron and Yogurt Chicken Kabobs)", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "2 1/4 pounds boneless skinless chicken breasts, (cut into 2-inch cubes)\n1 pinch saffron threads ((about 10 threads) or 1/4 teaspoon of ground saffron)\n1 large yellow onion, (thinly sliced)\n1 large garlic clove, (crushed or minced)\nJuice from 1 large lemon\n1/3 cup Greek yogurt\n2 tablespoons extra virgin olive oil\n1 tablespoon tomato purée\n1/2 teaspoon turmeric\nKosher salt\nBlack pepper\nFinely chopped parsley, (for garnish)", "instructions": "Bloom the saffron. Use either a pestle and mortar or a spice grinder to grind the saffron until all of the strands become a fine powder. (If you use a pestle and mortar, have patience.) Stir 1/4 teaspoon of the ground saffron with 3 tablespoons of water. Allow to bloom for 10 minutes.\nMake the marinade. To a large bowl, add the sliced onion, garlic, lemon juice, yogurt, olive oil, tomato puree, turmeric, and the bloomed saffron water. Stir to combine.\nAdd the chicken. Place the chicken into the bowl with the marinade and season with a large pinch of salt and pepper. Massage the marinade into the chicken until everything is combined and evenly distributed.\nLeave to marinate. Cover with plastic wrap and leave in the fridge overnight for the flavors to develop.\nSkewer the chicken. The next day, remove chicken from the fridge, shake off any excess marinade and thread the chicken pieces onto the soaked skewers. (Discard the marinade and onions.)\nGrill. Lightly oil and heat a gas grill or griddle to medium-high heat. Add the kabobs and cook, uncovered, until the chicken is cooked through, about 10-12 minutes in total. The internal temperature should register 165°F.\nServe. Place the cooked Joojeh Kabobs on a serving dish and sprinkle with finely chopped fresh parsley. Enjoy!", "preptime": "15 min", "cooktime": "15 min", "servings": "6", "tags": "Main, Chicken, Grilled Chicken, Kabob Recipe", "notes": "These traditional Persian chicken kebabs are juicy, tender, and packed with flavor. This recipe is simple, you just need to plan ahead: Marinate the chicken overnight for the best flavor.", "url": "https://www.themediterraneandish.com/joojeh-kabob-persian-chicken-kabob-recipe/?utm_source=Klaviyo&utm_medium=email&utm_campaign=Wed+Chicken+Kabobs+3+Ways&_kx=LuJ9pbAK9jaqx16izPntKPBZPmlKbMFDNvznHYBKgX0.RMuL9Q", "date": "", "rating": 0}, {"id": 167, "name": "My Best Blueberry Muffins", "cuisine": "American", "source": "sallysbakingaddiction.com", "location": "", "ingredients": "1/2 cup (100g) packed light or dark brown sugar\n1/2 cup (67g) chopped walnuts (or pecans)\n1 teaspoon ground cinnamon\n1 and 3/4 cups (219g) all-purpose flour (spooned & leveled)\n1 teaspoon baking soda\n1 teaspoon baking powder\n1/2 teaspoon salt\n1/2 cup (8 Tbsp; 113g) unsalted butter, softened to room temperature\n1/2 cup (100g) granulated sugar\n1/4 cup (50g) packed light or dark brown sugar\n2 large eggs, at room temperature\n1/2 cup (120g) sour cream or plain/vanilla yogurt, at room temperature\n2 teaspoons pure vanilla extract\n1/4 cup (60ml) milk, at room temperature\n1 and 1/2 cups (210g) fresh or frozen blueberries", "instructions": "Preheat oven to 425°F (218°C). Spray a 12-count muffin pan with nonstick spray or use muffin liners. Set aside.\nMix all of the topping ingredients together. Set aside.\nWhisk the flour, baking soda, baking powder, and salt together in a large bowl. Set aside.\nUsing a handheld or stand mixer fitted with a paddle or whisk attachment, beat the butter, granulated sugar, and brown sugar together on high speed until smooth and creamy, about 3 minutes. (Here’s a helpful tutorial if you need guidance on how to cream butter and sugar.) On medium speed, add the eggs one at a time, beating well after each addition. Beat in the sour cream and vanilla extract on medium speed until combined. With the mixer running on low speed, add the dry ingredients and milk into the wet ingredients and beat until combined. Batter is thick and creamy. Fold in the blueberries.\nSpoon the batter into liners, filling them all the way to the top. Spoon brown sugar topping on each, gently pressing it down into the surface so it sticks. Bake for 5 minutes at 425 then, keeping the muffins in the oven, reduce the oven temperature to 350°F (177°C). Bake for an additional 18–20 minutes or until a toothpick inserted in the center comes out clean. The total time these muffins take in the oven is about 23–25 minutes, give or take. Allow the muffins to cool for 5 minutes in the muffin pan, then transfer to a wire rack to continue cooling.\nMuffins stay fresh covered at room temperature for a few days or in the refrigerator for up to 1 week.", "preptime": "15 min", "cooktime": "25 min", "servings": "12", "tags": "Breakfast, Blueberry Muffins", "notes": "These blueberry muffins are buttery, soft, and moist. For that bakery-style goodness, add an easy cinnamon brown sugar topping. This thick muffin batter combined with my initial high oven temperature trick guarantees tall muffin tops. Prepared with basic ingredients and a couple mixing bowls, you'll appreciate this easy breakfast recipe.", "url": "https://sallysbakingaddiction.com/blueberry-muffins/", "date": "", "rating": 0}, {"id": 168, "name": "Garlic Aioli", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/213608/garlic-aioli/", "date": "", "rating": 0}, {"id": 169, "name": "Strawberry Shortcake Cake", "cuisine": "American", "source": "simplyrecipes.com", "location": "", "ingredients": "2 2/3 cups (320g) all-purpose flour\n1 1/2 cups (300g) sugar\n2 tablespoons baking powder\n1 teaspoon salt\n1/2 teaspoon baking soda\n1 cup (227g) unsalted butter, room temperature\n1 1/4 cups buttermilk\n2 teaspoons vanilla extract\n3 large eggs, room temperature\n1 pound fresh strawberries\n2 tablespoons granulated sugar\n4 ounces (113g) cream cheese, softened\n1/2 cup (60g) powdered sugar\n1/2 teaspoon vanilla extract\n2 cups heavy cream\nA few whole strawberries, to decorate", "instructions": "Preheat the oven to 350°F. Lightly grease and flour three 8-inch cake pans or two 9-inch round cake pans. If desired, line the bottom of the pans with parchment rounds.\nIn the bowl of a stand mixer fitted with the paddle attachment, combine the flour, sugar, baking powder, salt, and baking soda.\nAdd the butter and mix on low speed until the mixture looks sandy, about 2 minutes. Pour in the buttermilk and vanilla extract. Mix on low speed until combined, about 30 seconds. Then increase the speed to medium and continue mixing for 30 seconds.\nAdd the eggs, one at a time, mixing on low speed until fully combined. Scrape the bottom and sides of the mixing bowl with a spatula after each addition. After adding the last egg, mix on medium-high speed for 30 seconds. The batter should be smooth and thick.\nDivide the batter evenly among the pans and smooth the tops with an offset spatula or the back of a spoon. If you have a kitchen scale, each layer should weigh about 15 ounces (425g) for three 8-inch layers, or about 22 1/2 ounces (640g) per layer for two 9-inch layers.\nFor 8-inch cakes, bake for 21 to 24 minutes. If you’re baking two 9-inch layers, bake for 28 to 33 minutes. The edges should just be starting to pull from the sides of the pan and turning golden brown. A toothpick inserted into the center of one of the layers should come out clean. Cool the cakes in the pan for 5 minutes. Run an offset spatula or butter knife around the edge of the cakes to loosen them from the pan, then carefully turn them out onto a rack to cool completely.\nWhile the cakes cool, prepare the macerated strawberries. Use a paring knife to hull the strawberries. Then, placing them flat side down on the cutting board, slice them into 1/8 to 1/4-inch slices. Transfer the sliced strawberries to a bowl, pour in the sugar, and stir to coat them evenly. Cover the bowl and let the strawberries sit at room temperature for 30 minutes.\nIn the cleaned bowl of a stand mixer fitted with the whisk attachment, beat the cream cheese, powdered sugar, and vanilla extract on medium speed until smooth, 1 to 2 minutes. With the mixer still running, slowly pour in the heavy cream in a steady stream. Continue beating on medium speed until the mixture thickens and stiff peaks form. When you lift the whisk out of the cream, the whipped cream should come to a point at the tip of the whisk that stays upright.\nPlace one of the cake layers, right side up, on a large plate or cake stand. Use an offset spatula or the back of a spoon to spread about 1 cup (1 1/2 cups for a 9-inch two-layer cake) of the whipped cream evenly over the cake layer. Arrange half of the strawberries in an even layer on top of the whipped cream. Repeat with the second cake layer. If you’re making a two-layer cake, top with another 1 1/2 cups of whipped cream and pile the remaining strawberries on top. For a three-layer cake, add the last layer and spread with about 1 cup of the whipped cream. Use an offset spatula or the back of a spoon to create swoops and swirls. Garnish the top of the cake with extra strawberries.\nThe cake is best enjoyed immediately after assembly. That said, it will keep, covered, for up to 3 days in the refrigerator. It won’t look as pretty as the strawberry juice starts to run, but it’s still delicious. The extra whipped cream will keep in an airtight container in the fridge for up to 3 days. Love the recipe? Let us know with a rating and review!", "preptime": "40 min", "cooktime": "24 min", "servings": "16", "tags": "Dessert, Strawberry Shortcake Cake, All-Purpose Flour, Buttermilk, Strawberries, Cream Cheese", "notes": "Take strawberry shortcake to a whole new level with this three-layer dessert recipe. Strawberry shortcake cake is almost as easy as regular shortcakes but fit for a celebration.", "url": "https://www.simplyrecipes.com/strawberry-shortcake-cake-recipe-7507525", "date": "", "rating": 0}, {"id": 170, "name": "Tuscan-Style Spareribs with Balsamic Glaze", "cuisine": "American", "source": "foodandwine.com", "location": "", "ingredients": "2 tablespoons extra-virgin olive oil\n2 tablespoons chopped rosemary leaves\n1 1/2 tablespoons kosher salt\n1 1/2 tablespoons fennel seeds\n2 teaspoons freshly ground black pepper\n2 teaspoons chopped sage\n2 teaspoons chopped thyme\n2 teaspoons sweet paprika\n1 teaspoon crushed red pepper\n1 teaspoon ground coriander\n1/2 teaspoon ground allspice\n6 pounds pork spareribs\n3 tablespoons balsamic vinegar, preferably one aged for at least 5 years", "instructions": "In a small bowl, combine the olive oil, rosemary, kosher salt, fennel, black pepper, sage, thyme, paprika, crushed red pepper, coriander and allspice. Rub the spice paste all over the spareribs and let stand at room temperature for 2 hours or refrigerate overnight.\nPreheat the oven to 325°. Arrange the ribs on a large, rimmed baking sheet or roasting pan, meaty side up. Roast the ribs for 2 hours, or until tender.\nPreheat the broiler. Brush the meaty side of the ribs with the balsamic vinegar and broil 6 inches from the heat until browned, about 2 minutes. Let stand for 5 minutes, then cut between the ribs and serve.", "preptime": "", "cooktime": "", "servings": "6", "tags": "", "notes": "Bruce Aidells, author of Bruce Aidells's Complete Book of Pork, loves to barbecue spareribs, but his favorite way to prepare them is to generously sea...", "url": "https://www.foodandwine.com/recipes/tuscan-style-spareribs-balsamic-glaze", "date": "", "rating": 0}, {"id": 171, "name": "General Tso's Chicken", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/91499/general-tsaos-chicken-ii/?hid=b0348fefcbe2324632504520f4759dfc921e499a&did=15392158-20241120&utm_campaign=alrcom-nonewsubs_relationship-builder&utm_so function renderStats() {
  const s = statsFor(recipes);
  document.getElementById('statsBar').innerHTML =
    `<div class="stat-chip"><strong>${s.count}</strong> recipes</div>
     <div class="stat-chip"><strong>${s.cuisines}</strong> cuisines</div>
     <div class="stat-chip"><strong>${s.locations}</strong> locations</div>`;
}

function renderGrid() {
  const g = document.getElementById('recipeGrid');
  if (bootError && !recipes.length) {
    g.innerHTML = `<div class="empty-state"><div class="ei">☁️</div><p>${escapeHtml(bootError)}</p></div>`;
    return;
  }
  g.innerHTML = renderGridHtml(recipes, { filters, tagRegistry });
  g.querySelectorAll('.card').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('.edit-btn')||e.target.closest('.del-btn')) return;
    openView(el.dataset.id);
  }));
  g.querySelectorAll('.edit-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();openEdit(el.dataset.id);}));
  g.querySelectorAll('.del-btn').forEach(el=>el.addEventListener('click',e=>{e.stopPropagation();del(el.dataset.id);}));
  g.querySelectorAll('[data-card-tag]').forEach((button) => {
    button.addEventListener('click', (event) => {
      event.stopPropagation();
      const slug = button.dataset.cardTag;
      if (!slug) return;
      if (!filters.tags.includes(slug)) {
        applyFilters({ tags: [...filters.tags, slug] });
        render();
      }
      bounceActiveFilter(document.querySelector(`[data-tag-filter="${CSS.escape(slug)}"]`));
    });
  });
  g.querySelectorAll('.edit-btn').forEach(b => b.setAttribute('aria-label', 'Edit recipe'));
  g.querySelectorAll('.del-btn').forEach(b => b.setAttribute('aria-label', 'Delete recipe'));
  g.querySelectorAll('.card').forEach(c => {
    c.setAttribute('role', 'listitem');
    c.setAttribute('tabindex', '0');
    c.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openView(c.dataset.id);
      }
    });
  });
}

function applyFilters(nextFilters) {
  filters = cloneFilters({ ...filters, ...nextFilters });
  prefs = recordFilter(filters, prefs);
}

function getVisibleTagFilters() {
  const counts = getTagUsageCounts();
  const entries = Object.values(tagRegistry)
    .filter((entry) => counts.get(entry.slug) || entry.pinned)
    .sort((a, b) => a.label.localeCompare(b.label));
  const prioritized = [
    ...entries.filter((entry) => entry.pinned),
    ...entries
      .filter((entry) => !entry.pinned)
      .sort((a, b) => (counts.get(b.slug) || 0) - (counts.get(a.slug) || 0) || a.label.localeCompare(b.label)),
  ];
  const visible = prioritized.slice(0, MAX_VISIBLE_TAGS);
  return {
    visible,
    overflow: Math.max(0, prioritized.length - visible.length),
  };
}

function remapTagSlugs(values = [], slugMap = new Map(), removed = new Set()) {
  return [...new Set(
    (values || [])
      .map((slug) => slugMap.get(slug) || slug)
      .filter((slug) => slug && !removed.has(slug))
  )];
}

function remapTagManagerPrompt(prompt, slugMap = new Map(), removed = new Set()) {
  if (!prompt) return null;
  const slugs = remapTagSlugs(prompt.slugs || [], slugMap, removed);
  if (!slugs.length) return null;
  if (prompt.type === 'merge' && slugs.length < 2) return null;
  return {
    ...prompt,
    slugs,
    keep: prompt.keep ? (slugMap.get(prompt.keep) || prompt.keep) : prompt.keep,
  };
}

function syncTagStateAfterMutation({ slugMap = new Map(), removed = [] } = {}) {
  const removedSet = new Set(removed);
  const nextTagFilters = remapTagSlugs(filters.tags, slugMap, removedSet);
  if (nextTagFilters.length !== filters.tags.length || nextTagFilters.some((slug, index) => slug !== filters.tags[index])) {
    applyFilters({ tags: nextTagFilters });
  }
  tagInputState = {
    ...tagInputState,
    selected: remapTagSlugs(tagInputState.selected, slugMap, removedSet),
    flashSlug: removedSet.has(tagInputState.flashSlug) ? '' : (slugMap.get(tagInputState.flashSlug) || tagInputState.flashSlug),
  };
  tagManagerState = {
    ...tagManagerState,
    selected: new Set(remapTagSlugs([...tagManagerState.selected], slugMap, removedSet)),
    editingSlug: removedSet.has(tagManagerState.editingSlug) ? '' : (slugMap.get(tagManagerState.editingSlug) || tagManagerState.editingSlug),
    colorSlug: removedSet.has(tagManagerState.colorSlug) ? '' : (slugMap.get(tagManagerState.colorSlug) || tagManagerState.colorSlug),
    prompt: remapTagManagerPrompt(tagManagerState.prompt, slugMap, removedSet),
  };
}

function getRemoteTagMetadataNotice() {
  return REMOTE_MODE
    ? ' Tag colors and pinned states currently persist only in this browser cache until remote tag metadata sync is added.'
    : '';
}

function renderFilterChips() {
  const validTagFilters = filters.tags.filter((slug) => tagRegistry[slug]);
  if (validTagFilters.length !== filters.tags.length) {
    applyFilters({ tags: validTagFilters });
  }
  const present = [...new Set(recipes.map(r => (r && r.cuisine) || '').filter(Boolean))];
  const seed = present.length >= 3 ? present : FALLBACK_CUISINES;
  if (filters.cuisine && !seed.includes(filters.cuisine)) {
    applyFilters({ cuisine: null });
  }
  const ordered = ['All', ...seed.sort((a,b)=>a.localeCompare(b))];
  const cuisineHost = document.getElementById('cuisineFilterBtns');
  cuisineHost.innerHTML = ordered.map(c => {
    const val = c === 'All' ? 'all' : c;
    const active = (val === 'all' ? !filters.cuisine : val === filters.cuisine) ? ' active' : '';
    const pressed = active ? 'true' : 'false';
    return `<button class="filter-btn${active}" type="button" role="button" aria-pressed="${pressed}" data-cuisine-filter="${escapeHtml(val)}">${escapeHtml(c)}</button>`;
  }).join('');

  const { visible, overflow } = getVisibleTagFilters();
  const tagHost = document.getElementById('tagFilterBtns');
  tagHost.innerHTML = visible.map((entry, index) => {
    const active = filters.tags.includes(entry.slug) ? ' active' : '';
    const color = resolveTagColor(entry, index);
    return `<button class="filter-btn${active}" type="button" aria-pressed="${active ? 'true' : 'false'}" data-tag-filter="${escapeHtml(entry.slug)}" style="border-color:${color};">${escapeHtml(entry.label)}</button>`;
  }).join('') + (overflow ? `<button class="filter-btn filter-more-chip" type="button" data-tag-overflow="true">+ ${overflow} more</button>` : '');

  const activeFiltersHost = document.getElementById('activeFilters');
  const activeBits = [];
  if (filters.cuisine) {
    activeBits.push(`<span class="active-filter-chip">Cuisine: ${escapeHtml(filters.cuisine)}<button type="button" data-clear-cuisine="true" aria-label="Remove cuisine filter">&times;</button></span>`);
  }
  filters.tags.forEach((slug) => {
    activeBits.push(`<span class="active-filter-chip">Tag: ${escapeHtml(getTagLabel(slug, tagRegistry))}<button type="button" data-clear-tag="${escapeHtml(slug)}" aria-label="Remove ${escapeHtml(getTagLabel(slug, tagRegistry))} tag filter">&times;</button></span>`);
  });
  if (filters.search.trim()) {
    activeBits.push(`<span class="active-filter-chip">Search: ${escapeHtml(filters.search)}<button type="button" data-clear-search="true" aria-label="Clear search filter">&times;</button></span>`);
  }
  if (activeBits.length) {
    activeBits.push('<button class="filter-clear" type="button" data-clear-filters="true">Clear all</button>');
  }
  activeFiltersHost.innerHTML = activeBits.join('');
}

function renderRecentSearches() {
  const host = document.getElementById('recentSearches');
  const query = filters.search.trim().toLowerCase();
  const suggestions = prefs.recentSearches.filter((item) => !query || item.toLowerCase().includes(query));
  const shouldShow = searchFocused && suggestions.length > 0;
  host.innerHTML = suggestions
    .map((query) => `<button type="button" class="suggestion-chip" data-search="${escapeHtml(query)}">${escapeHtml(query)}</button>`)
    .join('');

function renderFormSuggestions() {
  const sourceList = document.getElementById('source-suggestions');
  const locationList = document.getElementById('location-suggestions');
  const distinctSources = [...new Set(recipes.map((recipe) => String(recipe?.source || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));
  const distinctLocations = [...new Set(recipes.map((recipe) => String(recipe?.location || '').trim()).filter(Boolean))].sort((a, b) => a.localeCompare(b));
  sourceList.innerHTML = distinctSources.map((value) => `<option value="${escapeHtml(value)}"></option>`).join('');
  locationList.innerHTML = distinctLocations.map((value) => `<option value="${escapeHtml(value)}"></option>`).join('');
}

function getTagSuggestions(query = '', selected = tagInputState.selected) {
  const counts = getTagUsageCounts();
  const lowered = query.trim().toLowerCase();
  return Object.values(tagRegistry)
    .filter((entry) => !selected.includes(entry.slug))
    .map((entry) => ({ entry, score: getTagMatchScore(entry.label, lowered) }))
    .filter(({ score }) => score > 0)
    .sort((a, b) => b.score - a.score || (counts.get(b.entry.slug) || 0) - (counts.get(a.entry.slug) || 0) || a.entry.label.localeCompare(b.entry.label))
    .map(({ entry }) => entry)
    .slice(0, 8);
}

function flashTagChip(slug) {
  tagInputState.flashSlug = slug;
  renderTagInput();
  setTimeout(() => {
    if (tagInputState.flashSlug === slug) {
      tagInputState.flashSlug = '';
      renderTagInput();
    }
  }, 420);
}

function addFormTag(label, options = {}) {
  const cleaned = cleanTagLabel(label);
  const slug = slugifyTag(cleaned);
  if (!slug) {
    if (cleaned) announceTagInput('Use letters or numbers to create a tag.');
    return;
  }
  if (tagInputState.selected.includes(slug)) {
    flashTagChip(slug);
    announceTagInput(`${getTagLabel(slug, tagRegistry)} is already added.`);
    return;
  }
  if (!tagRegistry[slug]) {
    tagRegistry = {
      ...tagRegistry,
      [slug]: createTagRecord(cleaned, { slug, colorIndex: Object.keys(tagRegistry).length }),
    };
  }
  tagInputState.selected = [...tagInputState.selected, slug];
  tagInputState.activeIndex = -1;
  tagInputState.flashSlug = '';
  const input = document.getElementById('f-tag-input');
  input.value = '';
  renderTagInput();
  announceTagInput(`${getTagLabel(slug, tagRegistry)} added.`);
}

function setFormTags(tags = []) {
  tagInputState = {
    selected: [...new Set((tags || []).map((slug) => String(slug)).filter(Boolean))],
    suggestions: [],
    activeIndex: -1,
    flashSlug: '',
  };
  const input = document.getElementById('f-tag-input');
  if (input) input.value = '';
  renderTagInput();
}

function renderTagInput() {
  const input = document.getElementById('f-tag-input');
  const chipHost = document.getElementById('tagChipList');
  const wrap = document.getElementById('tagInputWrap');
  const dropdown = document.getElementById('tag-suggestions');
  if (!input || !chipHost || !wrap || !dropdown) return;

  const suggestions = getTagSuggestions(input.value, tagInputState.selected);
  tagInputState.suggestions = suggestions;
  if (tagInputState.activeIndex >= suggestions.length) tagInputState.activeIndex = suggestions.length - 1;

  chipHost.innerHTML = tagInputState.selected
    .map((slug) => `<span class="tag-chip${tagInputState.flashSlug === slug ? ' flash' : ''}">${escapeHtml(getTagLabel(slug, tagRegistry))}<button type="button" data-remove-tag="${escapeHtml(slug)}" aria-label="Remove ${escapeHtml(getTagLabel(slug, tagRegistry))}">&times;</button></span>`)
    .join('');

  dropdown.innerHTML = suggestions.map((entry, index) => {
    const count = getTagUsageCounts().get(entry.slug) || 0;
    return `<li role="presentation"><button type="button" class="tag-dropdown-item" id="tag-option-${escapeHtml(entry.slug)}" role="option" aria-selected="${index === tagInputState.activeIndex ? 'true' : 'false'}" data-tag-option="${escapeHtml(entry.slug)}"><span>${escapeHtml(entry.label)}</span><span>${count} recipe${count === 1 ? '' : 's'}</span></button></li>`;
  }).join('');
  dropdown.classList.toggle('show', suggestions.length > 0);
  wrap.setAttribute('aria-expanded', suggestions.length > 0 ? 'true' : 'false');
  const activeOption = tagInputState.activeIndex > -1 ? suggestions[tagInputState.activeIndex] : null;
  if (activeOption) wrap.setAttribute('aria-activedescendant', `tag-option-${activeOption.slug}`);
  else wrap.removeAttribute('aria-activedescendant');
  if (input.value.trim()) {
    announceTagInput(
      suggestions.length
        ? `${suggestions.length} tag suggestion${suggestions.length === 1 ? '' : 's'} available.`
        : 'No matching tags. Press Enter, comma, or Tab to create a new tag.'
    );
  }
}

function scheduleTagInputRender() {
  clearTimeout(tagInputDebounceTimer);
  tagInputDebounceTimer = setTimeout(() => renderTagInput(), 150);
}

function setTagPinned(slugs, pinned) {
  const nextRegistry = { ...tagRegistry };
  slugs.forEach((slug) => {
    if (!nextRegistry[slug]) return;
    nextRegistry[slug] = {
      ...nextRegistry[slug],
      pinned,
      updatedAt: new Date().toISOString(),
    };
  });
  tagRegistry = nextRegistry;
}

function setTagColor(slug, color) {
  if (!tagRegistry[slug]) return;
  tagRegistry = {
    ...tagRegistry,
    [slug]: {
      ...tagRegistry[slug],
      color,
      updatedAt: new Date().toISOString(),
    },
  };
}

function renameTag(slug, nextLabel) {
  const label = cleanTagLabel(nextLabel);
  if (!label || !tagRegistry[slug]) return null;
  const nextSlug = slugifyTag(label);
  if (!nextSlug) return null;
  if (nextSlug !== slug && tagRegistry[nextSlug]) {
    mergeTags([slug, nextSlug], nextSlug, label);
    return { slug: nextSlug, label, merged: true };
  }

  const entry = tagRegistry[slug];
  const nextRegistry = { ...tagRegistry };
  delete nextRegistry[slug];
  nextRegistry[nextSlug] = {
    ...entry,
    label,
    slug: nextSlug,
    updatedAt: new Date().toISOString(),
  };
  recipes = recipes.map((recipe) => ({
    ...recipe,
    tags: [...new Set((recipe.tags || []).map((tag) => (tag === slug ? nextSlug : tag)).filter(Boolean))],
  }));
  tagRegistry = nextRegistry;
  syncTagStateAfterMutation({ slugMap: new Map([[slug, nextSlug]]) });
  return { slug: nextSlug, label, merged: false };
}

function mergeTags(slugs, winnerSlug, winnerLabel = '') {
  const uniqueSlugs = [...new Set(slugs.filter(Boolean))];
  if (uniqueSlugs.length < 2 || !winnerSlug) return;
  const nextRegistry = { ...tagRegistry };
  const winner = nextRegistry[winnerSlug] || createTagRecord(winnerLabel || humanizeTagSlug(winnerSlug), {
    slug: winnerSlug,
    colorIndex: Object.keys(nextRegistry).length,
  });
  nextRegistry[winnerSlug] = {
    ...winner,
    label: cleanTagLabel(winnerLabel) || winner.label,
    slug: winnerSlug,
    updatedAt: new Date().toISOString(),
  };
  recipes = recipes.map((recipe) => ({
    ...recipe,
    tags: [...new Set((recipe.tags || []).map((tag) => (uniqueSlugs.includes(tag) ? winnerSlug : tag)).filter(Boolean))],
  }));
  uniqueSlugs.filter((slug) => slug !== winnerSlug).forEach((slug) => delete nextRegistry[slug]);
  tagRegistry = nextRegistry;
  syncTagStateAfterMutation({
    slugMap: new Map(uniqueSlugs.map((slug) => [slug, winnerSlug])),
    removed: uniqueSlugs.filter((slug) => slug !== winnerSlug),
  });
}

function deleteTags(slugs) {
  const doomed = new Set(slugs.filter(Boolean));
  if (!doomed.size) return;
  recipes = recipes.map((recipe) => ({
    ...recipe,
    tags: (recipe.tags || []).filter((slug) => !doomed.has(slug)),
  }));
  const nextRegistry = { ...tagRegistry };
  doomed.forEach((slug) => delete nextRegistry[slug]);
  tagRegistry = nextRegistry;
  syncTagStateAfterMutation({ removed: [...doomed] });
}

function getTagManagerEntries() {
  const counts = getTagUsageCounts();
  return Object.values(tagRegistry)
    .filter((entry) => tagManagerState.filterMode !== 'unpinned' || !entry.pinned)
    .sort((a, b) => a.label.localeCompare(b.label))
    .map((entry) => ({ ...entry, count: counts.get(entry.slug) || 0 }));
}

  const bulkBar = document.getElementById('tagBulkBar');
  const prompt = document.getElementById('tagManagerPrompt');
  const table = document.getElementById('tagTable');
  if (!note || !bulkBar || !prompt || !table) return;

  note.textContent = tagManagerState.filterMode === 'unpinned'
    ? `Showing unpinned tags. Pin frequently used tags to keep them visible in the filter bar.${getRemoteTagMetadataNotice()}`
    : `Rename, pin, color, merge, and delete tags.${getRemoteTagMetadataNotice()}`;

  const selectedSlugs = [...tagManagerState.selected];
  bulkBar.classList.toggle('show', selectedSlugs.length > 0);
  bulkBar.innerHTML = selectedSlugs.length
    ? `<div>${selectedSlugs.length} tag${selectedSlugs.length === 1 ? '' : 's'} selected</div>
       <div class="tag-bulk-bar-actions">
         <button class="btn-secondary" type="button" data-bulk-pin="true">Pin</button>
         <button class="btn-secondary" type="button" data-bulk-unpin="true">Unpin</button>
         <button class="btn-secondary" type="button" data-bulk-merge="true" ${selectedSlugs.length < 2 ? 'disabled' : ''}>Merge</button>
         <button class="btn-danger" type="button" data-bulk-delete="true">Delete</button>
       </div>`
    : '';

  if (tagManagerState.prompt) {

    prompt.setAttribute('role', 'dialog');
    prompt.setAttribute('aria-modal', 'false');
    prompt.setAttribute('tabindex', '-1');
    prompt.setAttribute('aria-labelledby', 'tagManagerPromptTitle');
    prompt.setAttribute('aria-describedby', 'tagManagerPromptBody');
    if (tagManagerState.prompt.type === 'merge') {
      const keep = tagManagerState.prompt.keep || tagManagerState.prompt.slugs[0];
      prompt.innerHTML = `

        <p id="tagManagerPromptBody">Select which tag should keep the merged recipes.</p>
        <div class="tag-manager-choice-list">
          ${tagManagerState.prompt.slugs.map((slug) => `<label class="tag-manager-choice"><input type="radio" name="tag-merge-choice" value="${escapeHtml(slug)}" ${slug === keep ? 'checked' : ''}> <span>${escapeHtml(getTagLabel(slug, tagRegistry))}</span></label>`).join('')}
        </div>
        <div class="tag-manager-prompt-actions">
          <button class="btn-secondary" type="button" data-prompt-cancel="true">Cancel</button>
          <button class="btn-primary" type="button" data-prompt-confirm-merge="true">Merge</button>
        </div>`;
    } else if (tagManagerState.prompt.type === 'delete') {
      const countImpacted = recipes.filter((recipe) => (recipe.tags || []).some((slug) => tagManagerState.prompt.slugs.includes(slug))).length;
      const labels = tagManagerState.prompt.slugs.map((slug) => getTagLabel(slug, tagRegistry));
      const deleteText = labels.length === 1
        ? `Delete "${labels[0]}"? Removes it from ${countImpacted} recipe${countImpacted === 1 ? '' : 's'}.`
        : `Delete ${labels.length} tags? Removes them from ${countImpacted} recipe${countImpacted === 1 ? '' : 's'}.`;
      prompt.innerHTML = `
        <h3 id="tagManagerPromptTitle">Delete Tags</h3>
        <p id="tagManagerPromptBody">${escapeHtml(deleteText)}</p>
        <div class="tag-manager-prompt-actions">
          <button class="btn-secondary" type="button" data-prompt-cancel="true">Cancel</button>
          <button class="btn-danger" type="button" data-prompt-confirm-delete="true">Delete</button>
        </div>`;
    }
    focusTagManagerPrompt();
  } else {
    prompt.classList.remove('show');
    prompt.removeAttribute('role');
    prompt.removeAttribute('aria-modal');
    prompt.removeAttribute('tabindex');
    prompt.removeAttribute('aria-labelledby');
    prompt.removeAttribute('aria-describedby');

  const entries = getTagManagerEntries();
  table.innerHTML = `
    <div class="tag-table-row tag-table-head" role="row">

      <div>Color</div>
      <div>Label</div>
      <div>Recipes</div>

      <div>Actions</div>

        <div style="position:relative;">
          <button class="tag-color-btn" type="button" data-edit-color="${escapeHtml(entry.slug)}" style="background:${resolveTagColor(entry, index)};" aria-label="Change ${escapeHtml(entry.label)} color"></button>
          ${tagManagerState.colorSlug === entry.slug ? `<div class="tag-color-pop">${TAG_COLOR_PALETTE.map((color) => `<button type="button" data-set-color="${escapeHtml(entry.slug)}" data-color-value="${color}" style="background:${color};" aria-label="Set color ${color}"></button>`).join('')}<button type="button" data-set-color="${escapeHtml(entry.slug)}" data-color-value="" aria-label="Use automatic color">A</button></div>` : ''}
        </div>
        <div>

        <div class="tag-row-actions">
          <button class="tag-row-action" type="button" data-row-merge="${escapeHtml(entry.slug)}">Merge</button>
          <button class="tag-row-action delete" type="button" data-row-delete="${escapeHtml(entry.slug)}">Delete</button>
        </div>
      </div>`).join('')}
  `;
}

function maybeShowBackupNudge() {
  const edits = Number(prefs.editsSinceLastExport || 0);
  const threshold = edits >= 10 ? Math.floor(edits / 10) * 10 : 0;
  if (!threshold || threshold === lastBackupNudgeCount || Number(prefs.lastNudgeDismissedAt || 0) >= threshold) return;
  lastBackupNudgeCount = threshold;
  showMultiActionToast(
    `${threshold} changes since your last backup.`,
    [
      {
        label: 'Later',
        onAction: async () => {
          prefs = savePrefs({ ...prefs, lastNudgeDismissedAt: threshold });
        },
      },
      {
        label: 'Export now',
        onAction: async () => {
          exportRecipes();
        },
      },
    ],
    18000
  );
}

function render() {
  renderFilterChips();
  renderStats();
  renderGrid();
  renderRecentSearches();
  renderFormSuggestions();
  renderTagInput();
  renderTagManager();
  maybeShowBackupNudge();
}

async function migrateSeedImagesIfNeeded() {
  if (getStoredSchemaVersion() >= SCHEMA_VERSION) return;
  try {
    const result = await mergeSeedImages(recipes);
    if (result.changed) {
      recipes = result.recipes;
      persist();
      render();
      return;
    }
    setStoredSchemaVersion();
  } catch (e) {
    console.error('seed image migration failed:', e);
  }
}

function ensureAuthModal() {
  let modal = document.getElementById('authModal');
  if (modal) return modal;

  modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'authModal';
  modal.innerHTML = `
    <div class="modal" style="max-width:420px;">
      <div class="modal-header">
        <h2>Enter Family Access Code</h2>
      </div>
      <form class="modal-body" id="authForm">
        <div class="form-group">
          <label for="authCode">Access Code</label>
          <input type="password" id="authCode" autocomplete="current-password" placeholder="Family access code">
          <div class="hint" id="authHint">This device needs the family access code before it can load shared recipes.</div>
        </div>
      </form>
      <div class="modal-footer">
        <button class="btn-primary" id="authSubmitBtn" type="button">Unlock Library</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
  modal.addEventListener('click', (event) => {
    if (event.target === modal) event.preventDefault();
  });
  const submit = async () => {
    const input = document.getElementById('authCode');
    const hint = document.getElementById('authHint');
    try {
      await submitAccessCode(remoteApi, input.value);
      hint.textContent = 'Access granted.';
      closeModal('authModal');
      await syncRemoteRecipes({ allowPrompt: false });
    } catch (error) {
      console.error('access code submit failed:', error);
      hint.textContent = error.message || 'That access code was not accepted.';
      input.select();
    }
  };
  modal.querySelector('#authSubmitBtn').addEventListener('click', submit);
  modal.querySelector('#authForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    await submit();
  });
  return modal;
}

function openAuthModal(message = 'Enter the family access code to load the shared library.') {
  const modal = ensureAuthModal();
  const hint = modal.querySelector('#authHint');
  const input = modal.querySelector('#authCode');
  hint.textContent = message;
  input.value = '';
  openModal('authModal');
}

async function syncRemoteRecipes({ allowPrompt = true } = {}) {
  if (!REMOTE_MODE) return;

  bootError = '';
  try {
    const state = await bootstrapRemoteRecipes({ api: remoteApi });
    const hydrated = hydrateRecipeState(state.recipes, state.tagRegistry);
    recipes = hydrated.recipes;
    tagRegistry = hydrated.tagRegistry;
    persist();
    render();

    if (!state.authenticated) {
      if (allowPrompt) openAuthModal();
      return;
    }
    if (state.offline) {
      showToast('Offline: showing last synced recipes.', 'warn');
    }
  } catch (error) {
    console.error('remote bootstrap failed:', error);
    const cached = loadRemoteRecipeCache();
    const hydrated = hydrateRecipeState(cached.recipes, cached.tagRegistry);
    recipes = hydrated.recipes;
    tagRegistry = hydrated.tagRegistry;
    if (cached.recipes.length) {
      showToast('Offline: showing last synced recipes.', 'warn');
    } else {
      bootError = 'Cannot load recipes. You’re offline and this device has never synced.';
    }
    render();
  }
}

function bounceActiveFilter(target) {
  const active = target;
  if (active) {
    active.classList.add('bounce');
    active.addEventListener('animationend', () => active.classList.remove('bounce'), { once:true });
  }
}

    selected: new Set(),
    editingSlug: '',
    colorSlug: '',
    prompt: null,
    filterMode,
  };
  renderTagManager();
  openModal('tagManagerModal');
}

document.getElementById('cuisineFilterBtns').addEventListener('click',e=>{

document.getElementById('tagFilterBtns').addEventListener('click', (event) => {
  const overflow = event.target.closest('[data-tag-overflow]');
  if (overflow) {
    openTagManager('unpinned');
    return;
  }
  const button = event.target.closest('[data-tag-filter]');

    ? filters.tags.filter((value) => value !== slug)
    : [...filters.tags, slug];

  render();
  bounceActiveFilter(document.querySelector(`[data-tag-filter="${CSS.escape(slug)}"]`));

function exportRecipes() {
  const payload = { schemaVersion: SCHEMA_VERSION, exportedAt: new Date().toISOString(), recipes, tagRegistry };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0,10);
  a.href = url; a.download = `recipe-journal-${today}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  prefs = recordExport(prefs);
  showToast(`Exported ${recipes.length} recipes ✓`, 'success');
}

function importRecipes(file) {
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const data = JSON.parse(String(reader.result));
      const validated = validateImport(data);
      if (!validated.ok) throw new Error(validated.error);
      const incoming = validated.recipes;
      const dropped = validated.dropped;
      const incomingRegistry = mergeTagRegistryMetadata({}, data?.tagRegistry || {});
      const version = data && data.schemaVersion;
      if (version && version > SCHEMA_VERSION) {
        showToast(`⚠️ This file is from a newer version (v${version}). Cannot import safely.`, 'error');
        return;
      }
      const droppedMsg = dropped ? ` Dropped ${dropped} invalid recipe${dropped === 1 ? '' : 's'}.` : '';
      const mode = confirm(`Found ${incoming.length} recipes in the file.\n\nOK  = Merge with your current library (duplicates by URL are skipped)\nCancel = Replace your entire library with the imported file`);
      if (REMOTE_MODE) {
        const replaceConfirmed = !mode
          ? confirm(`Replace your entire shared library with ${incoming.length} imported recipes? This cannot be undone.`)
          : false;
        if (!mode && !replaceConfirmed) return;
        const result = await importRemoteRecipes({
          api: remoteApi,
          mode: mode ? 'merge' : 'replace',
          payload: data,
          replaceConfirmed,
        });
        await syncRemoteRecipes({ allowPrompt: false });
        const summary = result?.data || result;
        showToast(
          `${mode ? 'Merged' : 'Replaced'} shared library.${summary?.duplicatesSkipped ? ` ${summary.duplicatesSkipped} duplicates skipped.` : ''}${droppedMsg}`
        );
        return;
      }
      if (mode) {
        const normalizedIncoming = withUniqueIds(recipes, incoming);
        // Merge: combine, then dedupe by url (case-insensitive) keeping existing records first.
        const byUrl = new Map();
        const noUrl = [];
        for (const r of recipes) {
          const k = (r && r.url ? String(r.url).trim().toLowerCase() : '');
          if (k) { if (!byUrl.has(k)) byUrl.set(k, r); } else { noUrl.push(r); }
        }
        let added = 0;
        for (const r of normalizedIncoming) {
          const k = (r && r.url ? String(r.url).trim().toLowerCase() : '');
          if (k && byUrl.has(k)) continue;
          if (k) byUrl.set(k, r); else noUrl.push(r);
          added++;
        }
        recipes = [...byUrl.values(), ...noUrl];
        tagRegistry = mergeTagRegistryMetadata(tagRegistry, incomingRegistry);
        persist(); render();
        showToast(`Merged ${added} new recipes (${incoming.length - added} duplicates skipped).${droppedMsg}`, 'success');
      } else {
        if (!confirm(`Replace your entire library with ${incoming.length} imported recipes? This cannot be undone (unless you exported a backup first).`)) return;
        recipes = withUniqueIds([], incoming);
        tagRegistry = incomingRegistry;
        persist(); render();
        showToast(`Replaced library with ${incoming.length} recipes.${droppedMsg}`, 'success');
      }
    } catch (e) {
      console.error('import failed:', e);
      showToast(`⚠️ Import failed: ${e.message || 'invalid file'}`, 'error');
    }
  };
  reader.readAsText(file);
}

    tagInputState.selected = tagInputState.selected.slice(0, -1);
    renderTagInput();
    announceTagInput(`${getTagLabel(removedSlug, tagRegistry)} removed.`);
    return;
  }
  if (event.key === 'ArrowDown' && tagInputState.suggestions.length) {
    event.preventDefault();
    tagInputState.activeIndex = (tagInputState.activeIndex + 1 + tagInputState.suggestions.length) % tagInputState.suggestions.length;
    renderTagInput();
    return;
  }
  if (event.key === 'ArrowUp' && tagInputState.suggestions.length) {
    event.preventDefault();
    tagInputState.activeIndex = (tagInputState.activeIndex - 1 + tagInputState.suggestions.length) % tagInputState.suggestions.length;
    renderTagInput();
    return;
  }
  if (event.key === 'Escape') {
    tagInputState.activeIndex = -1;
    tagInputState.suggestions = [];
    document.getElementById('tag-suggestions').classList.remove('show');
    document.getElementById('tagInputWrap').setAttribute('aria-expanded', 'false');
    document.getElementById('tagInputWrap').removeAttribute('aria-activedescendant');
    announceTagInput('Tag suggestions closed.');
    return;

    const active = tagInputState.suggestions[tagInputState.activeIndex] || tagInputState.suggestions[0];
    const query = cleanTagLabel(input.value);
    if (!query && !active) return;

document.getElementById('tagManagerModal').addEventListener('click', (event) => {
  const labelEdit = event.target.closest('[data-edit-label]');
  if (labelEdit) {
    tagManagerState.editingSlug = labelEdit.dataset.editLabel;
    renderTagManager();
    setTimeout(() => {
      const input = document.querySelector(`[data-tag-rename-input="${CSS.escape(labelEdit.dataset.editLabel)}"]`);
      input?.focus();
      input?.select();
    }, 0);
    return;
  }

  const colorEdit = event.target.closest('[data-edit-color]');
  if (colorEdit) {
    tagManagerState.colorSlug = tagManagerState.colorSlug === colorEdit.dataset.editColor ? '' : colorEdit.dataset.editColor;
    renderTagManager();
    return;
  }

  const setColor = event.target.closest('[data-set-color]');
  if (setColor) {
    setTagColor(setColor.dataset.setColor, setColor.dataset.colorValue || null);
    tagManagerState.colorSlug = '';
    persist();
    render();
    announceTagManager(`${getTagLabel(setColor.dataset.setColor, tagRegistry)} color updated.`);
    return;
  }

  const togglePin = event.target.closest('[data-toggle-pin]');
  if (togglePin) {
    const slug = togglePin.dataset.togglePin;
    setTagPinned([slug], !tagRegistry[slug]?.pinned);
    persist();
    render();
    announceTagManager(`${getTagLabel(slug, tagRegistry)} ${tagRegistry[slug]?.pinned ? 'pinned' : 'unpinned'}.`);
    return;
  }

  const rowMerge = event.target.closest('[data-row-merge]');
  if (rowMerge) {
    const slugs = [...new Set([...tagManagerState.selected, rowMerge.dataset.rowMerge])];
    tagManagerState.selected = new Set(slugs);
    if (slugs.length < 2) {
      renderTagManager();
      showToast('Select at least 2 tags to merge.', 'warn');
      return;
    }
    tagManagerState.prompt = { type: 'merge', slugs, keep: slugs[0] };
    renderTagManager();
    return;
  }

  const rowDelete = event.target.closest('[data-row-delete]');
  if (rowDelete) {
    tagManagerState.selected = new Set([rowDelete.dataset.rowDelete]);
    tagManagerState.prompt = { type: 'delete', slugs: [rowDelete.dataset.rowDelete] };
    renderTagManager();
    return;
  }

  const bulkPin = event.target.closest('[data-bulk-pin]');
  if (bulkPin) {
    setTagPinned([...tagManagerState.selected], true);
    persist();
    render();
    announceTagManager('Selected tags pinned.');
    return;
  }

  const bulkUnpin = event.target.closest('[data-bulk-unpin]');
  if (bulkUnpin) {
    setTagPinned([...tagManagerState.selected], false);
    persist();
    render();
    announceTagManager('Selected tags unpinned.');
    return;
  }

  const bulkMerge = event.target.closest('[data-bulk-merge]');
  if (bulkMerge) {
    const slugs = [...tagManagerState.selected];
    if (slugs.length < 2) return;
    tagManagerState.prompt = { type: 'merge', slugs, keep: slugs[0] };
    renderTagManager();
    return;
  }

  const bulkDelete = event.target.closest('[data-bulk-delete]');
  if (bulkDelete) {
    const slugs = [...tagManagerState.selected];
    if (!slugs.length) return;
    tagManagerState.prompt = { type: 'delete', slugs };
    renderTagManager();
    return;
  }

  const promptCancel = event.target.closest('[data-prompt-cancel]');
  if (promptCancel) {
    tagManagerState.prompt = null;
    renderTagManager();
    announceTagManager('Tag action cancelled.');
    return;
  }

  const promptMerge = event.target.closest('[data-prompt-confirm-merge]');
  if (promptMerge && tagManagerState.prompt?.type === 'merge') {
    mergeTags(tagManagerState.prompt.slugs, tagManagerState.prompt.keep, getTagLabel(tagManagerState.prompt.keep, tagRegistry));
    const winnerLabel = getTagLabel(tagManagerState.prompt.keep, tagRegistry);
    tagManagerState.selected = new Set([tagManagerState.prompt.keep]);
    tagManagerState.prompt = null;
    tagManagerState.colorSlug = '';
    tagManagerState.editingSlug = '';
    persist();
    render();
    announceTagManager(`Tags merged into ${winnerLabel}.`);
    showToast('Tags merged ✓', 'success');
    return;
  }

  const promptDelete = event.target.closest('[data-prompt-confirm-delete]');
  if (promptDelete && tagManagerState.prompt?.type === 'delete') {
    const snapshot = {
      recipes: recipes.map((recipe) => ({ ...recipe, tags: [...(recipe.tags || [])] })),
      tagRegistry: JSON.parse(JSON.stringify(tagRegistry)),
    };
    deleteTags(tagManagerState.prompt.slugs);
    tagManagerState.selected = new Set();
    tagManagerState.prompt = null;
    tagManagerState.colorSlug = '';
    tagManagerState.editingSlug = '';
    persist();
    render();
    announceTagManager('Tags deleted. Undo available for 6 seconds.');
    showUndoToast('Tags deleted', () => {
      recipes = snapshot.recipes;
      tagRegistry = snapshot.tagRegistry;
      persist();
      render();
      announceTagManager('Deleted tags restored.');
      showToast('Tags restored ✓', 'success');
    });
    return;
  }

  const managerFilter = event.target.closest('[data-filter-tag-from-manager]');
  if (managerFilter) {
    applyFilters({ tags: [managerFilter.dataset.filterTagFromManager] });
    closeModal('tagManagerModal');
    render();
  }
});

function del(id) {
  const idx = recipes.findIndex(x=>sameId(x.id, id));
  if (idx === -1) return;
  const removed = recipes[idx];
  if (REMOTE_MODE) {
    deleteRemoteRecipe({ api: remoteApi, recipe: removed })
      .then(() => {
        recipes.splice(idx, 1);
        prefs = recordEdit(prefs);
        persist(); render();
        showToast(`"${removed.name}" deleted`);
      })
      .catch((error) => {
        console.error('remote delete failed:', error);
        showToast(`⚠️ Delete failed: ${error.message || 'server error'}`, 'error');
      });
    return;
  }
  // Animate the card out before removing from data
  const cardEl = document.querySelector(`.card[data-id="${CSS.escape(String(id))}"]`);
  const doRemove = () => {
    recipes.splice(idx, 1);
    prefs = recordEdit(prefs);
    persist(); render();
    showUndoToast(`"${removed.name}" deleted`, () => {
      recipes.splice(idx, 0, removed);
      persist(); render();
      // Flash the restored card
      requestAnimationFrame(() => {
        const restored = document.querySelector(`.card[data-id="${CSS.escape(String(id))}"]`);
        if (restored) {
          restored.classList.add('restored');
          setTimeout(() => restored.classList.remove('restored'), 600);
        }
      });
      showToast('Recipe restored ✓', 'success');
    });
  };
  if (cardEl) {
    cardEl.classList.add('removing');
    cardEl.addEventListener('animationend', doRemove, { once: true });
  } else {
    doRemove();
  }
}

function openModal(id) {
  lastFocusedBeforeModal = document.activeElement;
  const el = document.getElementById(id);
  el.classList.add('open');
  // Move focus to the first focusable element inside the modal.
  const firstFocusable = el.querySelector('input,select,textarea,button,[tabindex]:not([tabindex="-1"])');
  if (firstFocusable) setTimeout(() => firstFocusable.focus(), 50);
}
function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('open');
  if (id === 'viewModal') {
    setTimeout(() => window.scrollTo({ top: scrollBeforeModal, behavior: 'auto' }), 50);
  }
  // Restore focus to whatever opened the modal.
  if (lastFocusedBeforeModal && document.contains(lastFocusedBeforeModal)) {
    try { lastFocusedBeforeModal.focus(); } catch {}
  }
}
document.querySelectorAll('.modal-overlay').forEach(el=>el.addEventListener('click',e=>{ if(e.target===el) closeModal(el.id); }));
document.addEventListener('keydown',e=>{
  if(e.key!=='Escape') return;
  if (document.getElementById('tagManagerModal')?.classList.contains('open') && tagManagerState.prompt) {
    tagManagerState.prompt = null;
    renderTagManager();
    announceTagManager('Tag action cancelled.');
    return;
  }
  const openOverlay = document.querySelector('.modal-overlay.open');
  if (openOverlay) closeModal(openOverlay.id);
});

// Focus trap for any .modal-overlay.open
document.addEventListener('keydown', (e) => {
  if (e.key !== 'Tab') return;
  const openOverlay = document.querySelector('.modal-overlay.open');
  if (!openOverlay) return;
  const focusScope = openOverlay.querySelector('.tag-manager-prompt.show[role="dialog"]') || openOverlay;
  const focusables = focusScope.querySelectorAll('input,select,textarea,button:not([disabled]),a[href],[tabindex]:not([tabindex="-1"])');
  if (!focusables.length) return;
  const first = focusables[0], last = focusables[focusables.length - 1];
  if (e.shiftKey && document.activeElement === first) { last.focus(); e.preventDefault(); }
  else if (!e.shiftKey && document.activeElement === last) { first.focus(); e.preventDefault(); }
});

function hideToast() {
  document.getElementById('toast').classList.remove('show');
}

function resetToastTimer(timeout = 3000) {
  clearTimeout(toastTimer);
  if (!timeout) return;
  toastTimer = setTimeout(() => hideToast(), timeout);
}

function showToast(msg, type = '') {
  const t=document.getElementById('toast');
  t.className = 'toast'; // reset all variant classes
  t.textContent=msg;
  if (type) t.classList.add('toast-' + type);
  t.classList.add('show');
  if (type === 'error') {
    t.classList.add('shake');
    t.addEventListener('animationend', () => t.classList.remove('shake'), { once: true });
  }
  resetToastTimer(3000);
}

function showActionToast(msg, label, onAction, timeout = 12000) {
  const t = document.getElementById('toast');
  t.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'toast-action';
  const text = document.createElement('span');
  text.textContent = msg;
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = label;
  btn.addEventListener('click', async () => {
    clearTimeout(toastTimer);
    await onAction();
    if (t.firstChild === wrap) hideToast();
  });
  wrap.appendChild(text);
  wrap.appendChild(btn);
  t.appendChild(wrap);
  t.classList.add('show');
  resetToastTimer(timeout);
}

function showMultiActionToast(msg, actions, timeout = 12000) {
  const t = document.getElementById('toast');
  t.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'toast-action';
  const text = document.createElement('span');
  text.textContent = msg;
  wrap.appendChild(text);
  actions.forEach(({ label, onAction }) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.textContent = label;
    btn.addEventListener('click', async () => {
      clearTimeout(toastTimer);
      await onAction();
      if (t.firstChild === wrap) hideToast();
    });
    wrap.appendChild(btn);
  });
  t.appendChild(wrap);
  t.classList.add('show');
  resetToastTimer(timeout);
}

// Undo toast: shown on delete, 6s to change your mind.
function showUndoToast(msg, onUndo) {
  const t = document.getElementById('toast');
  t.innerHTML = '';
  const wrap = document.createElement('div');
  wrap.className = 'toast-undo';
  const text = document.createElement('span');
  text.textContent = msg;
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = 'Undo';
  btn.addEventListener('click', () => {
    clearTimeout(toastTimer);
    hideToast();
    onUndo();
  });
  wrap.appendChild(text); wrap.appendChild(btn);
  t.appendChild(wrap);
  // Progress bar showing time remaining
  const bar = document.createElement('div');
  bar.className = 'undo-bar';
  t.style.position = 'relative';
  t.appendChild(bar);
  requestAnimationFrame(() => bar.classList.add('running'));
  t.className = 'toast toast-warn';
  t.classList.add('show');
  resetToastTimer(6000);
}

function promptForUpdate(worker) {
  if (!worker || pendingUpdateWorker === worker) return;
  pendingUpdateWorker = worker;
  showActionToast('New version available.', 'Refresh', async () => {
    shouldReloadForUpdate = true;
    worker.postMessage({ type: 'SKIP_WAITING' });
  }, 15000);
}

async function registerServiceWorker() {
  if (!('serviceWorker' in navigator)) return;

  // Escape hatch: append ?sw=off to unregister a broken worker.
  if (new URLSearchParams(location.search).has('sw', 'off')) {
    const regs = await navigator.serviceWorker.getRegistrations();
    await Promise.all(regs.map(r => r.unregister()));
    const keys = await caches.keys();
    await Promise.all(keys.filter(k => k.startsWith('recipe-journal-')).map(k => caches.delete(k)));
    showToast('Service worker unregistered. Reload without ?sw=off to re-enable.', 'warn');
    return;
  }

  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!shouldReloadForUpdate || swReloaded) return;
    swReloaded = true;
    window.location.reload();
  });

  window.addEventListener('beforeinstallprompt', (event) => {
    event.preventDefault();
    deferredInstallPrompt = event;
    showActionToast('Install Recipe Journal for offline use?', 'Install', async () => {
      if (!deferredInstallPrompt) return;
      const promptEvent = deferredInstallPrompt;
      deferredInstallPrompt = null;
      await promptEvent.prompt();
      const choice = await promptEvent.userChoice;
      if (choice?.outcome === 'accepted') {
        showToast('Recipe Journal installed ✓', 'success');
      }
    }, 15000);
  });

  try {
    const registration = await navigator.serviceWorker.register('./service-worker.js');
    if (registration.waiting && navigator.serviceWorker.controller) {
      promptForUpdate(registration.waiting);
    }

    registration.addEventListener('updatefound', () => {
      const worker = registration.installing;
      if (!worker) return;
      worker.addEventListener('statechange', () => {
        if (worker.state === 'installed' && navigator.serviceWorker.controller) {
          promptForUpdate(worker);
        }
      });
    });
  } catch (e) {
    console.error('service worker registration failed:', e);
  }
}

// A11y post-pass: wire `<label>` to its form-group's first input via `for`,
// label icon-only .close-btn buttons, and label .icon-btn buttons inside cards.
(function a11yPass() {
  document.querySelectorAll('.form-group').forEach(group => {
    const label = group.querySelector('label');
    const input = group.querySelector('input,select,textarea');
    if (label && input && input.id && !label.getAttribute('for')) {
      label.setAttribute('for', input.id);
    }
  });
  document.querySelectorAll('.close-btn').forEach(b => {
    if (!b.getAttribute('aria-label')) b.setAttribute('aria-label', 'Close');
  });
  document.querySelectorAll('.modal').forEach(m => {
    if (!m.getAttribute('role')) m.setAttribute('role', 'dialog');
    if (!m.getAttribute('aria-modal')) m.setAttribute('aria-modal', 'true');
  });
  document.querySelectorAll('.star-option').forEach(s => {
    s.setAttribute('role', 'button');
    s.setAttribute('tabindex', '0');
    const v = s.dataset.v;
    s.setAttribute('aria-label', `Rate ${v} star${v === '1' ? '' : 's'}`);
    s.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); s.click(); }
    });
  });
})();

render();
if (!REMOTE_MODE && initialSchemaVersion < SCHEMA_VERSION) {
  migrateSeedImagesIfNeeded();
}
if (REMOTE_MODE) {
  syncRemoteRecipes();
}
registerServiceWorker();
</script>
