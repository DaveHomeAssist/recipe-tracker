ade and let any excess drip off. Place the chicken breasts over the hotter side of the grill and cook for 2 to 3 minutes per side to develop grill marks and color.\nFinish cooking over lower heat: Move the chicken to the cooler side of the grill and continue cooking for 4 to 8 minutes more, or until the thickest part reaches 165°F.\nRest and serve: Transfer the chicken to a clean plate and let it rest for 5 minutes before slicing and serving.", "preptime": "10 min", "cooktime": "20 min", "servings": "6", "tags": "Sauce, Chicken Marinade, Citrus Chicken Marinade Recipe, Citrus Marinade, Citrus Marinade Recipe, Easy Chicken Marinade", "notes": "This easy citrus chicken marinade is made with fresh orange, lemon, and lime juice, garlic, herbs, and simple pantry seasonings for a bright, flavorful marinade that works especially well with chicken breasts. It is perfect for grilling, baking, pan searing, or air frying.", "url": "https://theforkedspoon.com/citrus-chicken-marinade-recipe/", "date": "", "rating": 0}, {"id": 31, "name": "Recipes and Cooking Guides From The New York Times", "cuisine": "Other", "source": "cooking.nytimes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "NYT Cooking is the digital source for thousands of the best recipes from The New York Times along with how-to guides for home cooks at every skill level. Discover new recipes that are tried, tested, and truly delicious with NYT Cooking.", "url": "https://cooking.nytimes.com/?action=click&module=nav&region=logo&pgType=recipe-page", "date": "", "rating": 0}, {"id": 32, "name": "Fresh Corn Salsa", "cuisine": "Mexican", "source": "cookieandkate.com", "location": "", "ingredients": "3 cups raw corn kernels* (from about 4 cobs of shucked sweet corn)\n1 cup finely chopped red onion (about &frac12; medium onion)\nOptional: 1 diced ripe avocado\n&frac12; cup finely chopped fresh cilantro (about 1 bunch)\n1 to 2 medium jalapeños, finely chopped (use 1 for mild-to-medium salsa or 2 for more spicy salsa)\n&frac14; cup lime juice (about 2 limes), to taste\n1 tablespoon white wine vinegar\n&frac14; teaspoon chili powder\n&frac14; teaspoon ground cumin\n&frac12; teaspoon fine salt", "instructions": "In a medium serving bowl, combine all of the ingredients. Stir to combine.\nAdjust to taste, if necessary: For more zing, add about 1 teaspoon more vinegar or 1 tablespoon more lime juice. For more flavor overall, add another pinch of salt. For more spice, add more jalapeño.\nFor best flavor, allow the salsa to marinate for 20 minutes before serving. This salsa keeps well in the refrigerator, covered, for 3 to 4 days.", "preptime": "20 min", "cooktime": "", "servings": "8", "tags": "Sauce, Corn Salsa", "notes": "This fresh corn salsa recipe is the perfect summer appetizer! It's made simply with sweet corn, onion, jalapeño, cilantro, lime and a dash of chili powder (avocado is optional). Recipe yields about 4 cups salsa.", "url": "https://cookieandkate.com/fresh-corn-salsa-recipe/", "date": "", "rating": 0}, {"id": 33, "name": "Emeril's Crab Cakes", "cuisine": "Other", "source": "emerils.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "Dessert", "notes": "", "url": "https://www.emerils.com/126906/emerils-crab-cakes", "date": "", "rating": 0}, {"id": 34, "name": "Creamy Beef and Shells", "cuisine": "Italian", "source": "damndelicious.net", "location": "", "ingredients": "8 ounces medium pasta shells\n1 tablespoon olive oil\n1 pound ground beef\n1/2 medium sweet onion (diced)\n2 cloves garlic (minced)\n1 1/2 teaspoons Italian seasoning\n2 tablespoons all-purpose flour\n2 cups beef stock\n1 (15-ounce) can tomato sauce\n3/4 cup heavy cream\nKosher salt and freshly ground black pepper (to taste)\n6 ounces shredded extra-sharp cheddar cheese (about 1 1/2 cups)", "instructions": "In a large pot of boiling salted water, cook pasta according to package instructions; drain well.\nHeat olive oil in a large cast iron skillet over medium high heat. Add ground beef and cook until browned, about 3-5 minutes, making sure to crumble the beef as it cooks; drain excess fat. Set aside.\nAdd onion to the skillet, and cook, stirring frequently, until translucent, about 2-3 minutes.\nStir in garlic and Italian seasoning until fragrant, about 1 minute.\nWhisk in flour until lightly browned, about 1 minute.\nGradually whisk in beef stock and tomato sauce. Bring to a boil; reduce heat and simmer, stirring occasionally, until reduced and slightly thickened, about 6-8 minutes.\nStir in pasta, beef and heavy cream until heated through, about 1-2 minutes; season with salt and pepper, to taste. Stir in cheese until melted, about 2 minutes.\nServe immediately.", "preptime": "15 min", "cooktime": "25 min", "servings": "4", "tags": "", "notes": "A quick/easy ground beef recipe, this is a pasta dish that will be on your dinner table all week long! So creamy and so comforting!", "url": "https://damndelicious.net/2018/09/16/creamy-beef-and-shells/", "date": "", "rating": 0}, {"id": 35, "name": "Creamy Chicken Pasta", "cuisine": "American", "source": "themediterraneandish.com", "location": "", "ingredients": "8 ounces penne pasta ((or pasta of your choice))\nKosher salt\n1 pound boneless skinless chicken breast\n1 teaspoon ground black pepper\n2 teaspoons dried oregano\nExtra virgin olive oil\n3 large garlic cloves, (minced)\n1/4 cup chopped sun-dried tomatoes\n1 cup cherry or grape tomatoes\n1 15-ounce can artichoke hearts, drained\n1 cup whole milk ((or a creamy non-dairy alternative such as cashew cream), at room temperature)\n2 tablespoons all purpose flour\n1 cup finely grated Parmesan\n2 packed cups baby spinach\n1/4 cup chopped fresh parsley, (for garnish)", "instructions": "Cook the pasta. Boil a large pot of water and salt it well. Add the pasta and cook to al dente according to the package instructions. Reserve about 1/2 cup of the cooking water before draining the pasta.\nMeanwhile, prep the chicken. Pat the chicken dry, then slice into bite-size pieces or strips. Season all over with the pepper, dried oregano, and a good dash of salt.\nSear the chicken. In a large pan, heat about 2 tablespoons extra virgin olive oil over medium-high until shimmering. Add the chicken and cook, tossing occasionally until the chicken pieces are cooked through (they should have a delicious golden-brown hue), about 7 to 8 minutes.\nFlavor the chicken. Add the garlic and sun-dried tomatoes to the pan with the chicken and stir it around for about 30 seconds or so, then add the grape tomatoes and artichoke hearts. Toss to combine and turn the heat to medium-low.\nMake the creamy pasta sauce. In a small bowl, whisk the milk, flour, and Parmesan cheese. Pour the mixture into the pan and add the baby spinach. Add a little bit of the pasta cooking water (just a couple tablespoons or so) and give it a good stir, which releases the starch and makes the sauce creamy.\nFinish and serve. Add the pasta and mix to combine. Sprinkle on the parsley and serve.", "preptime": "5 min", "cooktime": "10 min", "servings": "5", "tags": "Main, Chicken Recipe, Pasta Recipe", "notes": "You don't need heavy cream for a silky pasta sauce! This sauce relies on whole milk, parmesan cheese, and a bit of pasta cooking water. A couple tablespoons of flour help to thicken the lighter sauce. Serve with a parmesan lettuce salad or garlic bread and dinner is done!", "url": "https://www.themediterraneandish.com/chicken-pasta-recipe/#wprm-recipe-container-55510", "date": "", "rating": 0}, {"id": 36, "name": "Cream of Chicken Soup", "cuisine": "Other", "source": "foodnetwork.com", "location": "", "ingredients": "1/2 cup unsalted butter\n1 medium Spanish onion, chopped\n2 stalks celery (with leaves), chopped\n3 medium carrots, chopped\n1/2 cup plus 1 tablespoon flour\n7 cups chicken broth, homemade or low-sodium canned\n3 sprigs parsley\n3 sprigs fresh thyme\n1 bay leaf\n2 3/4 cups cooked, diced chicken\n1/2 cup heavy cream\n2 1/2 teaspoons dry sherry\n1 tablespoon kosher salt\nFreshly ground black pepper to taste\n2 tablespoons chopped flat-leaf parsley", "instructions": "Melt the butter in a large soup pot over medium heat. Add the onion, celery, and carrots and cook, covered, stirring occasionally, until soft, about 12 minutes. Add the flour and cook, stirring with a wooden spoon, for 2 minutes more.\nPour in the broth and bring to a boil while whisking constantly. Tie the parsley sprigs, thyme, and bay leaf together with a piece of kitchen twine and add to the soup. Lower the heat and simmer for 15 minutes.\nStir in the chicken and bring to a boil. Remove from the heat.\nWhisk the heavy cream, sherry, and salt into the soup and season with pepper to taste. Remove and discard the herb bundle. Divide among soup bowls, sprinkle the top of each soup with the chopped parsley and serve immediately.", "preptime": "", "cooktime": "", "servings": "4 to 6 first-course servings", "tags": "Soup, Poultry, Dairy Recipes, Celery, Carrot Soup, Carrot Recipes", "notes": "Learn to make a perfect bowl of chicken soup with our easy step-by-step recipe and pro tips. Plus, the delicious dunkers that take it to the next level.", "url": "https://www.foodnetwork.com/recipes/food-network-kitchen/cream-of-chicken-soup-recipe-2011701", "date": "", "rating": 0}, {"id": 37, "name": "Panera Bread Creamy Tomato Soup", "cuisine": "American", "source": "sweetandsavorymeals.com", "location": "", "ingredients": "2 tablespoons olive oil\n6 garlic cloves (minced)\n1 large yellow onion (diced)\n2 cans San Marzano peeled tomatoes ((28 oz can sizes) crushed or blended)\n1 cup vegetable stock\n2 tablespoons sugar\n1 teaspoon dried oregano\n1 teaspoon dried basil\n1 cup half and half (or heavy cream)\nkosher salt and freshly ground black pepper (to taste)", "instructions": "In a heavy-bottomed pot or dutch oven, heat olive oil over medium-high heat.\nAdd diced onion and garlic. Cook, stirring as needed, until onion is translucent - about 5-8 minutes.\nAdd the San Marzano peeled tomatoes, including the juice, vegetable stock, dried oregano, dried basil, and sugar. Season with salt and pepper and stir to combine. Bring to a low simmer. Cook uncovered, for 12 minutes or until it has thickened. Stir occasionally.\nAdd the half-and-half or heavy cream and season to taste with salt and pepper.\nUsing an immersion blender (or carefully transfer soup to a blender), puree soup until there are no large chunks left.\nServe immediately garnished with croutons and french bread on the side.\nStore in an airtight container in the fridge for up to 5 days or you can freeze the soup for up to 3 months.", "preptime": "10 min", "cooktime": "30 min", "servings": "6", "tags": "Baking, Panera Bread Creamy Tomato Soup", "notes": "Panera Bread Creamy Tomato Soup is a renowned classic favorite at the familiar restaurant but making it yourself at home is easy and even more delicious. Full of rich and tangy tomato flavor with hints of onion, garlic, basil, and oregano. And it is so quick and easy to make, you can do it in less than an hour.", "url": "https://sweetandsavorymeals.com/panera-bread-creamy-tomato-soup/", "date": "", "rating": 0}, {"id": 38, "name": "Crispy Garlic Boneless Chicken Thighs (Stove Top)", "cuisine": "American", "source": "cafedelites.com", "location": "", "ingredients": "1 1/2 pounds boneless skinless chicken thighs (around 6-8 fillets)\n1 teaspoon onion powder\n1 teaspoon garlic powder\n1/2 teaspoon dried thyme (optional)\n1/2 teaspoon dried rosemary (optional)\n1/2 teaspoon salt\n1/4 teaspoon cracked black pepper\n1 pinch cayenne pepper (or to taste)\n1 tablespoon olive oil (for cooking)\n2 tablespoons butter\n4 cloves garlic (minced, or 1 tablespoon minced garlic)\n1/4 cup dry white wine (optional)\n1/2 cup chicken broth (or chicken stock)", "instructions": "Pat chicken thighs dry with paper towel and trim off excess fat. Combine the onion powder, garlic powder, dried herbs, salt and pepper/s. Coat the chicken evenly with the combined seasoning.\nHeat oil a large pan or skillet over medium heat and sear chicken for 5 minutes until golden and crispy. Flip and cook for a further 2 minutes. Move chicken to the sides of the pan and add butter to the middle. Let melt, then add the garlic into the butter. Sauté until fragrant, about 30 seconds.\nIncrease heat to medium-high. Add the wine and chicken broth (or stock). Scrape up any browned bits from the bottom of the pan with the end of a wooden spoon. Stir chicken around; let liquid simmer until reduced to half, about 2 minutes.\nWhen chicken is cooked through, remove from heat. Taste test and season with extra salt and pepper, if needed. Serve immediately with fresh, chopped parsley or herbs of your choice, if desired.", "preptime": "5 min", "cooktime": "12 min", "servings": "6", "tags": "Dessert, Chicken Thighs, Cripsy Garlic Boneless Chicken Thighs", "notes": "Golden seared boneless chicken thighs in a delicious, buttery garlic sauce is THE weeknight dinner everyone is raving about! Ready in under 20 minutes, serve over rice, pasta, mashed potatoes OR lower carb options like mashed cauliflower or zucchini noodles!", "url": "https://cafedelites.com/crispy-boneless-chicken-thighs/", "date": "", "rating": 0}, {"id": 39, "name": "Chicken Croquettes", "cuisine": "Other", "source": "foodandwine.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.foodandwine.com/recipes/chicken-croquettes", "date": "", "rating": 0}, {"id": 40, "name": "Traditional Cubano Sandwich", "cuisine": "Other", "source": "thespruceeats.com", "location": "", "ingredients": "1 loaf Cuban bread (French or Italian bread can be substituted)\nGarnish: yellow mustard\nGarnish: mayonnaise\n1 pound ham (cooked, sliced)\n1 pound pork (roasted, sliced)\n1/2 pound Swiss cheese (sliced)\n6 dill pickles (sliced)\nCooking spray", "instructions": "Gather the ingredients.\nHeat a griddle or large cast-iron or other heavy-duty pan to medium heat. Cut 1 loaf of Cuban bread into quarters and slice each quarter in half horizontally. If using individual loaves, slice them in half lengthwise.\nSpread yellow mustard and mayonnaise on the bread. Use one condiment per slice of bread, but be sure each sandwich has both.\nAssemble each sandwich by layering sliced ham , sliced pork , sliced Swiss cheese , and sliced dill pickles .\nLightly coat the cooking surface of a griddle or skillet with cooking spray. Heat the pan about 1 minute. Place the sandwiches on the hot surface.\nPut a clean, heavy skillet on top of the sandwich to flatten it. The goal is to press the bread down to about 1/3 of its original size. Leave the skillet on top of the sandwich and grill for 1 to 2 minutes. If you don't have a heavy skillet, use a brick wrapped in foil.\nLift the heavy skillet, turn the sandwich over and grill on the other side. Place the skillet back on top. For the sandwich to be ready, the cheese should be melted and the bread golden brown. Slice each sandwich in half diagonally and serve.", "preptime": "15 min", "cooktime": "16 min", "servings": "4", "tags": "Snack, Pork", "notes": "This recipe for a Cuban sandwich, or Cubano, is a delicious grilled sandwich made with ham, pork, Swiss cheese, pickles, mustard, and Cuban bread.", "url": "https://www.thespruceeats.com/traditional-cuban-sandwich-2137863", "date": "", "rating": 0}, {"id": 41, "name": "Drop Biscuits", "cuisine": "American", "source": "cooking.nytimes.com", "location": "", "ingredients": "2 cups/255 grams all-purpose flour\n1 tablespoon baking powder\n1 teaspoon kosher salt\n1 teaspoon granulated sugar\n10 tablespoons/141 grams cold unsalted butter, cut into cubes\n3/4 cup whole milk, plus 1 to 2 tablespoons, if needed", "instructions": "Heat the oven to 400 degrees. Line a rimmed baking sheet with parchment paper. In a large bowl, whisk together flour, baking powder, salt and sugar. Using a pastry blender or two knives, cut the butter into the flour mixture until it is the texture of coarse meal with some pea-size pieces.\nUsing a fork, stir in the milk until just evenly moistened, adding up to 2 more tablespoons, if necessary, but stopping before the dough gets too wet. Scoop the dough into 8 rough mounds (about 1/3-cup each) and place them on the prepared sheets. Bake the biscuits until golden brown and a toothpick inserted into the center comes out with moist crumbs attached, about 20 minutes. Serve warm or at room temperature.", "preptime": "", "cooktime": "", "servings": "8 biscuits", "tags": "Breakfast, Biscuit, Budget, Father’S Day, Mother’S Day, Thanksgiving", "notes": "Drop biscuits are heavenly, and considering how little work they are to put together, they're also a real kitchen miracle. A few pantry staples and a hot oven are all you need for crunchy golden biscuits with soft interiors. They are excellent on their own, but a bit of butter and jam doesn't hurt either. Once you’ve nailed the basic version, try stirring in some cracked black pepper and Parmigiano-Reggiano, finely chopped tender herbs or chocolate chips.", "url": "https://cooking.nytimes.com/recipes/1019276-drop-biscuits", "date": "", "rating": 0}, {"id": 42, "name": "How to make empanada dough for baking", "cuisine": "Mexican", "source": "laylita.com", "location": "", "ingredients": "3 cups all-purpose flour\n¼ to 1/2 teaspoon salt\n6 oz unsalted butter ((1 stick of butter = 4 oz))\n1 egg\n1/4 cup to 1/2 cup of water or milk (adjust as needed to obtain a soft and smooth dough)", "instructions": "— Making homemade empanada dough: —\nMix the flour and salt in a food processor.\nAdd the butter and pulse\nAdd the egg and the water or milk (in small increments) and continue pulsing until a clumpy dough forms.\nTo make the empanada dough by hand, follow the same instruction but use your hands to mix the ingredients together.\nSplit the dough into 2 large ball, flatten slightly into the shape of disks. The dough can be used immediately or refrigerated until ready to use (1-2 days max).\nRoll out the dough into a thin sheet and cut out round disc shapes for empanadas (use round molds or a small plate). You can also make small individual balls with the dough and roll out each individual ball to a round shape (doesn't need to be perfectly round) - if you have a tortilla press you can use it to flatten the dough balls.\nUse immediately, or store in the refrigerator/freezer to use later.\n— Assembling and baking the empanadas: —\nTo assemble the empanadas or turnovers, place a spoonful of the filling on the middle of each empanada disc. The amount of filling will vary based on the size of the empanada, but in general, it’s easier to seal an empanada that isn’t overstuffed. Also, the more you make empanadas, the easier it becomes to stuff them to the max and still seal them properly.\nTo seal the empanadas, fold the disc and seal the edges by pressing the dough with your fingers. If you’re having a hard time sealing the edges, you can use brush the inside edges with egg white, it will act as a glue for the empanadas. You can also use a fork to help seal the edges, just press the top of the fork against the edges. To the repulgue or churito, the curl type seal, use your fingers to twist the curl the edges. There are also empanada molds that you can buy and will help seal the empanadas.\nFor best results, I recommend refrigerating for at least 30 minutes the empanadas before baking – this also helps them seal better and prevents the filling from leaking out.\nIf you want your empanadas to have a nice golden finish, then you can brush them with egg wash (a whole egg whisked or egg yolk plus a few drops of water whisked).\nBake the empanadas in a pre-heated oven. I usually bake them at 375F-400F, the temperature will vary based on the oven and the size of the empanadas. I bake the smaller sized empanadas at 375F. The baking time also varies (again based on the oven and size), but it’s in the range of 18-25 minutes – the empanadas will be ready once they are golden.", "preptime": "40 min", "cooktime": "20 min", "servings": "12", "tags": "Baking, Easy Empanada Recipe, Empanada Dough For Baking, Homemade Empanada Dough", "notes": "Easy recipe with step-by-step photos and video for homemade empanada dough.", "url": "https://www.laylita.com/recipes/how-to-make-empanada-dough/", "date": "", "rating": 0}, {"id": 43, "name": "Superb English Plum Pudding", "cuisine": "Other", "source": "epicurious.com", "location": "", "ingredients": "1 lb. raisins\n1 lb. golden raisins\n½ lb. dried currants\n1 cup thinly sliced candied citron\n1 cup chopped candied orange peel\n1 tsp. ground cinnamon\n½ tsp. mace\n½ tsp. freshly grated nutmeg\n¼ tsp. ground cloves\n¼ tsp. allspice\n¼ tsp. freshly ground black pepper\n1 lb. vegetable shortening, frozen, or shredded suet, finely chopped\n1¼ cups cognac or brandy\nUnsalted butter, softened, for pans\n1 cup whole milk\n1 cup sherry or port\n1¼ lb. fresh breadcrumbs\n12 large eggs, room temperature\n1 cup (200 g) sugar, plus more for serving\n1 tsp. Diamond Crystal or ½ tsp. Morton kosher salt\n1 tsp. cognac or brandy, divided, plus more for serving\ncrème anglaise, to serve\n4 (1½ qt.) steamed pudding molds", "instructions": "Combine 1 lb. raisins, 1 lb. golden raisins, ½ lb. dried currants, 1 cup thinly sliced candied citron, 1 cup chopped candied orange peel, 1 tsp. ground cinnamon, ½ tsp. mace, ½ tsp. freshly grated nutmeg, ¼ tsp. ground cloves, ¼ tsp. allspice, ¼ tsp. freshly ground black pepper. If using shortening, grate 1 lb. vegetable shortening, frozen, on the large holes of a box grater. Add shortening or 1 lb. shredded suet, finely chopped, to fruit mixture and toss to combine. Add 1¼ cups cognac or brandy, cover tightly, and refrigerate for 4 days, tossing mixture once or twice per day. Do Ahead: Mixture can be made 3 months ahead; keep chilled.\nButter four 1½-qt. steamed pudding molds or heatproof bowls. Ready a steamer basket or large pot with water to come ½ way up the sides of molds and bring to a boil. Reduce heat to maintain steady steam.\nBring 1 cup whole milk just to the point of boiling over medium heat (watch closely). Transfer to a medium bowl and add 1 cup sherry or port and 1¼ lb. fresh breadcrumbs.\nWhisk 12 large eggs, room temperature, with 1 cup (200 g) sugar in a large bowl until no streaks of egg remain. Add the fruit mixture, breadcrumb mixture, and 1 tsp. Diamond Crystal or ½ tsp. Morton kosher salt and mix thoroughly. Transfer the pudding to prepared pans, filling each about ⅔ full. Cover each pan with a large square of aluminum foil and secure foil with kitchen twine. Steam for 6–7 hours, checking periodically to make sure the water hasn’t boiled out and adding more as necessary.\nPlace rack in the center of oven; preheat oven to 250°. When cool enough to handle, uncover puddings and transfer to oven; bake for 30 minutes. Add ¼ tsp. cognac or brandy to each pudding, cover with foil and keep in a cool, dark place for at least 3 weeks and up to 1 year.\nTo serve, steam puddings a second time for 2–3 hours. Place a platter over mold and invert; remove mold. If flambéing: Warm a few tablespoons cognac or brandy over low heat and sprinkle puddings with a little sugar. Drizzle warm cognac over puddings, ignite with a long match and bring to the table. Serve with crème anglaise. Editor’s note: This recipe was first printed in the December 1963 issue of ‘Gourmet’ as ‘Old-English Plum Pudding’ and has been updated for style. Head this way for more of our best Christmas desserts →", "preptime": "", "cooktime": "", "servings": "Each pudding serves 12", "tags": "Dessert, British, English, Christmas, Cognac, Dried Fruit", "notes": "This plum pudding recipe from food legend James Beard is ideal for Christmas dinner. Serve it instead of fruitcake—or anytime you crave classic British cooking.", "url": "https://www.epicurious.com/recipes/food/views/superb-english-plum-pudding-20010", "date": "", "rating": 0}, {"id": 44, "name": "Lebanese Fattoush Salad", "cuisine": "Mediterranean", "source": "feelgoodfoodie.net", "location": "", "ingredients": "1 large head romaine lettuce (chopped)\n1 large vine-ripe tomato (diced)\n2-3 Persian cucumbers (quartered)\n½ large green pepper (chopped)\n5 radishes (diced)\n2 green onions (sliced)\n¼ cup Chopped parsley\n3 tablespoon olive oil\n2 tablespoon lemon juice\n2 garlic cloves (pressed or grated)\n1 teaspoon sumac\n1 teaspoon pomegranate molasses\n½ teaspoon dried mint\n½ teaspoon salt\nblack pepper (to taste)\n1 large double ply pita bread (cut into triangles)\n3 tablespoons olive oil\nSalt and pepper (to taste)", "instructions": "Make the Dressing: Whisk together the lemon juice, garlic, sumac, pomegranate molasses, dried mint, salt and pepper. Slowly stream in olive oil, whisking continuously until emulsified. Set aside.\nFry the Pita Bread: In a large skillet, heat olive oil on medium heat. Add the pita bread and season with salt and pepper. Cook stirring frequently until the pita break becomes crispy and golden in color, about 5-7 minutes. Set aside.\nPlace the lettuce, tomatoes, cucumbers, green peppers, radishes, green onions and parsley in a large serving bowl. Pour the dressing on top and toss to combine.\nAdd the fried pita bread to the salad immediately before serving.", "preptime": "15 min", "cooktime": "", "servings": "6", "tags": "Salad, Fatoosh, Fattoush, Fattoush Recipe, Fattoush Salad, Lebanese Fattoush", "notes": "This authentic Lebanese Fattoush Salad is made with well-seasoned fried pita bread, seasonal vegetables and tossed in a zesty sumac Mediterranean dressing", "url": "https://feelgoodfoodie.net/recipe/lebanese-fattoush-salad/#wprm-recipe-container-5838", "date": "", "rating": 0}, {"id": 45, "name": "Best Ever Homemade Flour Tortillas (Ridiculously Easy!) - The Café Sucre Farine", "cuisine": "Other", "source": "thecafesucrefarine.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "", "url": "https://thecafesucrefarine.com/wprm_print/28318", "date": "", "rating": 0}, {"id": 46, "name": "French String Beans with Shallots", "cuisine": "French", "source": "onceuponachef.com", "location": "", "ingredients": "2 tablespoons extra virgin olive oil or unsalted butter\n2 large shallots, (thinly sliced)\n½ cup water\n12 oz French string beans (haricots verts), trimmed\n½ teaspoon salt\n¼ teaspoon freshly ground black pepper\nPinch sugar", "instructions": "Heat the oil in a large skillet over medium-low heat. Add the shallots and cook, stirring frequently, until soft and translucent, about 8 minutes. Do not brown.\nAdd the beans, salt, pepper and water; bring to a boil. Cover the skillet, reduce the heat to low, and cook for 8 minutes.\nRemove the lid and increase the heat to high. Cook, stirring frequently, until the liquid is evaporated, the beans are tender, and the shallots are jammy, about 6 minutes. Taste and adjust the seasoning with salt, pepper, and a pinch of sugar. Serve warm.", "preptime": "10 min", "cooktime": "20 min", "servings": "4", "tags": "Side, French Green Beans", "notes": "These French green beans cooked with shallots are simple enough for weeknights but special enough for holiday dinners.", "url": "https://www.onceuponachef.com/recipes/french-string-beans-with-shallots.html", "date": "", "rating": 0}, {"id": 47, "name": "Garlic Shrimp (Gambas al Ajillo)", "cuisine": "Spanish", "source": "foxandbriar.com", "location": "", "ingredients": "1 pound large raw shrimp\n1/4 cup olive oil\n1/4 cup unsalted butter\n1/4 cup fresh lemon juice\n4-6 garlic cloves (minced)\n1 teaspoon spanish smoked paprika\n1/2 teaspoon red pepper flakes (or to taste)\nsalt\npepper\nchopped parsley for garnish (optional)", "instructions": "Add butter, olive oil, garlic and red pepper flakes to a sauté pan and heat over medium heat.\nSauté for about 1 minute or until garlic becomes fragrant, being careful not to burn it.\nAdd the paprika, lemon juice and shrimp and sauté for 2-3 minutes, until shrimp are pink and cooked through.\nSeason with salt and pepper, and pour shrimp and oil into serving dish. Top with parsley if desired and serve with crusty bread for dipping.", "preptime": "5 min", "cooktime": "5 min", "servings": "4", "tags": "Snack, Easy Recipes, Game Day, Quick Recipes, Summer Recipes, Valentines Day Recipe", "notes": "This garlic shrimp is a simple tapa dish that is garlicky and spicy.", "url": "https://www.foxandbriar.com/garlic-shrimp-gambas-al-ajillo/", "date": "", "rating": 0}, {"id": 48, "name": "https://www.myrecipes.com", "cuisine": "Mediterranean", "source": "myrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Easily find recipes for quick dinners, party foods, healthy recipes, and more. All from the experts at Cooking Light, Southern Living.", "url": "https://www.myrecipes.com/recipe/chicken-thighs-olives-caperberries", "date": "", "rating": 0}, {"id": 49, "name": "Spinach Pasta with Za’atar, Lemon, and Parsley", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "1/2 pound spaghetti ((or other long, thin pasta))\nKosher salt\n1/2 to 3/4 cup extra virgin olive oil\n5 to 6 large garlic cloves, (minced)\n12 ounces baby spinach\n1 teaspoon red pepper flakes\n3 to 4 tablespoons za'atar, (divided)\n1/2 cup to 1 cup grated parmesan cheese, (plus more for garnish)\n1 lemon, (zested and juiced)\n1 cup chopped fresh parsley", "instructions": "Cook the pasta. Bring a large pot of water to a boil and season well with kosher salt. Add the pasta and cook according to al dente according to package instructions (about 8 to 9 minutes). Reserve 2 cups of pasta water, then drain.\nSoften the garlic. In a large pan, warm the olive oil over medium heat. When the oil shimmers, add the garlic and stir until fragrant, about 1 minute (you want some color but do not burn the garlic).\nWilt the spinach. Add the lemon juice and a splash of the pasta cooking water (about 1/2 cup). Begin adding in the spinach in batches, stirring until wilted and seasoning with a pinch of salt as you go. When all of the spinach is fully wilted, about 5 minutes, stir in the crushed red pepper flakes and 1 tablespoon of za’atar.\nCombine the pasta and sauce. Add the pasta to the pan of spinach and toss everything to combine. Add the remaining za’atar, parmesan, lemon zest, and parsley. Toss until everything is well-combined. If the pasta looks a bit dry, add a little more olive oil or a splash more of the pasta cooking water and stir until it’s glossy.\nServe. Serve with more cheese and za’atar on the side (I know I always add more of both to my bowl).", "preptime": "10 min", "cooktime": "15 min", "servings": "5", "tags": "Main, Pasta With Spinach, Spinach Spaghetti, Za'Atar Recipe", "notes": "This spinach pasta gets a Mediterranean-style twist with a garlicky olive oil sauce, lemon, za'atar, red pepper flakes, and a generous sprinkle of parmesan.", "url": "https://www.themediterraneandish.com/garlic-spinach-pasta/?_kx=LuJ9pbAK9jaqx16izPntKPBZPmlKbMFDNvznHYBKgX0%3D.RMuL9Q#recipe", "date": "", "rating": 0}, {"id": 50, "name": "Stifado (Greek Beef Stew)", "cuisine": "Greek", "source": "themediterraneandish.com", "location": "", "ingredients": "2 pounds chuck roast, (trimmed and cut into 1 ½-inch pieces)\n3/4 teaspoon kosher salt\n1/2 teaspoon freshly ground pepper\n1/4 cup extra virgin olive oil\n1 1/2 pounds whole pearl onions, (peeled (frozen are fine—they do not need to be defrosted))\n5 garlic cloves, (coarsely chopped)\n1 tablespoons tomato paste\n2 bay leaves\n1 cinnamon stick\n¼ teaspoon ground clove\n4 allspice berries (or 1/4 teaspoon ground allspice)\n1 cup full-bodied red wine\n1/4 cup Cognac or Brandy\n1 (14 ounce) can of good quality whole or diced tomatoes", "instructions": "Brown the beef in batches. Pat the meat dry, spread it on a tray, and season it well with salt and pepper. In a Dutch oven or heavy-bottom non-reactive pot, heat the olive oil over high heat. When the oil begins to shimmer, add the meat in a single layer and sauté, turning until lightly browned on all sides, about 1 to 2 minutes per side. You will need to do this in batches so as not to overcrowd the pot (which would prevent it from getting a nice sear and seal in the juices). Use a slotted spoon to transfer the browned pieces to a large mixing bowl. Cover and set aside.\nSauté the pearl onions. Turn the heat to medium and add the peeled pearl onions (if you are using frozen, you do not need to defrost them first). Stir to coat with the oil, adding a dash more oil if needed. Cook until they are softened but not caramelized, about 10 minutes. Add the chopped garlic, stir, and cook for another minute.\nSeason the onions and garlic. With a wooden spoon, stir in the tomato paste, bay leaves, cinnamon, ground clove, and allspice berries. Allow this mixture to caramelize for one minute, then return the meat and its accumulated juices to the pot and stir to coat with the spices.\nDeglaze the pan. Pour the red wine and cognac, into the pot scraping the bottom with a wooden spoon to release any fond (browned bits). Let it simmer for 5 minutes to allow some of the alcohol to evaporate and to deglaze the pan.\nSimmer. Add the canned tomatoes and enough warm water to cover the meat. Reduce the heat to a medium or medium-low — you just want a slow simmer —and cover the pot. Cook until the meat is tender and the sauce is slightly thickened. This takes about 1 hour 40 minutes to 2 hours, depending on the size of the meat pieces. Halfway through cooking, open the lid, give it a stir, and check to make sure there is still enough water. If you need to add a little more hot water.\nFinish and serve. When the meat is nice and tender, taste it and adjust the seasoning. Remove the bay leaves, cinnamon stick, and allspice berries. Allow the dish to sit, uncovered, for 15 minutes. Serve the stifado warm, over orzo pasta, rice, mashed potatoes, or, Greek French fries.", "preptime": "20 min", "cooktime": "165 min", "servings": "6", "tags": "Soup, Beef, Beef Stew, Stifado", "notes": "A hearty red wine beef stew with warming spices that is typically served as a Sunday family dinner on colder fall and winter days. This is one of the many traditional Greek comfort foods that is flavorful, satisfying, and mouth-wateringly delicious! Serve with mashed potatoes, orzo or good, crusty bread.", "url": "https://www.themediterraneandish.com/stifado-greek-beef-stew/", "date": "", "rating": 0}, {"id": 51, "name": "Dining Tip: Smoky Grilled and Braised Lamb", "cuisine": "Other", "source": "winespectator.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Here's a fresh, delicious springtime recipe for grilled and braised lamb shoulder with peppercorns, fennel, chickpeas and pomegranate juice from chef Michael Solomonov of Zahav in Philadelphia, where he draws inspiration for dishes like this from Middle Ea", "url": "https://www.winespectator.com/articles/dining-tip-smoky-grilled-and-braised-lamb-51354", "date": "", "rating": 0}, {"id": 52, "name": "Grilled Balsamic Chicken Cobb Salad", "cuisine": "American", "source": "halfbakedharvest.com", "location": "", "ingredients": "2 boneless skinless chicken breasts\n2 tablespoons extra virgin olive oil\n1 tablespoon fresh chopped thyme\n1 tablespoon fresh chopped oregano\n1 tablespoon fresh chopped dill\n2 teaspoons smoked paprika\n1 tablespoon lemon zest and juice\nKosher salt and pepper\n6 cups fresh greens, such as romaine\n1 cup cherry tomatoes, halved if large\n4 ounces gorgonzola cheese, crumbled\n1 avocado, sliced\n6 strips crispy bacon, crumbled\n4 hard boiled eggs, sliced\n1/4 cup extra virgin olive oil\n1/4 cup balsamic vinegar\n2 tablespoons fresh chopped basil\n2 teaspoons dijon mustard\nKosher salt and pepper\n1 pinch crushed red pepper flakes", "instructions": "1. Add the chicken to a bowl and toss with the olive oil, thyme, oregano, dill, paprika, lemon zest and juice, and a pinch each of salt and pepper.2. Preheat your grill, grill pan or cast iron skillet to medium high and brush the grates with oil.3. Grill the chicken for 5-8 minutes per side or until the chicken is cooked through. Remove from the grill and let rest 5-10 minutes. Thinly slice the chicken.4. In a large salad bowl, combine the greens, tomatoes, and gorgonzola. Top the salad with avocado, chicken, bacon, and eggs. Serve the salad alongside the balsamic vinaigrette (below).\n— BALSAMIC VINAIGRETTE —\n1. In a glass jar, combine all ingredients and whisk or shake until combined. Taste, and adjust seasonings to your liking. Serve alongside the salad.", "preptime": "15 min", "cooktime": "10 min", "servings": "4", "tags": "Salad, Chicken Salad, Easy Recipe, Meal Prep", "notes": "Loaded with marinated grilled chicken, sweet balsamic vinaigrette, lots of fresh greens, tomatoes, bacon, hard boiled eggs, avocado and a little cheese, this balsamic grilled chicken cobb salad is nothing short of awesome. Perfect for summer lunches, dinners or packed up and taken on the go.", "url": "https://www.halfbakedharvest.com/chicken-cobb-salad/", "date": "", "rating": 0}, {"id": 53, "name": "Grilled Chicken Wings Recipe, Mediterranean-Style", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "1 large red onion, quartered\n8 garlic cloves\n1/2 cup extra virgin olive oil\njuice of 2 lemons\n1 teaspoon sweet paprika\n1 teaspoon coriander\n1 teaspoon cumin\n1 teaspoon Aleppo pepper ((or 1/2 teaspoon red pepper flakes))\n1/2 teaspoon turmeric\n1/2 teaspoon nutmeg\n2 1/2 pounds chicken wings\nKosher salt\n2 lemons, halved", "instructions": "In the bowl of a large food processor fitted with a blade, combine the onion, garlic, olive oil, lemon juice and spices. Pulse until well combined into a thick marinade.\nSeason the chicken wings well with Kosher salt and put them in a zip top bag. Pour the marinade over and zip the bag shut. Massage the bag a bit to distribute the marinade.\nLay the bag of wings flat on a large plate or tray. Refrigerate for 2 to 4 hours, turning the bag over once midway through.\nHeat a gas grill to 425 degrees F and lightly oil the grates.\nShake off excess marinate then arrange the wings over direct heat. Cover the grill and cook the wings for 15 to 20 minutes, turning over every 5 minutes, until they are fully cooked through. Grill the lemons, flesh side down.\nServe the wings immediately with the grilled lemons. And squeeze the lemons all over to your liking. Add your favorite sauce for dipping (I like the coolness of Tzatziki yogurt cucumber sauce).", "preptime": "10 min", "cooktime": "20 min", "servings": "6", "tags": "Snack, Crispy Chicken Wings, Garlic Chicken Wings, Grilled Chicken Wings", "notes": "Marinated in onions, garlic and lemon with several warm spices, these Mediterranean-style Grilled Chicken Wings are infused with flavor in every bite. They take only 20 minutes to grill, but for best results, allow the wings sometime to marinate in the fridge.", "url": "https://www.themediterraneandish.com/grilled-chicken-wings/", "date": "", "rating": 0}, {"id": 54, "name": "Lamb Kabobs", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "1 1/2 pounds boneless leg of lamb\nKosher salt and black pepper\n1 medium yellow onion\n5 garlic cloves\n1 teaspoon allspice\n1/2 teaspoon nutmeg\n1/2 teaspoon cardamom\n1 cup packed fresh parsley\n1/3 cup extra virgin olive oil\nJuice and zest of 1 lemon", "instructions": "Cut the lamb into 1 to 1 1/2 -inch cubes or pieces and put them in a large bowl. Season with kosher salt and black pepper.\nIn the bowl of a food processor fitted with a blade, combine the onion, garlic, spices, parsley, olive oil and lemon juice. Cover and run the processor until everything is finely chopped (you should end up with a thick onion marinade).\nPour the onion marinade over the lamb and mix well to make sure all the lamb is well coated with the marinade. Cover and refrigerate for up to 2 hours. (If you do not have time, leave the kabobs to marinate at room temperature for about 30 minutes).\nBrush the grates of a gas grill (or an indoor griddle) with oil and heat.\nShake excess marinade off and thread the lamb pieces on some long skewers, allowing a little room between pieces (I used 6 wooden skewers that have been soaked in water).\nAssemble the lamb kabobs in one single layer over your heated grill or griddle. Grill over high heat, turning each kabob one-quarter turn every couple minutes, until the meat is browned all over, anywhere from 7 to 9 minutes, depending on how well you like your lamb cooked (7 minutes on my grill produced medium-rare kabobs).", "preptime": "15 min", "cooktime": "10 min", "servings": "6", "tags": "Main, Grilled Lamb Kabobs, Lamb Kabobs, Lamb Kebabs, Lamb Skewers", "notes": "A special Mediterranean marinade that flavors and tenderizes the meat, plus a bit of grilling technique, produce succulent, juicy lamb kabobs every time.", "url": "https://www.themediterraneandish.com/lamb-kabobs/#recipe", "date": "", "rating": 0}, {"id": 55, "name": "Grilled Pork Loin with Peaches", "cuisine": "American", "source": "williams-sonoma.com", "location": "", "ingredients": "1 boneless pork loin roast, about 3 1/2 lb.\n1/2 cup balsamic vinegar\n1/4 cup Dijon mustard\n2 Tbs. firmly packed light brown sugar\n1 Tbs. chopped fresh thyme\n1/4 cup plus 1 Tbs. olive oil\nKosher salt and freshly ground pepper, to taste\n2 1/2 lb. small peaches, pitted and halved\n3 or 4 fresh oregano sprigs", "instructions": "Using kitchen twine, tie the pork roast at 2-inch intervals and place in a large sealable plastic bag. In a small bowl, whisk together the vinegar, mustard, brown sugar, thyme and the 1/4 cup olive oil. Pour the marinade into the bag, seal the bag, and refrigerate for at least 4 hours or up to 24 hours, turning the bag over once or twice.\nRemove the pork from the marinade and place on a rack-lined baking sheet. Generously season the pork on all sides with salt and pepper. Let stand at room temperature for 1 hour.\nPrepare a grill for indirect grilling over medium-high heat.\nIn a large bowl, toss the peaches with the 1 Tbs. olive oil. Set aside. Place the pork, fat side up, in the center of a steel grill roaster.\nPlace the roaster in the center of the grill over indirect heat, cover the grill and cook for 30 minutes. Arrange the peaches along the sides of the roaster, top with the oregano sprigs and cover the grill. Cook until the pork is well browned and an instant-read thermometer inserted into the center of the meat registers 145°F, 20 to 30 minutes more; adjust the burners as needed to maintain the internal grill temperature at 375° to 400°F.\nTransfer the pork to a cutting board, cover loosely with aluminum foil and let rest for 10 minutes before carving. Cut the pork into slices and serve immediately with the peaches. Serves 6 to 8.\n<b><a href=\"http://www.williams-sonoma.com/test-kitchen\">Williams Sonoma Test Kitchen</a></b>", "preptime": "15 min", "cooktime": "60 min", "servings": "8 servings", "tags": "Steel Grill Recipes, Pork On Grill", "notes": "<p>Pork and fruit is a classic combination. This recipe takes that pairing to a delicious new level by grill-roasting a pork loin roast with fresh summer peaches. If you can’t find small peaches, use larger ones and cut each into 6 to 8 wedges.</p>", "url": "https://www.williams-sonoma.com/recipe/grilled-pork-loin-with-peaches.html", "date": "", "rating": 0}, {"id": 56, "name": "Lazy Chicken-and-Sausage Cassoulet", "cuisine": "French", "source": "foodandwine.com", "location": "", "ingredients": "2 pounds boneless, skinless chicken thighs, patted dry\n1 3/4 teaspoons kosher salt, divided\n1 teaspoon black pepper, divided\n1/2 cup olive oil or canola oil, divided\n1 medium-size yellow onion, chopped\n6 ounces smoked sausage, such as kielbasa, halved lengthwise and cut crosswise into 1/2-inch pieces\n3 garlic cloves, minced\n1 tablespoon chopped fresh thyme, plus more for garnish\n1/8 teaspoon ground allspice\n1/4 cup dry white wine\n2 tablespoons tomato paste\n2 (15-ounce) cans white beans, such as Great Northern or cannellini, drained and rinsed\n1 cup unsalted chicken stock\n1 1/2 cups fresh breadcrumbs", "instructions": "Preheat oven to 375°F. Season chicken thighs with 1 teaspoon salt and 1/2 teaspoon pepper. Heat 2 tablespoons oil in a large skillet over medium-high. Add chicken thighs, smooth side down. Cook, undisturbed, adjusting heat as necessary so thighs cook evenly without scorching, until edges turn opaque and bottoms are nicely browned, about 6 minutes. Flip and cook until internal temperature reaches 165°F, 4 to 5 minutes. Set aside on a plate. Do not wipe skillet clean.\nReturn skillet and any drippings to medium heat. Add 1 tablespoon oil, onion, and sausage. Cook, stirring often, until onion is tender and light golden, about 6 minutes. Add garlic, thyme, allspice, remaining 3/4 teaspoon salt, and remaining 1/2 teaspoon pepper. Cook, stirring often, until heated through and fragrant, about 2 minutes. Add wine and tomato paste, and stir to combine. Bring to a simmer; cook, stirring often, 1 to 2 minutes. Add beans, stock, and 2 tablespoons oil; bring to a simmer.\nShred chicken into bite-size pieces; add to onion mixture along with any drippings that have accumulated on the plate. Transfer to an 8- x 11-inch baking dish. Spread into an even layer. Toss breadcrumbs with remaining 3 tablespoons oil in a large bowl. Scatter breadcrumbs over bean mixture.\nBake in preheated oven until heated through, top is browned, and sides are bubbly, about 20 minutes. (If baking from refrigerated, bake an additional 5 to 10 additional minutes.)", "preptime": "", "cooktime": "", "servings": "", "tags": "Main", "notes": "Traditional cassoulets can take days to prepare; this shortcut version delivers the same big comfort-food flavor in a fraction of the time. Get the recipe at Food & Wine.", "url": "https://www.foodandwine.com/recipes/lazy-chicken-and-sausage-cassoulet", "date": "", "rating": 0}, {"id": 57, "name": "Asparagus air fryrer", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/279177/air-fryer-roasted-asparagus/", "date": "", "rating": 0}, {"id": 58, "name": "Creamy Garlic Vinaigrette", "cuisine": "American", "source": "foodandwine.com", "location": "", "ingredients": "15 medium unpeeled garlic cloves\n1 tablespoon extra-virgin olive oil\n0.25 cup white wine vinegar\n2 tablespoons water\n2 teaspoons Dijon mustard\n1 teaspoon mayonnaise\n1 teaspoon honey\n0.25 teaspoon Worcestershire sauce\n0.13 teaspoon Tabasco\n0.33 cup canola oil\nKosher salt and freshly ground pepper\nfreshly ground black pepper", "instructions": "Preheat the oven to 375°F. Set the garlic on a sheet of foil, drizzle with the olive oil and wrap up; roast for 30 minutes, until soft.\nSqueeze the garlic from its skin into a blender. Puree with the vinegar, water, mustard, mayonnaise, honey, Worcestershire and Tabasco; slowly add the canola oil and puree until the dressing is creamy. Season with salt and pepper and serve.", "preptime": "", "cooktime": "", "servings": "", "tags": "Sauce", "notes": "For this lower-fat tribute to creamy Caesar dressing, Bobby Flay adds sweet roasted garlic puree instead of lots of mayonnaise.", "url": "https://www.foodandwine.com/recipes/creamy-garlic-vinaigrette", "date": "", "rating": 0}, {"id": 59, "name": "Grilled Red Snapper", "cuisine": "American", "source": "howtobbqright.com", "location": "", "ingredients": "4 Red Snapper Filets (skin on)\n2oz Malcom’s King Craw\n8oz Lump Crab\n8oz Cajun Cream Sauce *recipe below\n2 Tablespoons Olive Oil\n2 Tablespoons Butter\nLemon slices for garnish\n2 Tablespoons Butter\n3 Cloves Garlic – minced\n1 teaspoon Parsley\n1/4 Cup White Wine\n1 Cup Heavy Cream\n1 Tablespoon Cajun Seasoning\n1/2 teaspoon Lemon Zest\nJuice from 1 Lemon Wedge\n2 Tablespoons Grated Parmesan\nHeat butter in a small sauce pan over medium heat. Add garlic and parsley and sauté for 1-2 minutes. Pour in white wine and reduce for 3-4 minutes. Add heavy cream and Cajun seasoning. Whisk to combine and reduce for 8-10 minutes stirring often until sauce thickens slightly. Add lemon zest, juice from lemon wedge, and Parmesan. Remove from heat and rest until ready to serve over fish.", "instructions": "Set up Weber grill with a charcoal Vortex for indirect cooking at high temp (any grill can be used with indirect cooking method but cooking times may vary). Open the top and bottom vents 100% for air flow.\nDrizzle olive oil over the skin side of each filet to prevent the fish from sticking during cooking. Lightly drizzle the flesh side of each filet and coat with cajun seasoning.\nWhile the grill is coming up to temp, prepare the cajun cream sauce.\nPlace each filet on the outer edges of the cooking grate away from the vortex. Cook approximately 10-12 minutes or until the filets easily flake.\nDuring the last few minutes of grilling melt 2 tablespoons of butter in a small sauté pan. Place the lump crab into the pan and warm for 1-2 minutes tossing gently in the butter.\nCarefully remove each snapper filet form the grill and transfer to a platter.\nTo serve: top each filet with lump crab meat and drizzle with warm cajun cream sauce garnished with a lemon slice. This dish is great served over grilled Asparagus or steamed rice.", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "", "url": "https://howtobbqright.com/2019/08/08/grilled-red-snapper-recipe/", "date": "", "rating": 0}, {"id": 60, "name": "Grilled Veggies with Romesco Sauce - Love and Lemons", "cuisine": "Other", "source": "loveandlemons.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "Sauce", "notes": "Sweet, smoky, and tangy romesco sauce served with grilled veggies and ciabatta makes an easy, healthy weeknight summer dinner or appetizer. Vegan.", "url": "https://www.loveandlemons.com/grilled-veggies-romesco-sauce/", "date": "", "rating": 0}, {"id": 61, "name": "Guacamole Deviled Eggs", "cuisine": "American", "source": "skinnytaste.com", "location": "", "ingredients": "6 large eggs (hard boiled (recipe here))\n1 medium haas avocado (about 5 oz)\n2-3 tsp fresh lime juice\n1 tsp red onion (minced)\n1 tbsp minced jalapeno\n1 tbsp fresh cilantro (chopped)\nkosher salt and fresh ground pepper (to taste)\n1 tbsp diced tomato\npinch chile powder (for garnish)", "instructions": "Peel the cooled hard boiled eggs.\nCut the eggs in half horizontally, and set the yolks aside.\nIn a bowl, mash the avocado and 2 whole egg yolks; discard the rest.\nMix in lime juice, red onion, jalapeño, cilantro, salt and pepper and adjust to taste. Gently fold in tomato.\nScoop heaping spoonfuls of the guacamole into the 12 halved eggs.\nSprinkle with a little chile powder for color and arrange on a platter.", "preptime": "30 min", "cooktime": "", "servings": "6", "tags": "Snack, Avocado Deviled Eggs, Deviled Eggs With Guacamole, Guacamole Deviled Eggs, Guacamole Eggs, Healthy Deviled Eggs", "notes": "My mom adds hard boiled eggs to her guacamole, so I thought why not add guacamole to hard boiled eggs? The results were lovely, and since I was testing them out for the blog, I actually enjoyed them for lunch.", "url": "https://www.skinnytaste.com/guacamole-deviled-eggs/", "date": "", "rating": 0}, {"id": 62, "name": "Zahav’s Hummus ‘Tehina’", "cuisine": "Mediterranean", "source": "cooking.nytimes.com", "location": "", "ingredients": "1 cup dried chickpeas\n2 teaspoons baking soda\nJuice of 1 1/2 large lemons (about 1/3 cup), more to taste\n2 to 4 cloves garlic, grated\n1 3/4 teaspoons kosher salt, more to taste\n1 cup sesame tahini\n1/2 teaspoon ground cumin, more to taste\nPaprika, for serving\nOlive oil, for serving\nChopped fresh parsley, for serving", "instructions": "In a bowl, cover chickpeas by at least 2 inches of cold water. Add 1 teaspoon baking soda and let soak at room temperature overnight. Drain and rinse.\nIn a medium pot, cover soaked chickpeas by at least 4 inches of water. Add the remaining teaspoon baking soda and bring to a boil over high heat. Reduce heat to medium high and let cook at a vigorous simmer until chickpeas are quite soft, 1 to 1 1/2 hours. (Overcooked chickpeas are the secret to creamy hummus, so don’t worry if they start to break down a little.) Drain.\nWhile chickpeas are cooking, make the tahini sauce. In a blender, combine the lemon juice, garlic and 1/4 teaspoon salt. Let mixture sit 10 minutes. Add tahini, remaining 1 1/2 teaspoons salt and the cumin, and blend until a thick paste forms. Add 1/3 to 2/3 cup ice water while blender is running, a little at a time, until sauce is smooth. You’re looking for a perfectly smooth, creamy sauce.\nAdd the warm, drained chickpeas to blender with tahini mixture. Blend until perfectly smooth and not at all grainy, stopping to scrape down sides of bowl occasionally. This blending may take upward of about 2 minutes; just keep going until the mixture is ultracreamy and fluffy, adding a little water if you need it to make the contents of the blender move. Taste for seasonings, adding more salt, lemon juice and/or cumin as needed.\nTo serve, spread the hummus on a plate, dust with paprika, drizzle with olive oil and sprinkle with parsley.", "preptime": "", "cooktime": "", "servings": "4 cups", "tags": "Snack, Chickpea, Hummus, Israeli, Tahini, Thanksgiving", "notes": "This recipe comes from Zahav, the chef Michael Solomonov’s Israeli restaurant in Philadelphia, which is known for its silky and wonderfully rich hummus. Garlic and lemon play small roles here; the indisputable co-stars are the freshly cooked chickpeas and the nutty tahini. While it’s well worth the effort to cook the dried chickpeas yourself, substituting a couple of cans of cooked chickpeas is perfectly acceptable.", "url": "https://cooking.nytimes.com/recipes/1017734-zahavs-hummus-tehina", "date": "", "rating": 0}, {"id": 63, "name": "Grilled Red Snapper with Warm Fiesta Olive Topping", "cuisine": "American", "source": "simplyscratch.com", "location": "", "ingredients": "1 teaspoon olive oil\n2 cloves fresh garlic (finely chopped)\n½ cup diced red onion\n1½ cups cherry tomato halves\n1 (15 ounce) can black beans (rinsed and drained)\n3/4 cup sweet yellow corn (thawed if frozen)\n1 (5 ounce) jar Olives (fiesta olive if possible, drained and sliced in half)\n½ teaspoon ground cumin\n1 tablespoon minced fresh cilantro (plus more for serving)\nkosher salt (to taste)\n24 ounces red snapper fillets\nkosher salt (to taste)\nextra light olive oil\n3 dashes cumin\n3 dashes chili powder\n3 dashes smoked paprika", "instructions": "Heat a tablespoon of olive oil in a large, non-stick skillet over medium-low heat.\nAdd garlic and sauté for 1 to 2 minutes or until fragrant. Add in onions and cook until soft and translucent, about 5 minutes.\nIncrease the heat to medium and add in the tomatoes. Stir and cook until the tomatoes burst and the skin softens.\nAdd in the black beans, corn and olives. Season with ½ teaspoon of cumin and the cilantro. Taste and season with salt if desired.\nKeep topping warm on low heat.\nMeanwhile, oil the grates of your grill and preheat it to medium high heat.\nBrush both sides of the snapper with the extra light olive oil and season (both sides) by sprinkling with pinches of kosher salt, cumin, chili powder and smoked paprika. Use your fingers to pat the spices onto the fish.\nOnce the grill is hot, place the fish onto the grate and grill for 4 to 5 minutes before flipping and grilling until the fish is fully cooked and flakes easily.\nServe the grilled snapper with a spoonful or two of the olive topping over top. Squeeze fresh lime juice and sprinkle with extra cilantro over top.", "preptime": "15 min", "cooktime": "20 min", "servings": "4", "tags": "Main, Fish, Grilling, Seafood, Summer", "notes": "Perfectly seasoned, grilled red snapper fillets get topped with a warm fiesta olive topping. Think garlic, burst cherry tomatoes, sweet corn and briny olives! Easy and delicious!", "url": "http://www.simplyscratch.com/2016/06/grilled-red-snapper-with-warm-fiesta-olive-topping.html", "date": "", "rating": 0}, {"id": 64, "name": "Hurricanes by the Pitcher", "cuisine": "American", "source": "foodnetwork.com", "location": "", "ingredients": "5 large lemons\n1 1/2 cups sugar\n1 orange, sliced 1/4 inch thick, plus more for garnish\n1 lime, halved lengthwise and sliced 1/4 inch thick, plus more for garnish\n1 1/2 cups pulp-free orange juice\n1 cup coconut water\n1 cup dark rum\n1 cup light rum\n3/4 cup grenadine\n3/4 cup pineapple juice\nMaraschino cherries, for garnish", "instructions": "Use a vegetable peeler to remove 2 long strips of lemon peel, being careful not to take any of the white pith, which can be bitter. Juice the lemons; you should have 1 1/4 cups of juice.\nPut the lemon peel, sugar, 1 cup of the lemon juice and 1/2 cup water in a small saucepan. Bring to a simmer over medium-high heat and cook, stirring, until the sugar has dissolved. Remove from heat and let cool. Discard the lemon peel.\nPut the orange and lime slices in a large pitcher (or a clean stock pot if you are making an extra-large batch for family and friends). Using a wooden spoon or muddler, lightly bruise the citrus to release some of the juices and essential oils from the skins.\nStir in the orange juice, coconut water, dark and light rum, grenadine, pineapple juice, the remaining 1/4 cup lemon juice and 1 cup of the lemon syrup. (The remaining syrup can be refrigerated in a covered container for up to 1 week.)\nThread an orange slice, a lime slice and a maraschino cherry onto each of 8 small skewers. Fill 8 glasses with ice. Pour the hurricanes over the ice and rest a fruit skewer on each glass. Serve with tall bendy straws.", "preptime": "", "cooktime": "", "servings": "8 servings", "tags": "Rum Recipes, Sugar, Orange Recipes, Mixed Drink Recipes, Gluten Free, Cajun", "notes": "", "url": "https://www.foodnetwork.com/recipes/guy-fieri/hurricanes-by-the-pitcher-2666163", "date": "", "rating": 0}, {"id": 65, "name": "Juicy Stovetop Chicken Thighs", "cuisine": "American", "source": "diethood.com", "location": "", "ingredients": "2 tablespoons olive oil\n1 ½ pounds (about 6 chicken thighs) boneless skinless chicken thighs\n½ teaspoon onion powder\n½ teaspoon garlic powder\n½ teaspoon chili powder\nsalt and freshly ground black pepper (to taste)\n1 tablespoon butter\n2 cloves garlic (minced)\n½ cup low sodium chicken broth (you can also use dry white wine or apple juice)\nfresh chopped parsley (for garnish)", "instructions": "Heat the oil in a large skillet over medium heat.\nSeason chicken thighs with onion powder, garlic powder, chili powder, salt, and pepper.\nAdd seasoned chicken thighs to the skillet, smooth side down; cook for 5 to 6 minutes or until you can easily flip over the chicken. Flip and cook for 6 to 7 more minutes or until no longer pink.\nAdd butter and minced garlic; cook for about 20 to 30 seconds or until fragrant.\nAdd chicken broth and stir around to scrape up all the crispy bits on the bottom of the pan. Continue to cook for 1 minute.\nRemove from heat.\nGarnish with fresh chopped parsley and serve.", "preptime": "5 min", "cooktime": "15 min", "servings": "4", "tags": "Main, Boneless Skinless Chicken Thighs Recipe, Chicken Thighs Recipe", "notes": "Perfectly golden, tender, and juicy boneless skinless chicken thighs recipe prepared on the stove top.", "url": "https://diethood.com/stove-top-chicken-thighs/", "date": "", "rating": 0}, {"id": 66, "name": "Lamb Tagine", "cuisine": "Mediterranean", "source": "bonappetit.com", "location": "", "ingredients": "2 lb. boneless lamb shoulder, excess fat trimmed, cut into 2\" pieces\nKosher salt\n3 Tbsp. extra-virgin olive oil\n1 large yellow onion, chopped\n1 1½\" piece fresh ginger, peeled, finely grated\n4 garlic cloves, thinly sliced\n2 bay leaves\n¼ cup golden raisins\n⅓ cup plus 2 Tbsp. slivered almonds\n2 Tbsp. tomato paste\n1 tsp. ground cinnamon\n1 tsp. ground cumin\n½ tsp. crushed red pepper flakes\n½ tsp. ground turmeric\n¼ tsp. ground cardamom\n½ small red onion, very thinly sliced\n1 cup mint leaves, torn if large\n½ lemon", "instructions": "Pat lamb dry with paper towels, then season on all sides with salt. Let sit at room temperature 1 hour, or chill, uncovered, up to 12 (longer is better; overnight works great).\nHeat oil in a large Dutch oven or other heavy pot over medium-high. Working in batches, cook lamb, turning occasionally, until browned on all sides, 12–14 minutes total. Using a slotted spoon, transfer lamb to a plate. Add yellow onion and 2 Tbsp. water to pot and cook, stirring occasionally and scraping browned bits from bottom of pot, until onion is slightly softened, 8–10 minutes. Add ginger, garlic, bay leaves, raisins, and ⅓ cup almonds. Cook, stirring occasionally, until garlic is softened, about 3 minutes.\nReturn lamb to pot and add tomato paste, cinnamon, cumin, red pepper flakes, turmeric, and cardamom. Cook, stirring occasionally, until mixture is fragrant and tomato paste has darkened and is beginning to stick to bottom of pot, about 3 minutes. Pour in 6 cups water and bring to a boil. Reduce heat to medium-low and bring to a bare simmer. Cover partially with lid (you want a little space for steam to escape) and cook, stirring occasionally, until lamb is tender and liquid has thickened, 60–75 minutes. Remove from heat; taste and adjust seasoning with salt.\nMeanwhile, toast remaining 2 Tbsp. almonds in a small dry skillet over medium heat, tossing often, until golden brown, 4–6 minutes. Transfer to a cutting board and let cool before coarsely chopping.\nToss red onion and mint in a small bowl. Squeeze out juice from lemon over; season with salt. Toss again to coat.\nLadle stew into bowls. Top with chopped almonds and onion salad.", "preptime": "", "cooktime": "", "servings": "4 servings", "tags": "Stew, Moroccan, Almond, Lamb Shoulder, Turmeric, Cardamom", "notes": "You don’t need a tagine, a conical earthenware pot typically from Morocco, to make this warming, fragrant, tender lamb stew. A Dutch oven works great! This lamb tagine gets its vibrancy from spices like cinnamon, cumin, turmeric, and cardamom. If raisins aren’t your thing, swap them out for another dried fruit like apricots, tart cherries, or prunes—just chop them so they’re raisin-sized.", "url": "https://www.bonappetit.com/recipe/spiced-lamb-tagine", "date": "", "rating": 0}, {"id": 67, "name": "Lemon Garlic Chicken Thighs", "cuisine": "Greek", "source": "damndelicious.net", "location": "", "ingredients": "1/2 cup chicken stock\n3 tablespoons freshly squeezed lemon juice\n2 tablespoons olive oil\n1 tablespoon lemon zest\n2 cloves garlic (minced)\n2 teaspoons Dijon mustard\n1 teaspoon dried oregano\n1/2 teaspoon dried thyme\nKosher salt and freshly ground black pepper (to taste)\n2 pounds boneless, skinless chicken thighs\n1 1/2 tablespoons canola oil", "instructions": "In a medium bowl, combine chicken stock, lemon juice, olive oil, lemon zest, garlic, Dijon, oregano, thyme, 1 1/2 teaspoons salt and 1 1/2 teaspoons pepper.\nIn a gallon size Ziploc bag or large bowl, combine chicken and chicken stock mixture; marinate for at least 2 hours to overnight, turning the bag occasionally. Drain the chicken from the marinade.\nHeat canola oil in a cast iron grill pan over medium-high heat.* Working in batches, add chicken to the grill pan in a single layer and cook until golden brown and cooked through, reaching an internal temperature of 165 degrees F, about 4-5 minutes per side.\nServe immediately.", "preptime": "135 min", "cooktime": "20 min", "servings": "6", "tags": "", "notes": "Olive oil, lemon juice/zest, garlic, Dijon, oregano, thyme. THE BEST marinade ever. Made on the grill or stovetop. SO SO GOOD.", "url": "https://damndelicious.net/2019/05/24/lemon-garlic-chicken-thighs/", "date": "", "rating": 0}, {"id": 68, "name": "Lemon Pepper Air Fryer Chicken Thighs", "cuisine": "American", "source": "myforkinglife.com", "location": "", "ingredients": "6 boneless (skinless chicken thighs)\n1 ½ Tablespoon fresh lemon juice\n½ Tablespoon Lemon Pepper Seasoning\n½ teaspoon Paprika\n½ teaspoon Italian Seasoning\n½ teaspoon Garlic Powder\n¼ teaspoon Black Pepper", "instructions": "Wash and dry chicken thighs. Rub remaining ingredients over chicken thighs.\nPlace in Air fryer and cook on 360 degrees Fahrenheit for 15 minutes, turning halfway through until the chicken has reached a temperature of 165 degrees Fahrenheit.\n— For Skin On Bone in Chicken Thighs —\nFor bone in thighs with skin, increase cook time for 22-25 minutes at 360 degrees. Then cook on 390 degrees Fahrenheit for 5 minutes more.", "preptime": "10 min", "cooktime": "15 min", "servings": "6", "tags": "Main, Air Fryer Chicken Thighs", "notes": "Easy and delicious Lemon Pepper Chicken Thighs that are made in your Air Fryer.", "url": "https://www.myforkinglife.com/lemon-pepper-air-fryer-chicken-thighs/", "date": "", "rating": 0}, {"id": 69, "name": "Lemon Vinaigrette", "cuisine": "American", "source": "themediterraneandish.com", "location": "", "ingredients": "1/4 cup lemon juice ((from about 2 large lemons))\n2 teaspoons Dijon mustard\n1 to 2 large garlic cloves, (minced)\n2 teaspoons dried oregano\nKosher salt\nBlack pepper\n1/2 to 3/4 cup extra virgin olive oil", "instructions": "Whisk. In a mixing bowl, combine the lemon juice, Dijon, garlic, oregano, and a big dash of salt and pepper (1/2 to 3/4 teaspoon each).\nIncorporate the oil. Whisk and while whisking, drizzle the extra virgin olive oil. Continue to whisk until fully emulsified.\nUse or store. Taste and adjust seasoning to your liking. Store, covered in your refrigerator, for up to 1 week. Simply give it a good whisk to reincorporate the oil.", "preptime": "5 min", "cooktime": "", "servings": "16", "tags": "Sauce, Dijon Vinaigrette, Lemon Vinaigrette, Salad Dressing", "notes": "An easy, bright and delicious vinaigrette recipe you can make with a handful of pantry essentials and less than 5 minutes.", "url": "https://www.themediterraneandish.com/5-minute-lemon-vinaigrette-recipe/#wprm-recipe-container-81229", "date": "", "rating": 0}, {"id": 70, "name": "Linguini with White Clam Sauce", "cuisine": "Italian", "source": "foodnetwork.com", "location": "", "ingredients": "1/4 cup extra-virgin olive oil\n1 teaspoon red pepper flakes\n4 to 6 cloves garlic, finely chopped\n1 tin flat fillet of anchovies, drained, 6 or 7 fillets\n2 tablespoons fresh thyme leaves, 4 or 5 sprigs stripped or 1 1/2 teaspoons dried\n1 cup dry white wine\n1 cup clam juice or chicken stock\n1 can (15 ounces) fancy whole baby clams\n1 lemon, zested\n1 pound linguini, slightly undercooked, about 6 to 7 minutes\n1/4 cup chopped parsley leaves\nLots of black pepper and some coarse salt\nCrusty bread, for mopping", "instructions": "Heat a large deep skillet over medium heat. Add extra-virgin olive oil, 4 turns of the pan in a slow stream, red pepper flakes, garlic and anchovies and cook until anchovies melt into the oil. Add thyme and wine. Reduce wine 1 minute. Add clam juice or stock, clam juice will give the dish a stronger clam flavor, chicken stock will give it a buttery personality. Stir in clams and lemon zest. Drain pasta. Add to skillet and toss with sauce 2 to 3 minutes, until pasta is al dente and has absorbed some of the sauce and flavor. Add parsley, pepper and salt, to your taste and serve with bread for mopping up remaining juices.", "preptime": "", "cooktime": "", "servings": "4 servings", "tags": "Sauce, Pasta Recipes, Sauteing Recipes, Italian, Dinner Recipes, Clam Recipes", "notes": "", "url": "https://www.foodnetwork.com/recipes/rachael-ray/linguini-with-white-clam-sauce-recipe-1942605", "date": "", "rating": 0}, {"id": 71, "name": "Grilled Hawaiian Pork Kabobs", "cuisine": "American", "source": "bobbiskozykitchen.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "These quick and easy kabobs have tender bites of pork with charred peppers, onions, and pineapple, bathed in a delicious Hawaiian inspired BBQ sauce. From www.bobbiskozykitchen.com", "url": "http://www.bobbiskozykitchen.com/2017/08/grilled-hawaiian-pork-kabobs.html", "date": "", "rating": 0}, {"id": 72, "name": "Mediterranean diet for heart health", "cuisine": "Mediterranean", "source": "mayoclinic.org", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "This heart-healthy eating plan emphasizes healthy fats, whole grains, fruits, vegetables, beans, nuts and seeds.", "url": "https://www.mayoclinic.org/healthy-lifestyle/nutrition-and-healthy-eating/in-depth/mediterranean-diet/art-20047801", "date": "", "rating": 0}, {"id": 73, "name": "Moroccan White Bread Recipe - Khobz", "cuisine": "Mediterranean", "source": "tasteofmaroc.com", "location": "", "ingredients": "4 cups white flour (preferably high gluten or bread flour )\n2 tsp salt\n2 tsp sugar\n1 tbsp yeast\n2 tbsp oil (olive oil or vegetable oil)\n1 1/4 cups water (warm (not hot))\noil, semolina or cornmeal (optional (for preparing the pan))", "instructions": "Prepare a large baking sheet by lining it with parchment paper OR lightly oiling it OR dusting it with semolina or cornmeal. Set aside.\nCombine the flour, salt and sugar in a large bowl. Make a well in the center and add the yeast.\nAdd some of the water to the yeast in the well and lightly stir with your fingers to dissolve the yeast (see Recipe Notes below). Add the rest of the water and oil to bowl and stir to combine all ingredients.\nKnead the dough (in the bowl if it's large enough or on a floured work surface) for 5 to 10 minutes until smooth and elastic. While kneading, work in a little flour or water as needed to ensure the dough is soft and pliable but not sticky.\nDivide the dough into two smooth mounds and place well apart on the prepared pan. Cover with a towel and leave to rest for 10 to 15 minutes.\nAfter resting, pat the mounds of dough into flat, round loaves about 1/4\" thick. Cover again with a towel and leave to rise for about an hour (longer in a cold room), until the dough springs back when pressed lightly.\nPreheat your oven to 435°F (225°C). When the oven is hot, lightly score the top of the bread with sharp knife or poke in several places with a fork.\nBake the khobz in the preheated oven, rotating the pan if necessary, for about 20 minutes or golden brown. The loaves should sound hollow when tapped.\nTransfer the khobz to a rack or towel-lined basket to cool.", "preptime": "15 min", "cooktime": "20 min", "servings": "8", "tags": "Baking, Moroccan Bread Recipe, Moroccan Khobz", "notes": "A traditional recipe for homemade Moroccan bread or khobz, a Moroccan flatbread served at nearly every meal. This version is for white bread but you can mix in wheat, semolina or other flours.Yields 2 8\" loaves.", "url": "https://tasteofmaroc.com/moroccan-bread-khobz-recipe/", "date": "", "rating": 0}, {"id": 74, "name": "Barbeque Halibut Steaks", "cuisine": "Other", "source": "allrecipes.com", "location": "", "ingredients": "", "instructions": "", "preptime": "", "cooktime": "", "servings": "", "tags": "", "notes": "Bookmarked recipe — open the original link below to view on the source site.", "url": "https://www.allrecipes.com/recipe/12837/barbeque-halibut-steaks/?referringHubId=411", "date": "", "rating": 0}, {"id": 75, "name": "Maple-Glazed Chicken with Caramelized Onions and Pears", "cuisine": "American", "source": "simplyrecipes.com", "location": "", "ingredients": "4 skinless, boneless chicken breasts (1 1/2 to 2 pounds total)\n1 teaspoon salt, divided, plus more to taste\n1/2 teaspoon ground black pepper, divided, plus more to taste\n2 tablespoons olive oil\n2 tablespoons butter\n1 large Spanish or yellow onion, halved and thinly sliced\n2 large ripe firm-fleshed pears (like Bartlett), or 3 smaller pears\n2 tablespoons maple syrup\n1 tablespoon Dijon mustard\n3 tablespoons chopped fresh parsley", "instructions": "Brown the chicken: Heat the oven at 450°F. Sprinkle the chicken with 1/2 teaspoon salt and 1/4 teaspoon pepper. Heat the olive oil in the skillet over medium-high heat. When it is hot, add the chicken and cook without disturbing for 3 to 5 minutes, until the underside is golden. Turn and cook the other sides for 3 to 5 minutes more, until the other side is golden. Transfer chicken to a large plate.\nCook the onion: Melt the butter in the skillet over medium heat. Add the onion, 1/2 teaspoon of salt and 1/4 teaspoon pepper. Cook, stirring often, for 8 minutes, or until the onion starts to brown.\nPrep and cook the pears While the onions cook, peel and core the pears. Cut into quarters (large pears can be cut into 6 pieces.) Move the onions to the center of the pan. Add the pears, cut sides down, around the edge. Cook for 4 minutes or until the pears brown on the bottom. Stir the onions occasionally. Turn the pears and cook the other cut sides for 3 minutes more. Stir the onions occasionally.\nReturn the chicken to the skillet and glaze: Gently stir the pears and onions together and flatten them slightly to create a bed for the chicken. Place the chicken on top of the pears and onions. Tip in any pan juices from the plate into the skillet. In a small bowl, stir together the maple syrup and mustard. Spread the glaze over the chicken breasts with a spoon.\nBake the chicken: Transfer the skillet to the oven and cook for 20 to 25 minutes, or until the glaze is browned, the pears are tender when pierced, and the chicken is cooked through. A meat thermometer inserted into the thickest part of the breasts should register 165°F.\nServe the chicken: Divide the pears and onions between plates, add a chicken breast, and sprinkle with parsley.", "preptime": "15 min", "cooktime": "45 min", "servings": "4", "tags": "Main, 1-Pot, American, Gluten-Free, Dinner, Favorite Fall", "notes": "Maple-Glazed Chicken with Caramelized Onions and Pears! A one-skillet dinner you can serve right from the pan. A little mustard in the glaze gives the chicken some zing.", "url": "https://www.simplyrecipes.com/recipes/maple_glazed_chicken_with_caramelized_onions_and_pears/", "date": "", "rating": 0}, {"id": 76, "name": "Musakhan: Sumac Chicken and Caramelized Onion Flatbread", "cuisine": "Mediterranean", "source": "themediterraneandish.com", "location": "", "ingredients": "3 tbsp allspice\n2 tbsp ground cinnamon\n1 tbsp coriander\n1 tsp black pepper\n¾ tsp ground cardamom\n½ tsp ground nutmeg\n6 chicken legs, bone-in, skin on (if you like, divide the legs to thighs and drumsticks. You can also use chicken breast pieces, if you prefer.)\nExtra virgin olive oil (I used Greek Private Reserve EVOO)\nKosher salt\n1 tsp sumac\n1 1/2 tsp of spice mixture above\nExtra virgin olive oil (Greek Private Reserve EVOO again)\n6 yellow onions, chopped\nKosher slat\n1 tbsp sumac, more for later\n1 tbsp ground cumin\n2 tsp of spice mixture above\nToasted pine nuts, about 1/3 cup or more to your liking\n6 flatbread such as Taboon bread, Greek pita bread, or naan", "instructions": "Preheat your oven to 375 degrees F (or 190 degrees C)\nIn a small bowl, combine allspice, cinnamon, coriander, black pepper, cardamom and nutmeg. Mix well.\nPat chicken pieces dry and place them on a lightly oiled sheet pan (or roasting pan). Drizzle generously with extra virgin olive oil, season with kosher salt on both sides. Add 1 tsp sumac and 1 ½ tsp of the spice mixture. Give the chicken a good rub with your hands, making sure to get the spices underneath the skin. Arrange the chicken pieces skin side up and place on the middle rack of your heated oven. Roast for about 1 hour or until fully cooked (internal temperature should register 165 degrees F.)\nWhile the chicken is roasting, work on the caramelized onions. In a large cooking skillet, put just over ½ cup extra virgin olive oil, chopped onions, kosher salt, 1 tbsp sumac, 1 tbsp cumin, and 2 tsp of the spice mixture. Cook over medium-low heat, stirring occasionally, adding a little bit of water (2tbsp or so at a time) as needed, until the onions have softened and cooked completely (about 30 to 40 minutes). Remove from heat.\n. Pour any roasting pan juices into the caramelized onions. Cover chicken loosely with aluminum foil for about 15 minutes, while you assemble the flatbreads.\nTurn on your broiler. To assemble flatbreads, dip the edges of each bread in the oil on the surface of the onion mixture. Arrange flatbreads on a large baking sheet (you may do a couple flatbreads at a time). Spread enough of the caramelized onion mixture on the surface of each flatbread, leaving a small border around the edge (like pizza). Add a generous sprinkle of sumac. Add toasted pine nuts. Place under the broiler briefly (2 to 4 mins), watching carefully, until edges and onion mixture are nicely browned.\nWhen flatbreads are ready, top each with a chicken portion and serve along with a side of olives and simple Mediterranean salad.", "preptime": "30 min", "cooktime": "", "servings": "6", "tags": "Baking, Musakhan, Sumac Chicken, Palestinian Recipe", "notes": "This warm, savory Musakhan sumac chicken with caramelized onion flatbread will wow your taste buds in the best way possible! A Traditional Palestinian roast chicken dish, perfectly flavored and roasted to tender perfection, served with sweet caramelized onions, flatbread, and pine nuts. Be sure to check out the step-by-step photos above.", "url": "https://www.themediterraneandish.com/musakhan-sumac-chicken/", "date": "", "rating": 0}, {"id": 77, "name": "The Frugal Gourmet's New York Cheesecake", "cuisine": "American", "source": "food.com", "location": "", "ingredients": "1 cup graham cracker crumbs\n3/4 cup sugar\n1/4 cup melted butter, plus\n2 tablespoons melted butter\n1 1/2 cups sour cream\n2 eggs\n2 teaspoons vanilla\n1 lb cream cheese, broken into small pieces", "instructions": "Preheat oven to 325&deg;.\nMix together the cracker crumbs, &frac14; cup sugar, and &frac14; cup melted butter, and line the bottom of an 8- or 9-inch ungreased spring-form pan.\nBlend sour cream, &frac12; cup sugar, eggs, and vanilla in a blender for 1 minute. Add the cream cheese. Blend until smooth.\nPour 2 tablespoons melted butter through the top of the machine. Blend and pour into the spring-form pan.\nBake in the lower third of a 350&deg; oven for 45 minutes.\nWhen baking is finished, turn oven on to broil. Broil the cheesecake until the top begins to show attractive spots of brown. Remove from oven.\nRefrigerate for 4 hours, preferably overnight, before cutting and serving.", "preptime": "15 min", "cooktime": "45 min", "servings": "1 cheesecake, 16 serving(s)", "tags": "Dessert, Cheese, Sweet, < 60 Mins, For Large Groups, Easy", "notes": "Very easy to make. Just throw the filling ingredients into the blender then pour over the crust. Delicious!", "url": "https://www.food.com/recipe/the-frugal-gourmets-new-york-cheesecake-12847
